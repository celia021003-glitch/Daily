熟后","待猪肉熟后再翻炒 1、2 分钟即可起锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"洋葱炒鸡蛋","time":20,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["鸡蛋","洋葱","食用油","盐","葱","料酒"],"steps":["鸡蛋打入大碗中，加入洋葱片、盐后搅拌 60 S","起锅烧油，倒入鸡蛋，一面煎炸 30-45 S ，翻面继续翻炒，反复 2-3 分钟 后散上料酒出锅","鸡蛋装盘，散上葱花"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"海边落日","time":20,"level":"中等","tags":["饮品","开源"],"ings":["红石榴糖浆","NFC 橙汁","苏打水","白朗姆","蓝橙力娇酒","柠檬汁","冰块","柠檬"],"steps":["柠檬洗净切出一片","选择一个杯子，建议使用容量在 350~400 毫升的透明玻璃杯","放入大冰块，用搅拌棒搅拌冰杯","加入红石榴糖浆","让橙汁沿搅拌棒导入酒杯，到就被一半就行","轻轻搅拌半圈","倒入苏打水","拿出调酒杯，加入白朗姆 + 蓝橙力娇酒 + 柠檬汁 + 冰块。然后 shake，shake"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"淄博烧烤","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪五花肉","小薄饼","大葱","芝麻酱","甜面酱","芝麻盐","烧烤炉","烤网"],"steps":["五花肉切成厚度不超过 2cm 长的块，并串成串。（五花肉可以预先腌制一下，味道更佳）","大葱切成 5cm 长的葱段，备用","芝麻酱加 10ml 温水调稀，与甜面酱混合均匀，备用（可以换成\"芝麻盐\"）","点燃炭火，等待炭火烧至**通红无明火**状态（约 15 分钟）","将五花肉串均匀摆在在烤网上，烤至*底面焦黄出油*后翻面","继续烤制约 2 - 3 分钟，至*两面焦黄、边缘微焦*后取下","取一张小薄面饼平铺，抹上 3 - 4g 混合酱料","放上烤好的肉片和 1 - 2 段大葱，卷起即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"清炒花菜","time":15,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["花菜","大蒜","盐"],"steps":["将 花菜 洗净，用刀或手掰成小朵，粗茎部分可以切片，备用。","将 大蒜 去皮，切成蒜片，备用。","锅中加入 1000 ml 饮用水，大火烧开。","放入 花菜 朵，煮 **2-3 分钟**，至花菜颜色变浅，口感稍微软化。","将 煮好的 花菜 捞出，沥干水分，备用。","热锅，加入 15 ml 食用油，大火烧热。","放入 蒜片，快速煸炒出香味。","放入 焯好水的 花菜 朵，转中大火，快速翻炒约 **2 分钟**，使花菜均匀受热。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"清蒸南瓜","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["南瓜"],"steps":["将 南瓜 外皮洗净，去除瓜瓤和籽。","将 南瓜 切成厚度大约 2 cm 的片，备用。","在 蒸锅 的锅中加入 1000 ml 饮用水。","将切好的 南瓜 片均匀摆放在盘中。","待蒸锅中的水烧开后，将装有 南瓜 的盘子放入蒸锅中。","盖上锅盖，保持大火蒸 **15-20 分钟**，直至南瓜变软，可以用筷子轻松穿透。","关火，小心取出盘子。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"清蒸生蚝","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["生蚝","葱","蒜","姜","酱油","刷子"],"steps":["将生蚝用刷子刷干净（没有刷子用牙刷）。","蒸锅中放水，将蒸屉放上之后，将 6 个生蚝平铺在蒸屉,使用 50%功率，蒸 3 分钟。","用右手拿着湿抹布掀开烫锅盖，将每个生蚝的外壳掀开一半去掉，生蚝的凸面向下，平面向上，每个放 1 根姜丝,10g 蒜末放到生蚝上。","关上烫锅盖，100%功率蒸 3.5 分钟。","停火，用右手拿着抹布掀开烫锅盖，每个放 5ml 酱油。","盛盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"清蒸鲈鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["鲈鱼","香葱","姜","食用油","蒸鱼豉油","料酒","食用盐"],"steps":["姜切片切丝、香葱的葱白切段，葱绿切丝，切丝后放入冷水浸泡备用。","鲈鱼处理好后洗净，用厨房纸擦干，两面分别划几刀，用盐洗掉鱼身的粘液，并用 10g 盐抹遍鱼身的内外，腌制 10 分钟以上。","补充一个鲈鱼改刀和摆盘的方法，改刀后可以让鲈鱼立起来蒸，均匀受热，同时吃起来更加方便，无需翻面。","鱼肚内塞上姜和葱白，鱼身也撒上姜和葱白，量为备用的一半。蒸鱼的碟子用筷子将鱼跟碟子隔开蒸","水烧热感觉到水温后放进入鱼","大火清蒸 10 分钟。","蒸好的鱼，用干净的盘子装起来并去除身上姜蒜","鱼身浇上 15ml 蒸鱼豉油"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"清蒸鳜鱼","time":20,"level":"中等","tags":["肉菜","家常","开源","鱼"],"ings":["鳜鱼","大葱","小葱","生抽","红辣椒","姜片","食用油"],"steps":["**食材处理**：","**炒制过程**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"温泉蛋","time":20,"level":"中等","tags":["早餐","开源"],"ings":["鸡蛋","厨房用温度计","杯子（无特定要求","香葱"],"steps":["在锅中盛装一定量自来水，确保水面没过约鸡蛋 3cm，水中插入温度计","开火或打开电磁炉，逐渐调整电磁炉功率或火苗大小，使得水温保持在 **70 摄氏度**","将鸡蛋放入锅中。鸡蛋不可互相堆叠，应皆在底部，并留有空间可以晃动","保持当前温度 **25 分钟**","准备一杯冰水","捞出鸡蛋，并立刻放入冰水中，**等待 3 分钟**","将鸡蛋打入小碗，完成制作"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"湖南家常红烧肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["带皮五花肉","干小米椒🌶","姜","生抽","老抽","香叶","桂皮","八角"],"steps":["带皮五花肉洗净冷水下锅，加入姜片 2~3 片去腥味，煮到沸腾捞出冷水冲净白沫","五花肉切块，尺寸 1.5cm*1.5cm 块状大小","热锅加入油，加入冰糖小火搅拌至焦糖色即可，加入切好的五花肉，中火翻炒上色","加入备好的姜片、八角、桂皮、生抽、老抽、料酒、干小米椒、盐，小火翻炒 1 分钟，加开水没过肉","加盖中火煮沸，转小火慢顿 30 分钟，慢炖期间，间隔 10 分钟搅拌一次防止粘锅","小火慢炖汤汁剩三分之一的时，调成中火收汁出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"湘祁米夫鸭","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["鸭子","糯米粉","粘米粉","蒸肉粉","细辣椒粉","白胡椒粉","五花肉","姜蒜"],"steps":["将糯米粉、粘米粉、蒸肉粉、细辣椒粉、5 克盐、白胡椒粉倒一起搅匀","鸭子让热心摊主剁成蒸煮块，姜切片，蒜子剥皮，五花肉切片即可","热锅凉油煸炒五花肉出油，再加食用油烧热，下入鸭子煸炒","鸭子煸炒到表皮焦变色，下入姜蒜和盐继续煸炒香味","关小火倒入米粉翻炒，鸭肉均匀裹满米粉子，加入开水，少量多次的加，边加边翻炒","翻炒鸭肉和米粉有湿感，铲出入碗中，高压锅放水蒸 20-25 分钟","出锅前撒点葱花即可享用了"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"溏心蛋","time":20,"level":"中等","tags":["早餐","开源"],"ings":["鸡蛋","水","秒表"],"steps":["将鸡蛋放入电锅中。鸡蛋不可互相堆叠，应皆在底部，并留有空间可以晃动","倒入淹过鸡蛋约 2 公分的冷水","开盖，使用最大功率加热至水滚起（大约 85 - 95 度，稍微滚动，不需完全沸腾）","关火，盖上盖子，让鸡蛋静置。","沥干水分，用冷水冲洗鸡蛋约 1 分钟，即可去壳食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"澳门湿版免治牛肉饭","time":30,"level":"简单","tags":["肉菜","家常","开源","牛肉","饭"],"ings":["牛肉末","洋葱","鸡蛋","黄油","小葱","生抽","老抽","番茄酱"],"steps":["将 200g 牛肉末放入碗中，加入 1 汤匙生抽、半汤匙白糖和 2g 黑胡椒，搅拌均匀，**等待腌制 10 分钟**。","将半个洋葱切成小丁，备用。","调制料汁：在碗中加入 2 汤匙生抽、2 汤匙番茄酱、1 汤匙料酒、1 汤匙淀粉、半汤匙老抽和 50ml 清水，搅拌均匀备用。","另起一锅，制作一个水波蛋或半熟煎蛋，备用。","热锅，放入 10g 黄油。待黄油融化后，放入洋葱丁，小火煎熟至散发香味。","加入腌制好的牛肉末，与洋葱一起翻炒至牛肉变色。","倒入调好的料汁，撒上 2g 黑胡椒，继续炒制直至汤汁变粘稠后关火。","将炒好的免治牛肉浇在热米饭上，放上提前准备好的水波蛋或半熟煎蛋。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"火腿饭团","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["火腿","米饭","水","冷冻青豆","冷冻玉米粒","海苔碎","喜欢的沙拉酱"],"steps":["将米饭和水放到电饭锅里，点击米饭模式，等待完成","冷冻玉米粒和青豆放到锅里，加水没过所有食材，沸腾后静待 2 分钟后，捞出。","火腿切成 1cm 的方块","与此同时，加入 10ml 食用油，加入火腿翻炒至火腿上色","将米饭，火腿，海苔碎，青豆，玉米粒，沙拉酱放入碗中，混合均匀即可","装盘（如果有的话）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒凉粉","time":15,"level":"中等","tags":["主食","开源"],"ings":["凉粉","玉米油","大蒜","香葱","豆瓣酱","生抽","老抽","食盐"],"steps":["凉粉改刀切麻将块大小","开小火，起锅烧油，锅烧微热后，下入蒜末爆香后加入豆瓣酱炒出红油","将凉粉块下入锅中，翻炒 10 秒","加入生抽提味，老抽上色，翻炒均匀后加入辣椒面继续翻炒均匀","加入食盐、十三香继续翻炒 10 秒","加入准备好的矿泉水，再次翻炒 10 秒，待汤汁浓稠后，关火出锅装盘","撒上葱花即可完成"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒年糕","time":30,"level":"中等","tags":["主食","开源"],"ings":["年糕/白粿","葱","调味料"],"steps":["锅中加水烧开，煮熟年糕，碗中加水确保年糕不会粘连，捞起年糕备用。","小葱切葱花（将葱白和葱叶分开），青菜切小段备用。","热锅，加入 30ml 食用油。","将葱白倒入锅中，直至大部分葱白变成焦黄色且发出香味，倒出葱油备用。","重新热锅，加入 20ml 食用油。","加入所有辅料（鸡蛋，青菜等），翻炒均匀。","将年糕的水倒掉，向锅中加入年糕。","加入酱油和盐，翻炒均匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒意大利面","time":30,"level":"中等","tags":["主食","开源","面"],"ings":["意大利面","肥牛片","番茄酱 / 黑胡椒酱","菜籽油"],"steps":["加入 250 克水 / 人","待水烧开，下入面条，中火煮 15 - 20 分钟（这个面通常比较硬，捞起来之前最好尝一下，中心如果有一点硬，需要继续煮）","捞出面条，盛入盘中备用","热锅倒入食用油，待油温中热，下入面条翻炒一分钟（如果太干，加入少量水）","放入 10 克番茄酱、肥牛、加入 2g 食盐，继续翻炒一分钟","起锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒方便面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["方便面","鸡蛋","火腿肠"],"steps":["将火腿肠撕开包装，切成宽度 1cm 的小块。","向煮锅中加入 1200 ml 水，实际以没过面饼为准。完全煮沸，不要在未沸腾时加面。","加入方便面面饼，煮 45 秒。煮的过程中将其挑动，把面条打散。","面条打散后立刻关火。不要煮熟！","从锅中舀出 80ml 热面汤备用。","将面汤和面分离。用凉水冲一下面条。","沥干面条上的水分。不要长时间将面泡在水中。","准备一个小碗，将方便面的调料包挤进去。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒河粉","time":30,"level":"中等","tags":["主食","开源"],"ings":["炒河粉、猪肉/牛肉","炒料","其他调味料"],"steps":["小葱切碎（葱白和葱叶分开）、蒜瓣拍碎，丢案板上备用。","打碎鸡蛋，捞一点蛋清到一只碗中，剩下的丢入另一只碗中备用。","将绿豆芽放入锅中，大火煮 60 秒。豆芽捞出，过凉水，放入盘中备用。","黄瓜切丝放入盘中备用，可和豆芽丢一起。","处理面筋，单独丢一个盘中。","肉切细条状，加入淀粉与刚刚碗中的鸡蛋清、胡椒粉，顺时针拌匀。","注：超市购买来的凉皮表面一般会有食用油，可以使用自来水清洗。面筋同样。","注：清洗面筋之后，请用手将面筋中的大量水分挤出（不需过于用力）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"炒滑蛋","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["鸡蛋","牛奶"],"steps":["鸡蛋加入牛奶以及 5ml 食用油搅拌均匀，备用","大火烧热平底锅约 30s, 加入 5ml 食用油","烧 30s 转小火, 并且放入搅拌好的鸡蛋","在锅中静置 5 秒后，用锅铲将蛋液从边缘缓慢推向中间","翻炒至鸡蛋大致凝固后关火，装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"炒茄子","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["茄子","八角","虾皮","香葱","肉末","酱油","糖","醋"],"steps":["将茄子洗净，一刀分为两段（竖切）。每段的茄子切菱形块，将切好的茄子放入碗中待命。","将香葱洗净，并切成葱花放到案板上待命。","切好八角，放到案板上待命。","如果打算放肉末，先用 10 ml（如果是纯瘦肉，用 15 ml）油中火炒至变色（约 1 分钟），然后盛出备用。","开火热锅，直至锅内没有水。","往锅内倒食用油，没过锅底的两倍（油可以多加，但不可少加）。","热油约 6 成熟，放入八角、虾皮、香葱这三种可选性材料。","如果没有八角等可选材料，热油至 9 成熟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"炒青菜","time":10,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["青菜"],"steps":["青菜掰成小瓣，用清水洗净，备用。","将蒜瓣剁碎，备用","中火或大火热锅后，锅内放入 10-15ml 食用油。再等待 30 秒让油温升高。","将准备好的青菜倒入锅中，翻炒至青菜变软（约 1 分钟）。","放入剁碎的蒜瓣","倒入计算好的清水，水位应当完全浸润或即将没过青菜，加入食盐 （2g * 份数），继续翻炒约 1 分钟。","最后加入白糖小火加热 2 分钟，加热时盖上锅盖。","盛盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炒馍","time":20,"level":"中等","tags":["主食","开源"],"ings":["馒头","盐","油","孜然粉","五香粉","小葱","鸡蛋"],"steps":["将馒头切成小块或小片。","选有鸡蛋的话将鸡蛋打进碗里，打散（可加盐和五香粉各 1g 或不加，等炒的过程中加）。","鸡蛋浇在馒头上，拌匀，鸡蛋不宜过多。","大火热锅，倒入食用油（不锈钢锅怕伤锅的话可以先倒油，烧至油热也可也可）","将馍丁放进去翻炒，翻炒均匀。","将火调小，炒至馍丁呈金黄色。","放入盐，胡椒粉，五香粉。","最后将葱花放入一起翻炒几下。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"炸串酱料","time":20,"level":"简单","tags":["调料","开源"],"ings":["干辣椒面","孜然粉","胡椒粉","五香粉","花椒粉","十三香","麻辣鲜","白芝麻"],"steps":["所有原料在容器内混合，搅拌均匀。","锅里烧热油，油的用量以在容器内没过所有原材料为佳。","分三次淋入热油，每次 1/3，同时搅拌。","最后放入香油 10ml，生抽 10ml，花椒油 10ml，蚝油 10ml。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"炸薯条","time":25,"level":"简单","tags":["半成品","开源"],"ings":["1 袋半成品薯条"],"steps":["开封大分量半成品薯条注意开口要小，可以有效减少长久储藏下薯条表面结霜。","插电，200℃预热 5 分钟。","预热的目的是为了确保放入食材的时候锅内温度已经处于烹饪所需温度。","注意，预热完再拿出薯条，不应等薯条软化后再炸制。","取出薯条放入空气炸锅，200℃20 分钟。","取出薯条的时候注意半成品薯条已经有油，所以要异步去做客户端内刀斯林的话需要使用夹持工具。","5~10 分钟时可以拿出锅体晃动使薯条受热均匀也防止粘连。","10 分钟~15 分钟时，拿出锅体，往已经干了的薯条表面喷 1 层面积为薯条表面积 2/3 的油。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"炸酱面","time":20,"level":"中等","tags":["主食","开源","面"],"ings":["肉丁/肉末","面条","蒜","菜码（根据个人喜好选择","豆瓣酱","甜面酱"],"steps":["菜码切丝备用。","葱切碎。油锅烧热，下葱和肉，炒至肉完全熟透（无红色）","下豆瓣酱和甜面酱，继续炒至**微微粘稠**。盛出，得到*炸酱*。","取大碗，加凉水备用。","煮面条至断生（无白芯），盛入第 4 步装有凉水的碗中。","立即控水捞出，盛入干净的碗中。","取第 3 步炸酱，倒入碗中，拌匀。然后取第 1 步菜码，倒入碗中，拌匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"炸鲜奶","time":30,"level":"中等","tags":["甜点","开源"],"ings":["牛奶","玉米淀粉","低筋面粉或普通面粉","面包糠","鸡蛋","白糖","大约"],"steps":["从牛奶中取出 80ml，与玉米淀粉混合，搅拌至没有可见颗粒","将剩余的 170ml 牛奶和白糖倒入锅中，小火加热并持续搅拌，直至白糖完全溶解","再次搅匀玉米淀粉液，将其缓慢倒入锅中，同时持续搅拌","保持小火加热并不断搅拌约 3 - 5 分钟，直至奶糊浓稠，刮过锅底后留下的纹路能保持 3 秒不消失","在耐热容器内壁均匀涂抹约 2ml 食用油，倒入奶糊并将表面抹平，使奶糊厚度约为 2cm","奶糊冷却至室温后盖好，放入冰箱冷藏至少 2 小时；轻按表面不粘手且整体不会流动时即可取出","将定型后的奶糊脱模，切成约 6cm × 2cm × 2cm 的长条，共约 12 条","将面粉、打散的鸡蛋液和面包糠分别放入 3 个容器"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"烙饼","time":20,"level":"中等","tags":["主食","开源"],"ings":["油","面粉","电饼铛"],"steps":["将 400g 面粉倒入盆中，一半用凉水和面，一半用热水和面，搅拌成面絮，用手揉成团。用保鲜膜封起来，醒面 40 分钟","离醒面完成时间还有 10 分钟时，请查看[小技巧](../../condiment/油酥.md)中的油酥做法（热油酥效果更好）","醒好的面不用揉，稍微摁一下，用一横刀一竖刀将其分成四份。","搓圆，擀开，擀成与电饼铛大小差不多的饼，取 1/4 的油酥，将饼表面涂抹均匀","沿饼的半径切开，从外圈将其卷成圆锥形，然后将圆锥尾部捏好，防止油酥外漏。","按压面饼圆锥尖的地方，将其压扁，然后再次擀成与电饼铛大小差不多的面饼（厚度约为 3mm）","将电饼铛预热，涂上凉油（热锅凉油），将擀好的饼放入电饼铛中，将饼的上方也刷点油，涂抹均匀（锁住水分），盖上盖子","大火烙一分钟，打开盖子，将饼翻个面再烙一分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"烤箱版巴斯克芝士蛋糕","time":20,"level":"简单","tags":["甜点","开源"],"ings":["奶油奶酪","白砂糖","鸡蛋","鸡蛋黄","淡奶油","低筋面粉","巧克力"],"steps":["奶油奶酪软化，微波炉 10s + 10s。","奶油奶酪加入白砂糖，打蛋器打至顺滑。","加入 2 个全蛋 + 1 个蛋黄，搅拌均匀。","加入淡奶油，搅拌均匀。","加入低筋面粉，搅拌均匀。","烤箱 220°(425°F)，20 - 25 分钟（本人一般 20 或者 22 分钟）。","放凉之后放入冰箱，最好过夜。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"烤茄子","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["茄子","食用油","酱油","蒜蓉","辣椒","孜然","食用盐"],"steps":["将酱油、孜然、食用盐、蒜蓉和切碎的小米椒置于碗中，均匀搅拌备用","茄子洗净，用纸巾擦干表面的水分","用叉子在茄子的一侧扎 4-8 下","使用 15-25ml 的食用油涂满茄子表面","将烤箱温度设置为 200℃ （打开烤箱风扇 大火），预热 2 分钟","将茄子放入烤箱中层或者上层，烤制 12-15 分钟 （茄子表面有褶皱，且能按压 0.3-0.5cm 的深度即可）","取出茄子，用刀茄子上竖着划一个口子。口子居中，上下距 1-1.5cm","用小刀或者叉子伸入口子，竖着切割茄子内部"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"烤蛋挞","time":20,"level":"中等","tags":["甜点","开源"],"ings":["蛋挞皮 品牌不限","鸡蛋","牛奶","淡奶油","白砂糖","克数称","筛网 网孔约为"],"steps":["将碗置于克数称上 称量 450 克 淡奶油（淡奶油密度在此处记为 1 ）","加入 80 克白砂糖 （甜度中等 可按个人口味增减 建议范围 60-100 克）","加入 200 克牛奶 （牛奶密度在此处记为 1 ）","取 8 个蛋黄加入 蛋清可留作他用","均匀搅拌所有材料直至白砂糖全部融化","使用网筛对搅拌完成的食材进行过滤 滤除鸡蛋黏膜 鸡蛋壳 未融化的白砂糖 结块的淡奶油","此时请将烤箱设置 220 摄氏度开始预热（约 10 分钟） 记得拿出烤盘","将蛋挞皮以 0.5 厘米的间隔均匀放置于烤盘中"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"烤鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["大葱","料酒","白胡椒粉","食用盐","大蒜","桂皮","八角","香叶"],"steps":["草鱼（一般 3 斤 ）从背部切开，两面沿着鱼的背部往下划几刀，不要划到鱼肚皮，不然不易定型","把鱼放到容器中，加入料酒，10g 白胡椒粉，5g 食盐抹匀腌制二十分钟入味。","把半根大葱切成一块一块，大蒜粒中间切开，和八角香叶桂皮放在一个容器中","干辣椒段中间一分为二切开并和灯笼椒装在一个容器中","芹菜切小段","豆芽焯水","千张焯水切成丝","洋葱切成丝。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"烤鸡翅","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡翅中","盐","黑胡椒粉","酱油","料酒"],"steps":["鸡翅放入碗中","加盐、黑胡椒粉、酱油、料酒进行腌制 30-40 分钟","将烤箱预热至 200℃","将腌制好的鸡翅均匀地放在烤盘上","将烤盘放入烤箱中层，烤 15-20 分钟","取出烤盘，将鸡翅翻面，再烤 15-20 分钟，直到熟透"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"热干面","time":20,"level":"中等","tags":["主食","开源","面"],"ings":["热干面特有的碱水面","小葱","酸豆角","肉末","蒜水","肉汤汁","萝卜干","芝麻酱"],"steps":["水煮沸，并加入碱水面，焯烫 25 秒钟捞起","撒上食盐、鸡精和胡椒粉","芝麻酱用 90ml 水稀释，搅匀，然后加入","加入 5ml 酱油，加入 30ml 肉汤汁和蒜水","加入萝卜干，肉末，酸豆角，葱花","拌均匀后开吃"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"煎烤羊排","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["羊排","桂皮","花椒","八角","白芷","香叶","盐","料酒"],"steps":["将羊排按照骨头分布，切成块状。","炒锅中加入冷水，放入全部羊排块，水沸腾后继续焯水 2 - 3 分钟，捞出备用。","将焯好水的羊排、桂皮、花椒、八角、白芷、香叶、料酒放入锅中（高压锅或普通锅）。","加入饮用水没过所有食材。如果使用高压锅，上汽后压 30 分钟。如果使用普通锅，炖煮 80 分钟。","将炖煮完成的羊排捞出，沥干水分，放入无油无水的炒锅 / 煎锅中。","中大火煎 6 - 7 分钟，直至羊排中的油脂被煎出，*表面呈金黄酥脆状态*。","锅中保留煎出的羊油，加入辣椒粉、孜然粒、烧烤撒料、孜然粉、白芝麻，翻炒均匀。","加入糖和盐（如果在炖煮步骤中未添加），翻炒均匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"煎饺","time":15,"level":"简单","tags":["早餐","开源"],"ings":["饺子","芝麻、葱花或其他配料"],"steps":["取出平底锅（不沾平底锅最佳）","加入 10ml - 15 ml 食用油","开火，放入饺子（尽量平均铺开，不宜堆叠）","立刻加入清水，水线没过饺子平均高度的 1/2","盖上锅盖（此时炉灶应该处于大火）","等待 8 - 10 分钟","当锅中水分仅剩 2mm 时， 转中火开始煎制","当水分全部蒸发后，摇晃平底锅使饺子受热均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"照烧鸡腿饭","time":20,"level":"中等","tags":["主食","开源","鸡","饭"],"ings":["鸡腿","料酒","生抽","蜂蜜","黑椒碎","黑椒粉","盐","西兰花"],"steps":["取一只鸡腿，鸡皮朝下放在砧板上","用刀尖沿着鸡腿骨头的轮廓轻轻划开，从一端到另一端","用手指或刀背慢慢推开鸡肉，让骨头暴露出来。如果遇到筋膜，用刀尖切断","当鸡肉完全分离后，握住骨头一端，轻轻扭转并拔出","重复上述步骤将所有鸡腿去骨","去骨鸡腿加入黑胡椒粉、黑胡椒碎、盐、姜片腌制 5 分钟","碗里加入料酒、生抽、蜂蜜、老抽清水拌匀","蔬菜焯水 1-2 分钟煮熟捞起"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"煮泡面加蛋","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["泡面","鸡蛋","水"],"steps":["先将水加热至沸腾（火候不做严格要求，使用热水会更快）","将取出的面饼放入锅中","将泡面里附带的佐料放入锅中","取出筷子轻微拨动泡面，使佐料充分溶解，面饼充分浸泡受热","盖上锅盖等待约 1 分钟至锅内水再次沸腾","去壳鸡蛋，加入锅中","等待约 3 至 4 分钟，即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"煮锅蒸米饭","time":25,"level":"简单","tags":["主食","开源","饭"],"ings":["北方大米","水"],"steps":["清洗大米","将米和水加入煮锅","大火煮至水沸腾","**搅拌底部防止粘黏**","盖上锅盖，转**小火**加热 10-15 分钟（根据对软糯程度的喜好），中途切勿打开锅盖","关火，静置 5 分钟","Enjoy :)"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"燕麦鸡蛋饼","time":20,"level":"简单","tags":["早餐","开源","鸡蛋","鸡"],"ings":["鸡蛋","燕麦","牛奶","可根据口味选择增加"],"steps":["将牛奶与干燕麦混合搅拌均匀至黏稠状。","将鸡蛋搅拌均匀至颜色单一程度。","将鸡蛋液倒入燕麦牛奶中继续搅拌至黏稠、均匀。","平底锅中加入一层黄油并覆盖均匀。","下入搅拌好的食材，并摊开至饼状。","小火加热两到三分钟。如想要加入蔬菜，可以在加热过程中加入碎菜叶。","翻面继续加热两分钟。","出锅，搭配剩下的牛奶作为早餐。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"牛奶燕麦","time":20,"level":"简单","tags":["早餐","开源"],"ings":["牛奶","燕麦","鸡蛋"],"steps":["将牛奶倒入早餐杯（冷的即可）","准备好 200ml 水，如果是直饮水直接加入燕麦，否则请烧开后加入燕麦","水沸后 2 分钟，燕麦煮好","煮好的燕麦捞出倒入牛奶中（尽量不要将煮燕麦的水也倒入牛奶，影响口感）","将燕麦替换为快煮燕麦","将牛奶倒入装有快煮燕麦的容器中并搅拌","将混合物放入微波炉中","中等火力微波 4 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"牛排","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["锡箔纸","汤匙","牛排","橄榄油","黄油","盐","黑胡椒粉","大蒜"],"steps":["从冰箱中取出牛排解冻。","将小番茄，小土豆和口蘑洗净，对半切开备用。","将大蒜剥皮，留 5-8 个较大的蒜瓣，用刀背**压扁**备用。","牛排的预处理","将炉灶打开高火（见附录对于火力大小的说明），同时锅中加入橄榄油，热锅 15-30 秒。","热锅至油温 6-8 成（参见[油温判断技巧](./../../../tips/advanced/油温判断技巧.md)），将牛排由近及远的缓慢放入锅中。","如果您使用了土豆作为配菜，可以将土豆放入碗中，然后放进微波炉加热 10 分钟，或者放入开水煮 3-5 分钟。","翻面，再煎制 1.5 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"牛油果拉西","time":20,"level":"简单","tags":["饮品","开源"],"ings":["原味酸奶","熟透的牛油果","蜂蜜","冷牛奶","小豆蔻粉","薄荷叶或坚果碎（可选","搅拌机"],"steps":["将牛油果对半切开，去核，剥去外皮，将果肉切成小块备用。","在搅拌机中加入 120ml 原味酸奶、切好的牛油果块、1 汤匙蜂蜜以及 60ml 冷牛奶。","（可选）加入一小撮小豆蔻粉以增加独特风味。","启动搅拌机，**搅拌大约 1 分钟**直至液体变得完全顺滑和浓郁。","将打好的饮品倒入杯中。","（可选）在表面放上几片薄荷叶或撒上 5g 切碎的坚果作为装饰。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"牛油火锅底料","time":20,"level":"进阶","tags":["半成品","开源"],"ings":["牛油","纯猪油","豆瓣","糍粑辣椒","老姜","大葱","洋葱","大蒜"],"steps":["锅置旺火（大火）放入牛油烧至 八成热(240±10°C) 时放入 `老姜、大葱、洋葱、大蒜 (各100g)`，炸干（吸尽异味（牛油腥味））后捞出扔掉。","放入 `(色拉油 || 菜籽油)、纯猪油`，等待锅中油温下降到 五成热(150±10°C) 时放入 `糍粑辣椒` 持续翻炒 5-8 分钟。","放入 `豆瓣` 炒散，转用 **中小火** 慢炒至料渣略发白翻砂（发出沙沙声）。","油在外观呈现樱桃红时放入 `姜片(150g)、大蒜(100g)` 炒香，大约 15 秒。","放入 `豆鼓、豆母子` 炒香，放入 `红花椒、小茴香` 炒香。","（老油） 此刻放入 颗粒香料","放入 `麦芽粉` 炒散，放入 `白酒` 炒散。","起锅装入容器中，静置于温度低的环境(10-20) 5 天后再使用效果最佳。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"猪油拌饭","time":20,"level":"简单","tags":["主食","开源","饭"],"ings":["米饭","猪油","生抽","老抽","蚝油","葱花","猪油渣"],"steps":["碗底铺猪油","加入米饭","淋上酱油与蚝油","撒上葱花和猪油渣","搅拌均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"猪皮冻","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪皮"],"steps":["将猪皮，剁成不超过 10cm 小块，用清水浸泡 12 小时，然后冷水下锅，加入姜 10g、料酒 50ml 后，汆烫 5-10 分钟，捞出放入冷水中","将焯过水的猪皮，放到案板上，将里面的白肉部分全部剔除，然后再切成成不超过 3mm 的长条，放入盆中","加入白醋 20g，盐 5g，用力搓洗 3 分钟，再用清水洗净，这时的猪皮已经基本没什么腥味","锅内加入 4kg 水，放入猪皮，葱 10g，姜片 10g，八角 10g，花椒 5g，大火烧开后，小火煲煮 90 分钟至猪皮软烂","再加入盐 8g、味精 10g、鸡精 15g、生抽 50ml、老抽 20ml 调味后，倒入盘中，将葱姜，八角拣出，晾凉至果冻状","放冰箱冷藏即可，食用时，切成小块或者厚片"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"猪肉烩酸菜","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["猪五花肉或猪肉排骨","东北酸菜","大葱","姜","蒜","盐","生抽酱油","五香粉"],"steps":["大葱切段；生姜 50 克切段， 50 克切末；大蒜切末，备用。","全部酸菜切丝，用水冲洗 2 ～ 3 遍备用。","排骨和五花肉入锅，倒入冷水淹没。放入全部葱段， 50 克生姜段和料酒 20 毫升。大火煮开后，等待 5 分钟。关火，将排骨和五花肉捞出，冷水冲洗掉浮沫，备用","煮好的五花肉切片或者切块，备用。","将之前的锅洗干净，并且擦干（不然加入油会崩出来）。","锅中加入油，开中火，放入姜蒜末爆香，放入五花肉和排骨。将五花肉和排骨煎至金黄，倒入 10 克五香粉和 15 克 生抽酱油，用铲子翻动 1 ～ 2 分钟。","将冲洗好的酸菜丝加入锅中，翻炒 3 分钟。","倒入纯净水至刚好没过食材，加入 2 颗大料，转大火，直到锅中水沸腾。转中火，盖锅盖焖煮。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"玉米排骨汤","time":20,"level":"中等","tags":["汤","开源"],"ings":["排骨","玉米","胡箩卜","生姜","大葱","食用油","醋","料酒"],"steps":["大葱切成 3-4cm 的大段，用刀背拍一下","玉米剁成小块","胡箩卜切成滚刀块","生姜去皮切大片","新鲜的排骨砍成小块","排骨凉水下锅，放入大葱、生姜、料酒开始焯水，大火烧开，撇去浮沫，捞出排骨，沥干水分","热锅凉油，切大片的生姜和排骨一起下锅煸炒，待排骨表面微微焦黄，放入醋（可加速肉质软烂），继续煸炒一分钟","冲入开水，一次给足，之后就不要再加了，大火烧开"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"玛格丽特饼干","time":45,"level":"中等","tags":["甜点","开源"],"ings":["熟蛋黄","黄油","白砂糖","盐","低筋面粉","玉米淀粉"],"steps":["黄油隔热水融化、将蛋黄磨碎备用。","在融化的黄油中添加糖、盐、以及碾碎的鸡蛋黄，搅拌均匀","加入低筋面粉与玉米淀粉，揉成面团","将面团均匀分割成大约 8 克重的小面团，然后将它们搓成球状。","使用大拇指轻压在每个小面团上，以形成裂纹。","预热烤箱至 150℃，将小面团放入烤箱中，烘烤 20 分钟。","微微放凉即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"甜辣烤全翅","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["鸡全翅","生抽","老抽","蒜粉","胡椒粉","糖","甜椒粉","辣椒粉"],"steps":["将 4 个新鲜鸡全翅取出，在翅中两根骨头之间用刀划开表皮，正反面各一刀","用勺子将酱汁均匀的抹在鸡全翅上，尤其是翅中的刀口处，大约花费 3 分钟","用保鲜膜盖住防油腌制中鸡全翅的碗，放入冰箱冷藏格静置 120 分钟","取出鸡全翅，锡纸盘中放入鸡全翅 4 个，将碗中残余酱料均匀倒在鸡全翅上","锡纸盘放入空气炸锅的烤篮上，用 200 摄氏度烤 25 分钟","打开空气炸锅，小心取出锡纸盘，将鸡全翅翻面","继续 200 摄氏度烤 25 分钟","取出即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"生汆丸子汤","time":20,"level":"中等","tags":["汤","开源"],"ings":["前腿肉","盐","胡椒粉","葱姜花椒水","一个鸡蛋的鸡蛋清","土豆淀粉","熟豆油","木耳"],"steps":["肉改刀切开，肥瘦三七分","上刀剁一剁，用刀背砸一砸，把肉筋打开打松疏","剁一剁，砸一砸，剁成肉末，要想好吃得自己剁，机器打的太黏糊了","每斤肉，6 克盐，1 克胡椒粉","上手抓匀","葱姜花椒水分次加，边加边搅，用手揉匀，让肉吸饱水。每斤肉末 80 克葱姜花椒水","放入鸡蛋清，继续顺着一个方向搅","加入 40 克土豆淀粉，搅匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"田螺酿","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["大田螺（乒乓球大小","猪肉（250g","新鲜薄荷叶（一小把","紫苏叶（一小把","生姜","葱","桂林三花酒","生抽"],"steps":["上午买回田螺，放入清水盆中，静置一下午吐沙","可在水中滴几滴香油（或者芥末~）加速吐沙","用刷子将田螺外壳刷洗干净（这一步可以时间久一些）","用老虎钳或菜刀剪去田螺尾部（约剪掉 1/3 到一半）","大锅烧水，水开后放入田螺焯烫 1-2 分钟（时间不可太久，螺肉会老）","捞出后用牙签挑出螺肉，去掉螺盖和黑色泥肠","螺壳用水冲洗干净，甩干水分备用","螺肉用盐抓洗干净，剁成碎粒（不要剁成泥，保留颗粒感才有嚼头）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"电饭煲三文鱼炊饭","time":20,"level":"简单","tags":["主食","开源","鱼","饭"],"ings":["有盐牛油","三文鱼","米","粟米","金菇","冬菇"],"steps":["三文鱼去鳞，去骨","金菇、冬菇切碎","洗米三次","把三文鱼、米、牛油放入电饭煲","想口感浓厚一点，可以加多一汤匙牛油","根据电饭煲的刻度放水","把电饭煲調較至煲飯模式，等待大約 30 - 45 分鐘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"电饭煲蒸米饭","time":20,"level":"简单","tags":["主食","开源","饭"],"ings":["江南米或北方大米","水"],"steps":["清洗米","将米和水一起加入电饭煲中。","连接电饭煲电源，进入加热模式。等待大约 30 分钟。","待电饭煲自动进入保温模式后。","将米在电饭煲中闷 10-15 分钟。","盛出米。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"番茄牛肉蛋花汤","time":20,"level":"中等","tags":["汤","开源","番茄","牛肉"],"ings":["牛肉","番茄","鸡蛋","葱、姜、蒜","盐","胡椒粉"],"steps":["牛肉切成薄片","番茄切成小块","葱切成葱花","姜切成姜片","蒜剁成蒜泥","牛肉放入碗中","加盐、胡椒粉腌制 15-20 分钟","加水煮开"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"番茄红酱","time":20,"level":"中等","tags":["肉菜","家常","开源","番茄"],"ings":["碎牛肉","蒜瓣","胡萝卜","芹菜","洋葱","橄榄油","糖","食盐"],"steps":["将胡萝卜、芹菜、洋葱切碎，蒜瓣切片。","加入 10ml 橄榄油，热油下锅蔬菜，大火翻炒开始略微变色后盛出。","锅内加油 10ml，加蒜翻炒 10 秒，加入碎牛肉、糖、盐、胡椒粉和香料将牛肉炒脆（有颗粒感）。","加入炒好的蔬菜们和番茄酱继续翻炒，搅拌均匀。","分多次缓缓倒入牛奶，中小火煮 30 分钟，完成。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"瘦肉土豆片","time":20,"level":"中等","tags":["肉菜","家常","开源","土豆"],"ings":["纯瘦肉","土豆","蒜苗","生粉","生抽","老抽","食用盐"],"steps":["土豆去皮、对半切开，再切成约 2mm 的薄片，备用","蒜苗洗净，切成约 1cm 的段，备用","瘦肉洗净切成约 2mm 的薄片，放入碗中，加入 5g 生粉、5g 生抽、3g 老抽腌制十分钟，备用","瘦肉腌制时，烧一锅开水，将土豆片放入锅中，焯水，约 5 分钟","热锅，锅内放入 10ml - 15ml 食用油。等待 10 秒让油温升高","放入瘦肉，翻炒至变色，倒入蒜苗一起炒，蒜苗炒约 20 秒","放入土豆，保持翻炒，加入 2g 食用盐、5g 生抽，","炒约 3 分钟，盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"白灼菜心","time":15,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["新鲜菜心","生抽、蚝油、盐","大蒜、小米辣","食用油"],"steps":["大蒜切成蒜末，有洋葱顺便加了点洋葱","调制灵魂料汁：生抽 5g 吧、蚝油 5g，加 3g 糖和 100g 清水半碗成一碗汁儿","一锅 500ml 清水加 5g 盐和 10g 食用油烧开","将菜心根茎在沸水中烫 1 分钟，直到根茎颜色变成深绿。再将整个菜心放到锅中烫熟 1 分钟，捞起来码入盘中","料汁稍微收汁，煮沸后稍等十来秒吧，后直接浇在菜心上，不要特别多，但蒜末还是很给力的不要少蒜"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"白灼虾","time":15,"level":"简单","tags":["水产","海鲜","开源","虾"],"ings":["活虾","洋葱","姜","蒜","葱","食用油","酱油","料酒"],"steps":["洋葱切小块，姜切片，平铺平底锅。","活虾冲洗一下（去除虾线、剪刀减掉虾腿虾须子都是可选操作），控水，铺在平底锅的洋葱、姜片之上。","锅内倒入料酒，盖上锅盖，中火 1 分钟，小火 5 分钟，关火 5 分钟。","和上一步并行操作，制作蘸料：","虾出锅，用干净的盘子装好。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"白菜猪肉炖粉条","time":45,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","白菜","土豆干粉条","十三香","鸡精","食用盐","老抽","生抽"],"steps":["锅内烧水，水开后放入干粉条，煮 5 分钟后同水一起倒出容器中，盖上盖子继续浸泡泡 备用（第一步先做这个，期间可以进行以下步骤）","五花肉切 3mm 的肉片，备用","大白菜嫩叶与白菜帮子分开切成 2 份菜片，备用","热锅，锅内放入 10ml - 15ml 食用油。等待 10 秒让油温升高","放入五花肉，保持翻炒至肉变色","加入老抽，炒 **1 分钟**，给肉上色","加入白菜帮子，加入食用盐、生抽，炒一分钟（如果粘锅，烹入 10ml 水）","加水没过所有食材，加入鸡精 ，十三香，沸腾后，将火调小然后**等待 20 分钟**"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"百香果橙子特调","time":20,"level":"中等","tags":["饮品","开源"],"ings":["原料","百香果","橙子","白砂糖","冰块","蜂蜜","薄荷叶或其他绿叶（可选","工具"],"steps":["百香果腌制（因为量小不好配置，这里是两次的分量）","茉莉绿茶调配（推荐比例=>茶 : 水 : 冰 = 1~2 : 50 : 30）","橙子的处理（可在泡茶期间处理）","正式调配"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"皮蛋瘦肉粥","time":20,"level":"中等","tags":["汤","开源","粥"],"ings":["饮用水","皮蛋","瘦肉","大米","小葱","香菜","生菜","生姜"],"steps":["大米 - 洗净 - 放入电饭锅内胆 - 加入 1 升 饮用水","瘦肉 - 洗净 - 简易晾去水分 - 加入 10ml 食用油 - 揉搓均匀 - 放入电饭锅内胆","皮蛋 - 去壳 - 洗净 - 对半切开 - 分离蛋白蛋黄 - 蛋白简单切碎块 - 蛋黄揉碎 - 放入电饭锅内胆","生姜 - 洗净 - 削皮 - 去除枯黄枯黑无法食用部分 - 切丝 - 放入电饭锅内胆","小葱 - 洗净 - 去除根部 - 去除枯黄枯黑无法食用部分 - 切碎 - 放入小碗备用","香菜 - 洗净 - 去除根部 - 去除枯黄枯黑无法食用部分 - 切碎 - 放入小碗备用","生菜 - 洗净 - 去除根部 - 去除枯黄枯黑无法食用部分 - 切碎 - 放入小碗备用","酱油 + 蚝油 + 盐 + 胡椒粉 - 搅拌均匀 - 放入小碗备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"皮蛋豆腐","time":20,"level":"简单","tags":["素菜","蔬菜","开源","豆腐"],"ings":["皮蛋","内酯豆腐","生抽","白砂糖","醋","香油","辣椒油","花生碎"],"steps":["先把皮蛋剥壳，切成四瓣。","嫩豆腐切块或者切片放中间。","将生抽、白砂糖、醋、香油、辣椒油调成酱汁，淋上去。","最后可选撒上花生碎、葱花、香菜。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"砂糖椰子冰沙","time":20,"level":"简单","tags":["饮品","开源"],"ings":["瓶装椰汁","咖啡调糖"],"steps":["500ml 瓶装椰汁倒掉 200ml，立刻拧紧瓶盖。","将这瓶椰汁放入冰箱冷冻区并冷冻 10 小时以上。","将这瓶椰汁取出，若确认瓶中椰汁已彻底冻结，则在墙角、椅背、桌角等坚硬表面上用力抽打。（请务必确认表面不会因此受到损伤）","当抽打到冻结椰汁变成冰沙状态，打开瓶盖倒出冰沙。","在冰沙表面均匀撒上咖啡调糖或坚果碎。","完成"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"空气炸锅照烧鸡饭","time":20,"level":"中等","tags":["主食","开源","鸡","饭"],"ings":["丽滋饼干","酱油","糖"],"steps":["将酱油、糖和醋混合在一起,搅匀料汁备用","另一个碗中加入鸡肉、鸡蛋、1/2 料汁和压碎的丽滋饼干。搅拌均匀","空气炸锅用箔纸碗铺底，加入肉饼混合物，将剩余的料汁均匀的倒在上面","**350°F(177°C)** 炸**40 分钟**。最好在米饭上食用","在外观*呈金黄酥脆*后出锅，切块盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"空气炸锅羊排","time":10,"level":"中等","tags":["半成品","开源"],"ings":["必备","可选"],"steps":["羊排放入碗中清水洗净血水","羊排用厨房纸吸干水分，双面抹上黑椒混合调味料、蒜蓉酱，静置腌制 20 分钟","锡纸碗放上烤架，羊排放在烤架上，撒上罗勒碎，黄油或烧烤料放在羊排上，空气炸锅 180° 10 分钟","羊排翻面，撒上罗勒碎，黄油（从锡纸碗里舀上来）或烧烤料放在羊排上，空气炸锅 180° 5 分钟（可以视个人喜好加一点时间，这里写的是不会焦的时间）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"空气炸锅脆皮现腌炸鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["新鲜鸡翅中","生抽","蒜粉","paprika","洋葱粉","黑胡椒粉","中筋面粉","淀粉"],"steps":["鸡翅中清洗后擦干水分，每个鸡翅两面各划 2 刀，方便入味。","调制腌料：生抽 15ml、蒜粉 8g、红甜椒粉 5g、洋葱粉 3g、黑胡椒粉 3g，牛奶或希腊酸奶 5ml（可选，让鸡肉更滑嫩）搅拌均匀。","将腌料和鸡翅中一起放到大 zip 保鲜袋里充分搅拌按摩，在冰箱里静置一晚。","裹粉：中筋面粉 60g、淀粉 30g、蒜粉 5g、红甜椒粉 5g、洋葱粉 2g、黑胡椒粉 2g、泡打粉 1g（可选，让外壳更酥脆）搅拌均匀。","裹浆（可选）：鸡蛋 1 个，牛奶或水 5ml，充分打散。","裹粉：将鸡翅中抖干水分，放入裹粉中轻轻按压，抖落多余的粉，一旁静置 10 分钟。","裹浆（可选）：如想要更饱满的外壳，可以再裹一层浆，然后重复裹粉步骤。","空气炸锅预热到 180°C，预热 5 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"空气炸锅面包片","time":20,"level":"简单","tags":["早餐","开源","面"],"ings":["面包片"],"steps":["取出两片面包片（建议使用粗粮面包片）","将面包片**垂直**放入空气炸锅","200°C 烘烤 5 分钟","取出即可使用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"空气炸锅鸡翅中","time":20,"level":"简单","tags":["半成品","开源","鸡"],"ings":["必备","可选"],"steps":["鸡翅从冰箱拿出来，鸡翼面朝下放入锡纸烤盘，撒上罗勒碎，盖上保鲜膜自然解冻 20 分钟","撒上罗勒碎，空气炸锅 200°C，10 分钟","翻面，撒上罗勒碎，空气炸锅 200°C，7 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"简易版炒糖色","time":20,"level":"中等","tags":["调料","开源"],"ings":["糖","冰糖","白砂糖","绵白糖"],"steps":["开火，并向锅中倒入 100ml 开水","再向锅中倒入 100ml 油，与第一步间隔越短越好，此时锅为大火中火都可以，着急的话可以大火","放入冰糖（如果冰糖过于耦合，可以提前敲碎，做到耦合度越低越好）","调整火力为中火","开始搅拌"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"简易红烧肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["注","主料","辅料"],"steps":["`猪五花肉`切大块（约 4.5cm ，冷冻半小时至一小时更好切）","`豆皮`切 2cm 的宽度","`生姜`切片（每片厚度约 3mm ）","`水`烧开","`鹌鹑蛋`煮熟并用`叉子`/`牙签`扎孔（尽量多些好入味）","`大葱`大葱白色的部分`葱白`","冷水锅中放入切好的`猪五花肉`，加入料酒与葱姜，煮 15 分钟去掉血腥","锅中放入两片`生姜`提味"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"米粥","time":25,"level":"简单","tags":["汤","开源","粥"],"ings":["米","水","植物油"],"steps":["（可选）将 Mo ml 的油与洗净的米混合，*尽量确保完全混合，即每粒米上至少都沾上少量油*","（可选）将 米-油混合物品冷藏保存，冷藏时间 Tc。","将米和水加入锅中。","开大火，加热到 T1。","在 T1 之前将火关小。**如果忘记此步骤，水可能会漫出而熄灭火焰。非常危险！**","加热到 Tr。在 Tr 时关闭火源。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"粉蒸肉","time":90,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","蒸肉米粉","生抽","老抽","料酒","郫县豆瓣酱","姜末","蒜末"],"steps":["将五花肉洗净，切成长约 5cm、宽约 3cm、厚度约 0.5cm 的肉片","将姜、蒜切成颗粒直径不大于 1mm 的细末","取一大碗，放入切好的五花肉、15ml 生抽、10ml 老抽、15ml 料酒、10g 郫县豆瓣酱、10g 姜末、10g 蒜末、5g 白砂糖","用筷子搅拌均匀后，盖上保鲜膜，室温(20°C - 25°C)静置腌制 30 分钟","腌制完成后，加入 100g 蒸肉米粉，继续翻拌 2 分钟，确保每片肉都均匀裹粉","土豆去皮，切片厚度控制在 0.8cm，片面积约为 5cm x 5cm，重量控制在 300g","在直径 20cm 的深碗底部铺满土豆片，尽量无重叠","将拌好粉的五花肉均匀铺在土豆片上，压实"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"糖拌西红柿","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["西红柿","白砂糖","冰箱"],"steps":["用刀将西红柿皮米字型划开","用筷子插入西红柿的菊花，在燃气上转动烤 10 秒（或用开水冲 30 秒），直到西红柿皮卷边","把西红柿的衣服脱光","再西红柿大卸八块（沿纹路切可以更多的留汁水），去掉头部根蒂部，备用","全部切好后，将西红柿在盘子中均匀码一层","撒上白糖，重复上面一步直到全部西红柿放完","放入冰箱冷藏 10 分钟","一盘糖拌西红柿就好了，营养美味，酸甜爽口，夏日解暑又解腻"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"糖醋排骨","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["排骨","白砂糖","食用油","生抽","蚝油","老抽","鸡精","姜片"],"steps":["排骨与姜片放入冷水中，大火加热至水沸腾、出现大量泡沫后转中火，待水持续沸腾时再转小火焯水 2–3 分钟，捞出备用。","用开水反复清洗排骨 2–3 遍，确保彻底去除血沫。","另取干净锅，置于小火上加热 50 ml 热水，加入白砂糖 30 g，轻轻搅拌直至糖完全溶解，并略呈淡黄色。此步骤的重点在于观察糖溶解情况，无需过分依赖颜色变化。","起锅装盘，撒上芝麻 2 g，即可享用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"糖醋汁","time":10,"level":"简单","tags":["调料","开源"],"ings":["清水","白糖","白醋/米醋","料酒","生抽"],"steps":["按照比例将各调料在小碗中搅拌均匀","按不同菜肴的方式处理完毕后，将配制好的糖醋汁倒入锅中","根据各菜肴的不同，烹制 5-10 分钟","大火收汁，可增加菜的浓度、香味和光泽"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"糖醋里脊","time":45,"level":"中等","tags":["肉菜","家常","开源"],"ings":["里脊肉","醋","白糖","淀粉","鸡蛋","生抽","料酒","蚝油"],"steps":["腌肉：将猪里脊肉先切厚片，用刀背拍一拍，把肉拍松一点。切成一个手指头粗的条，加料酒，生抽，蚝油，食盐，白胡椒粉，一个鸡蛋，将肉用手抓匀，腌制 20 分钟以上。","调酱：番茄酱+10g 醋+30g 白糖+150ml 清水，搅拌至糖融化，备用。","裹粉：先把粉全部裹好再来炸，这样在炸的时候就不会手忙脚乱。准备一个大碗，里面放淀粉，把每一根肉条都满满裹上淀粉。","炸制：油温 160 摄氏度下里脊，可以拿一个干筷子放在油里面试一下，周围冒小泡就可以下锅。","炸到表面微黄可以捞出，全程中火。然后等油温升高到 200 摄氏度，把里脊倒进去重新炸一次，只需 40 秒，表皮就会很脆，马上捞出。","裹酱：另外拿一个锅，锅里放底油，把调好的酱汁倒进去，煮到冒泡，把炸好的里脊放进去，翻炒，让每一根都裹上酱汁。","下炸好的里脊肉翻炒，关火盛出。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"糖醋鲤鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["鲤鱼","番茄酱","白糖","白醋","淀粉","盐","葱","姜"],"steps":["将鱼清洗干净，确保无鱼鳞等异物","将鱼头朝左，鱼肚朝下，右手持刀。刀竖直切下 1cm，按紧鱼身往左片 3-4cm，再将鱼片中间轻轻划一刀","将鱼放进盆里，然后将大姜切片，大葱切段（随便切切就行了，主要是需要去腥味）","用吃奶的力气将大葱大姜里的汁水挤到盆中","加入 20g 盐，25g 料酒，然后给鲤鱼搓个澡，涂抹均匀","找个干净的盆，加入 100g 面粉、200g 淀粉、180g 水、5g 盐，用手将其搅拌均匀，面糊此时粘稠呈可拉丝状态，然后打入一个鸡蛋，再次搅匀","等待 30 分钟","将鱼放在案板上，用干毛巾将鱼身上的水擦干（这样可以更好的挂糊）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"素炒豆角","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["豆角","小米椒","葱","蒜","生抽","老抽","耗油","盐"],"steps":["葱切花，蒜切沫，备用。","生抽、老抽、耗油、盐混合调料汁，备用。","小米椒切圈，备用。","豆角去筋，45° 斜切*4-10cm*小段，备用。","起锅烧油(10ml - 15ml)，冒烟后放入葱、小米椒，翻炒至闻到香味；","加入豆角，翻炒*30s*,","加入料汁，开大火翻炒*2分钟*","倒入 150ml 水"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"紫菜蛋花汤","time":20,"level":"简单","tags":["汤","开源"],"ings":["鸡蛋","紫菜","葱花","水","盐","油","虾仁（个人口味"],"steps":["干紫菜用清水泡 15 分钟，捞起沥干水份备用。","热锅，倒入 1.5 升清水、5ml 油、2g 盐。待水开后放入紫菜。","紫菜烧开后 3 分钟，将打好的蛋液徐徐倒入锅内，30 秒既可起锅。","撒上葱花，转小火 20 秒。","关火，出锅前放入几滴香油，也有的会放入一点虾皮，味道也不错。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"红柚蛋糕","time":35,"level":"中等","tags":["甜点","开源"],"ings":["鸡蛋","红柚果肉","面粉","油","糖","水"],"steps":["锡纸盘里打入鸡蛋 2 个， 加入红柚果肉 20g","锡纸盘中倒入 15ml 油并摇晃锡纸盘时期均匀覆盖盘底","锡纸盘中放入 10g 糖， 以及 40g 面粉和 40ml 水","用筷子顺时针方向搅拌至淡黄色糊状","锡纸盘中放入 5g 糖， 以及 40g 面粉和 40ml 水","继续用筷子搅拌至淡黄色糊状","锡纸盘放入空气炸锅的烤篮上，用 180 摄氏度烤 15 分钟","打开空气炸锅，小心取出锡纸盘，用筷子或勺子将蛋糕翻面"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"红烧冬瓜","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["冬瓜","食用油","料酒","淀粉","生抽","老抽","鸡精","香葱"],"steps":["冬瓜去皮，切 边长不超过 2cm 小块","起锅烧油，放入冬瓜，缓缓翻滚煎炸 2 分钟 ，直至冬瓜表面泛金黄色","取出冬瓜，放入大碗备用","利用锅中的剩余油，依次放入姜末、生抽、蚝油，翻炒 15 S","重新倒入冬瓜，翻炒 30 S 后，加入开水，水要没过冬瓜表面，大火煮 10 分钟","加入老抽上色，继续煮，直至冬瓜软糯（筷子可以轻松插近冬瓜）","加入鸡精、料酒、香葱翻炒后 30 S， 取出冬瓜到大碗中","锅中剩余汤汁保留，倒入水淀粉，煮开后汤汁浇灌在冬瓜表面"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"红烧猪蹄","time":15,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪蹄","香叶","姜","葱","老抽","桂皮","冰糖","料酒"],"steps":["冷水锅中放入热心摊主剁好的猪蹄，加入 20 ml 料酒与葱姜，煮 15 分钟去掉血腥","热锅冷油，倒入 30ml 食用油，放入 7-8 粒冰糖，开小火，熬成糖色，期间用锅铲把冰糖压碎，大概熬 2 分钟","熬成糖色后，放入焯过水的猪蹄，继续小火，翻炒猪蹄，直至所有猪蹄两面微黄","加入香叶 2 片、桂皮 1 块、八角 4 个、生抽 20 ml、老抽 20 ml、料酒 10 ml、姜 3 片、盐 8 克，转中火、继续翻炒 1 分钟","加入开水或者冷水，水需要没过猪蹄，盖上锅盖，大火烧开，烧开之后关火","把锅内的食材全部倒入高压锅中，高压锅中需要 15 分钟（如果同学没有高压锅，可放在锅中大火转小火熬制即可）","15 分钟之后，把高压锅的食材倒入炒锅中，开大火收汁，此时可用筷子尝下味道、淡的话可以加 2~3g 盐","大火收汁时长根据锅中的水来算，一般 30 秒即可，多留点也无碍、红烧猪蹄汤也是很下饭的"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"红烧茄子","time":45,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["大蒜","大葱","青辣椒","洋葱","西红柿","青茄子","盐","酱油"],"steps":["青茄子、青辣椒、西红柿、洋葱、大葱洗净。","大葱切 5 毫米宽的葱花，大蒜扒皮并拍碎，西红柿切 6 立方厘米的块，青辣椒、洋葱切 5g 的块。","茄子切菱形块（先切 2 公分厚的片，然后再把片切成 2 公分的条，最后斜刀切块儿...）。","将面粉倒入盆中，依次加入少量水，搅拌均匀，呈粘稠糊状。","加入淀粉，加入 30 克水，搅拌均匀。","将鸡蛋打到盆中，加入（面粉 / 20）克的盐，搅拌均匀。","将茄块倒入面糊中，搅拌使茄块的每一面都能沾上面糊。","加入（份数 * 5）g 的油，放入大蒜、葱花，翻炒 15 秒，放入青辣椒块翻炒 30 秒，放入西红柿翻炒 30 秒。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"红烧鱼","time":40,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["姜、蒜瓣、干辣椒","鱼","蚝油","葱","香菜","小米椒","味精"],"steps":["姜蒜准备好，切碎","干辣椒切碎，和姜蒜一起","加入 30-50ml 油，等待锅热...","放入**擦干水分的鱼**（不想被热油溅一身的话），然后晃动锅，用热油煎鱼，注意这过程一定要小火","将鱼翻面，重复上面油煎过程","放入姜蒜辣椒，翻炒出香味","倒入料酒，稍微多一点，此过程注意安全，会起大量油烟","倒入醋（喜欢醋可以多放一点）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"红烧鱼头","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["注","八角、干辣椒","鱼头一个"],"steps":["葱、姜、蒜、香菜、美人椒分别清洗干净。","干辣椒与八角稍微冲洗即可。","大葱切两半。后半段大葱（葱白处）切段，每段长度约 4cm。前半段（葱叶处）先切段，再将每段劈为四瓣。","姜切片，每片厚度约 3mm。","大蒜拍碎。","拿出两棵香菜去根，切为 1.5cm 香菜碎。","将美人椒切为厚度为 3mm 的辣椒圈。","干辣椒切四段。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"红烧鲤鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["大葱、姜、大蒜、干辣椒","鲤鱼、五花肉"],"steps":["葱、姜、蒜、干辣椒分别清洗干净。","葱白处切段，每段长度约 4cm，再将每段劈为四瓣。","姜切片，每片厚度约 3mm。","一个大蒜拍碎切末，其余蒜切为二瓣。","干辣椒切四段。","五花肉切片，约 4cm*4cm。","清洗鱼。","鱼背肉厚处拉几道斜口，方便入味"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"红烧鸡翅","time":40,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["新鲜鸡翅（推荐选择鸡翅中","姜片（推荐使用生姜","葱段（推荐使用大葱白部分","大蒜","香叶","八角","干辣椒（可选","冰糖"],"steps":["将鸡翅洗净。用刀在鸡翅厚处划三刀，背面扎一刀，便于入味。","如果鸡翅不新鲜，可在打完花刀之后用姜水泡 10-20 分钟。","煮好后将鸡翅捞出，用温水清洗 2 遍，彻底去除血沫，控干水分备用。","另起锅，开火烧热后放入 10-15ml 食用油。","加入准备好的 1 片香叶、1 个八角、2 个干辣椒（可选）、剩下的 2 片姜片（约 5g）、15g 葱段、拍散的大蒜，继续煸炒 30 秒至香料香味完全释放。","沿锅边淋入 15ml 料酒或黄酒，15ml 生抽，快速翻炒 10 秒。","加入温水（水温约 50-60℃），水量以稍微没过所有鸡翅为准。","加入 5ml 老抽、3g 盐、2g 白糖、1g 胡椒粉，用炒勺轻轻搅拌均匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"红芸豆拌饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["红芸豆","巴斯马蒂香米或普通大米","洋葱","番茄","生姜","大蒜","青辣椒","香菜"],"steps":["将干红芸豆用清水浸泡至少 8 小时（过夜），浸泡后体积会膨胀约两倍","将浸泡好的红芸豆沥干","**使用高压锅**：放入红芸豆和 600ml 水，盖好锅盖，大火上气后转中火，**压 15-20 分钟**，直至*豆子用手指可轻松压碎*","**使用普通锅**：放入红芸豆和足量水，大火煮沸后转中火，**煮 60-90 分钟**，直至豆子完全软烂","煮好后保留煮豆汤水，备用","在炒锅中倒入 30ml 食用油，中火加热","放入月桂叶 2 片，炸至*散出香味*（约 10 秒）","放入切碎的洋葱，翻炒至*金棕色*（约 6-8 分钟）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"罗宋汤","time":20,"level":"中等","tags":["汤","开源"],"ings":["蔬菜高汤","牛肉高汤","牛肉","番茄"],"steps":["洋葱、胡萝卜、欧芹切 1cm 见方小丁","红肠、马铃薯切 2cm 块","包菜去梗后，手撕至 2cm 片","牛肉撒盐 3 g 、黑胡椒 3 g 腌制 5 分钟","平底锅烧热，加入植物油","煎制牛肉，直至表面**焦黄色**（可以带生，千万别糊了），取出备用。","汤锅烧热，加入橄榄油、洋葱丁、胡萝卜丁、欧芹丁","炒至**洋葱透明**，加入番茄膏、番茄罐头"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"羊排焖面","time":20,"level":"中等","tags":["肉菜","家常","开源","面"],"ings":["带皮羊排肉","青椒","甜椒","大葱","花椒","干辣椒","生姜","白砂糖"],"steps":["羊肉冷水下锅焯水，水开了之后把血沫撇掉，捞出羊肉。","切好生姜（ 4 片)，放入干辣椒与花椒在碗里备用。","在炒锅加入油。（多一点也没关系）","油热之后，放入白砂糖，给羊肉炒出焦糖色。","羊肉水份炒干之后，放入盐、老抽，以及备好的调味料。","加入清水没过羊肉，大火煮沸之后，让其继续煮 10 分钟，之后小火炖煮 30 分钟。","在此期间，可以和面。和面的量以及操作方法在附加内容里讲解 *（注 1）。","放入青椒，甜椒，大葱，以及面皮进行翻炒。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"羊肉汤","time":30,"level":"中等","tags":["汤","开源"],"ings":["羊肉或羊杂","食用油","料酒","大葱","白胡椒粉","食用盐","孜然粉","香菜"],"steps":["羊肉切成长 5cm 宽 0.5cm 的块","大葱切成小段","羊肉放入锅中，加入 1000ml 常温水，加入料酒、大葱","煮沸 2 分钟后，捞出羊肉，使用常温水洗净，沥干水分","热锅加入食用油，加入羊肉，翻炒 2 分钟至羊肉表面微黄","加入开水，开到大火档位","5 分钟后，加入白胡椒粉、盐，继续煮沸 5 分钟","出锅之后，加入香菜、孜然粉，搅拌均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"美式炒蛋","time":20,"level":"简单","tags":["早餐","开源"],"ings":["鸡蛋","全脂牛奶/奶油","黄油","盐"],"steps":["鸡蛋打入大碗中，加盐搅打至起泡，静置 15 分钟","黄油切小块入锅，倒入蛋液，开小火不断搅拌","黄油一融化，就快速翻动蛋液，将其打碎成细密状，在蛋液大体凝固前关火","加入牛奶搅拌 15 秒，至炒蛋湿润绵密，装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"老友猪肉粉","time":20,"level":"中等","tags":["主食","开源"],"ings":["米粉","猪肉","酸笋","剁椒","豆豉","大蒜","料酒","生抽"],"steps":["全部猪肉用料酒、盐、生抽、生粉、胡椒粉倒在一个碗里调味,备用","热锅不放油,下全部酸笋把水份炒干，炒干的酸笋中间留点空间","放入 10ml - 15ml 食用油与全部大蒜、 剁椒、 豆豉到炒干的酸笋中间到炒干的酸笋中间,全部推到中间炒出香味","放入全部调味好的猪肉,持续放入 10ml 生抽炒一分钟","放入 5ml 米醋、 10ml 生抽、450ml 清水一起煮开","水煮开后,放入温水泡好的米粉,继续煮 3 分钟就可以盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"老妈蹄花","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪蹄（尽量选择猪前蹄","葱","姜","料酒","生抽","白芷","当归","鸡精"],"steps":["200g 白芸豆提前一晚清水浸泡备用","准备猪前蹄，买菜的时候让师傅从中间劈开，用喷火枪去除毛囊，拿回家清洗","冷水锅中加入猪蹄、大葱段、姜片、料酒，焯水十分钟，撇去浮沫，捞出洗干净备用","揭盖后加入盐、鸡精、葱花调味","调制灵魂汁子：放入葱、蒜、小米椒，白胡椒粉、生抽、香醋、油泼辣子、花椒油、猪蹄原汤","灵魂汁子，浇给"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"老干妈拌面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["面","老干妈","酱油"],"steps":["将水倒入锅中并煮沸","将面均匀放入锅中","在煮的过程注意搅拌，避免面粘成一坨","当用筷子挑起一根面且该面能自然地从筷子上滑落时再等 30 秒关火","将面夹入碗中","按照上面的计量放入老干妈和酱油","用筷子将碗里的面、老干妈、酱油拌均匀","吃"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"老式锅包肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪通脊肉","大葱","姜","蒜","胡萝卜","香菜","白醋（建议使用","白糖"],"steps":["**处理猪肉**：","**腌制肉片**：","**挂浆**：","**调制糖醋汁**：","**准备配菜**：","**炸制肉片**：","**炒制**：","**出锅装盘**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"耙耙柑茶","time":20,"level":"简单","tags":["饮品","开源"],"ings":["原料","耙耙柑","茉莉绿茶","冰块","[蔗糖糖浆]","工具","搅拌机"],"steps":["茉莉绿茶调配（推荐比例=>茶 : 水 : 冰 = 1~2 : 50 : 30）","正式调配"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"肉蛋盖饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["米饭","鸡蛋","肉馅","老抽","生抽","醋","红葱油","葱"],"steps":["煮好米饭，通常使用买米赠送的量杯，一杯米 240g","锅中放油 30ml","放入肉馅，调中火煎至两面微焦","将鸡蛋打入锅中，不要打散，盖上锅盖","调一个碗汁，碗中放入计算中的对应数量的老抽，生抽，醋，糖，红葱油，搅拌均匀","打开锅盖，将碗汁倒入锅中，等待三分钟","关火，将肉蛋盖到米饭上","安全检查，开始食用盖饭"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"肉蟹煲","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["肉蟹（推荐优先级从高到低","虾","土豆","年糕（推荐硬年糕","洋葱","大蒜","生姜","干辣椒"],"steps":["土豆切块为各边均为 3 cm 的立方体，青/红椒切成边长 4 cm 的菱形片，洋葱切成 3 cm 宽的月牙瓣，年糕切成 1 cm 厚片","螃蟹切成 50-80 g 的块，裹薄淀粉，180 °C 油温炸 1 分钟捞出","锅中放油，蒜姜干辣椒爆香，放所有酱料 + 冰糖小火炒出红油，注意别糊底","加螃蟹、土豆、啤酒和清水，烧开转小火炖 12 分钟","放年糕和青红椒，开大火收汁到汤汁可以附着在物品表面，最后撒白胡椒粉"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"肉饼炖蛋","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪肉末","鸡蛋","料酒","生抽","白胡椒粉","芝麻香油"],"steps":["在碗中加入猪肉末、料酒、生抽、白胡椒粉、鸡蛋和芝麻香油，搅拌均匀。","将调好味的猪肉末铺在盘子里，肉末中间用勺子挖一个洞，往洞中打入 1 个鸡蛋。","锅中加水至 1/4 高度，水烧开后，将盘子放入锅中，盖上锅盖，蒸 15 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"胡萝卜甜糕","time":45,"level":"中等","tags":["甜点","开源"],"ings":["胡萝卜","全脂牛奶","糖","酥油— 可用黄油替代","小豆蔻粉","腰果","杏仁","葡萄干"],"steps":["将胡萝卜去皮，用刨丝器刨成细丝","在厚底锅中倒入酥油 20g（一半量），中火加热融化","放入胡萝卜丝，翻炒 **3-5 分钟**，直至*胡萝卜丝变软且散发香味*","倒入全脂牛奶 500ml，搅拌均匀","大火煮沸后转中小火，保持*缓慢沸腾*状态","**持续翻搅 25-30 分钟**，直至*牛奶几乎完全被胡萝卜吸收蒸发*（这是最关键的步骤，需要耐心且不断搅拌防止糊底）","当锅中几乎没有液体时，加入糖 80g，搅拌均匀","加糖后会重新出水，继续中小火翻炒 **5-8 分钟**，直至*水分再次蒸发*"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"脆皮豆腐","time":30,"level":"中等","tags":["素菜","蔬菜","开源","豆腐"],"ings":["老豆腐","鸡蛋","生抽","老抽","蚝油","白糖","玉米淀粉"],"steps":["鸡蛋搅拌形成蛋液放置备用","配置酱料 （20 g 生抽+10 g 蚝油+5 g 老抽+10 g 白糖+10 g 玉米淀粉+200 ml 清水）","老豆腐切片 （个人建议，仅供参考 人 * 5 片，厚度 1.2 cm）","玉米淀粉倒入盘中，将老豆腐片粘上淀粉后，粘上蛋液，放置一旁","热锅，锅内放入 18ml 食用油。等待 10 秒让油温升高","将粘上蛋液的老豆腐片均匀放入锅中，铺好锅底，小火煎至金黄翻面","待两面煎至金黄后，倒入酱料，让每块豆腐都沐浴在酱料中，大火 3 分钟至酱汁浓稠","关火"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"腊八粥","time":20,"level":"中等","tags":["汤","开源","粥"],"ings":["饮用水","大米","糯米","花生","红豆","红枣","薏米","黑米"],"steps":["提前洗净好绿豆、红豆、花生、黄豆、豌豆、红腰豆，并用干净的玻璃碗盛放好，注入 3/4 玻璃碗大小的饮用水，浸泡一夜（或最少 8 小时）。","提前洗净好大米、糯米、薏米、黑米、小米、莲子，并用干净的玻璃碗盛放好，注入 3/4 玻璃碗大小的饮用水，浸泡 3 小时。","将步骤 2 中准备好的盛有大米、糯米、薏米、黑米、小米、莲子的玻璃碗中的水分分离倒出，其余原料继续倒入粥锅中，合上锅盖，小火煮 60 分钟。","洗净好红枣、桂圆、栗子、核桃、葡萄干（其中红枣切成小片）、冰糖，倒入锅中，合上锅盖，小火煮 60 分钟。","确认煮出的粥粘稠后即可关火、盛盘、食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"腐乳肉","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["带皮五花肉","红腐乳","冰糖","老抽","料酒","香葱","生姜","清水"],"steps":["五花肉切成长宽 2.5 cm 的小块","冷水放料酒姜片，五花肉放入开火慢慢加入到水沸腾后捞出","玫瑰腐乳块和腐乳汁碾成泥，加冰糖、老抽调成酱汁","热锅冷油爆香葱姜，下肉块煸到金黄","倒入腐乳酱炒匀加热水焖煮","小火慢炖 40 分钟","大火收汁，看到汤汁冒浓稠鱼眼泡时关火"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"芋泥雪媚娘","time":20,"level":"进阶","tags":["甜点","开源"],"ings":["紫薯粉","牛奶","糯米粉","玉米淀粉","黄油","淡奶油","白砂糖","料理搅拌机"],"steps":["芋头切块，大火煮熟至软（40 分钟即可），全部放入料理机","向内加入 30g 牛奶，25g 淡奶油，将其打成泥状","再向内加入 3g 紫薯粉，18g 白砂糖，继续搅拌打成细腻芋泥","取出另一个碗，加入全部糯米粉 b，22g 玉米淀粉，135g 牛奶，50g 白砂糖，混匀并过筛一遍，保鲜膜盖上并扎小洞，中火蒸半个小时","在蒸的过程中，将糯米粉 a 放入平底锅小火翻炒至微微发黄（即炒熟），作为手粉备用","将中火蒸完半小时的糯米牛奶混合物（果冻状）趁热加入黄油 30g，将黄油揉至面团完全吸收，然后放冰箱冷藏一小时","取出另一只碗，加入 120g 淡奶油，8g 白砂糖，打发至有纹路，装进裱花袋备用","包好后再均匀撒 2g 手粉防粘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"芝麻烧饼","time":40,"level":"中等","tags":["主食","开源"],"ings":["面粉","酵母粉","白糖","十三香","食用油","温水("],"steps":["面团：300 克面粉，3 克酵母粉，3 克白糖，180 克温水，20 克食用油，醒面 10 分钟","油酥：小碗放 30 克面粉，2 克盐，4 克十三香，20 克食用油，拌匀后，静置","做饼：面擀成长方形，抹上调好的油酥，从一头卷起，切成 7 个面剂子，对折，用虎口收拢即可，先沾水再沾白芝麻，擀成小圆饼","烙饼：将电饼铛预热，倒入凉油（锅底铺满油），将擀好的饼放入电饼铛中，将饼的上方也刷点油，涂抹均匀盖上盖子，选大饼档,听到叮的一声出锅即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"芥末罗氏虾","time":30,"level":"中等","tags":["肉菜","家常","开源","虾"],"ings":["罗氏虾","蒜","青芥末","生抽","生粉","胡椒粉","白糖","蚝油"],"steps":["**处理虾**：","**蒜蓉及碗汁处理**：","**炒制过程**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"芥末黄油罗氏虾","time":30,"level":"中等","tags":["水产","海鲜","开源","虾"],"ings":["罗氏虾","黄油","芥末","白糖","生抽","蚝油","盐","料酒、朗姆酒或啤酒"],"steps":["将罗氏虾剪掉头尾尖刺、触须和脚，剪刀把虾身开背，去除虾线。","提前搅拌好芥末酱汁：酱油、蚝油、芥末、盐、糖，搅拌均匀！","洗好香菜，切段备用。","罗氏虾沥掉水，锅中加入油，直接放入罗氏虾，中火，外表煎至金黄，捞出。","下入蒜蓉，大火，利用煎虾剩下的油继续煎炒蒜蓉，等到锅中白雾冒出，蒜蓉已经煎出香味，下虾和黄油，让虾充分吸收黄油香味","下入调好的酱汁，继续大火煮沸，翻炒虾，至酱汁收汁，加入酒（料酒、啤酒可以放 30g，朗姆酒味道浓郁放 15g 即可。）","在等酱汁稍微收汁，加入香菜翻炒两下，即可出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"芹菜拌茶树菇","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["闽星茶树菇","芹菜","香油","蚝油","味极鲜","食用盐"],"steps":["（如果是芹菜苗这一步略过）用热水壶烧一壶热水,备用","新鲜的芹菜苗或者芹菜摘去黄叶清洗,备用","（如果是芹菜苗这一步略过）将芹菜摘去叶子单独放一个盆中,将芹菜茎用刀划成 2-3 毫米宽的芹菜条备用,这一步的目的是让芹菜断生的更快更均匀,吃起来更脆更爽口","芹菜苗切成 4cm 的芹菜段,备用","（如果是芹菜苗这一步略过）起锅开火,将热水壶的开水倒入锅中待水起泡沸腾","（如果是芹菜苗这一步略过）将切好的芹菜条放入锅中焯水,大约 20 秒放入芹菜叶,5 秒后关火全部捞出过凉水,备用","将盆中焯好的芹菜或者芹菜苗撒上准备好的食盐,香油,耗油和味极鲜搅拌均匀","将茶树菇倒入盆中搅拌均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"苏格兰蛋","time":20,"level":"中等","tags":["早餐","开源"],"ings":["鸡蛋","手抓饼皮","芝士","培根"],"steps":["用冷水下锅水开 3 分钟后捞出","鸡蛋捞出，放入冰水中剥壳更快速也更完整","用芝士片包裹鸡蛋","培根片包裹鸡蛋","手抓饼两端切除以矩形包裹鸡蛋","油温 6 成下锅（油面波动，有青烟，筷子插入油中周围泛起气泡即是 6 成温度） 炸制金黄即可","空气炸锅 160 度 15 分钟","切开即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"英式司康","time":20,"level":"中等","tags":["甜点","开源"],"ings":["无盐黄油","低筋面粉","糖","盐","泡打粉","鸡蛋","淡奶油","奶油奶酪"],"steps":["鸡蛋打散，称量出 30g 蛋液放入干净容器中，放入全量淡奶油和奶油奶酪混合均匀。如果奶酪太硬可以水浴加热至大约 40 度再混合。","将低筋面粉，盐，糖，泡打粉放入干净容器中混合均匀","黄油切成小块，放入上一步的混合物中，用手将黄油捏入混合物中，呈粗玉米粉质地","将第一步的蛋奶混合液倒入上一步得到的粉油混合物种，搅拌均接近。叠压成均匀面团","面团放到案板上，擀成 1.5cm 厚的面片，用刀或者模具分切成合适的形状","用刷子蘸取剩余的 20g 鸡蛋液，刷在司康表面","烤箱预热 180 度，烤制 27 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"茄子炖土豆","time":45,"level":"中等","tags":["素菜","蔬菜","开源","土豆"],"ings":["茄子","土豆","肉","辣椒（是青辣椒","酱油","盐","蒜"],"steps":["将茄子、土豆、辣椒洗净，蒜扒皮并拍碎。","将茄子、土豆切成约 6 立方厘米的块，辣椒切成 5 克的小块，肉切成 3 厘米的丝。","开火，热锅，加入份数 * 13 毫升的油。","当能看到锅里的油冒出一丝烟时，放入辣椒。","煸出辣椒香气后，立刻放入肉，用铲子翻炒 30 秒。","放入土豆，翻炒 30 秒。","放入茄子，翻炒 30 秒。","放入酱油和盐，继续翻炒 5 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"茄子肉煎饼","time":30,"level":"中等","tags":["主食","开源"],"ings":["米粉","小麦粉","鸡蛋","煮熟的腊肉","茄子（买长条状的","食用油","食盐"],"steps":["将茄子去皮后切成片，将腊肉切成片，备用","依次向盆中加入 250g 米粉（大米研磨成的粉）、50g 面粉和 1 个鸡蛋","平底锅加入食用油**10-30ml**，开小火","用筷子或勺子把裹了面糊的茄片、肉片放入锅中，先煎至两面金黄，再煎**3-6分钟**（**煎的过程中，食用油会变少，可再添加食用油**）","撒盐，翻炒均匀，起锅装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"茭白炒肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["茭白","瘦肉","淀粉","食用油","鸡精","姜","蒜","料酒"],"steps":["茭白切片，每片厚度 0.5 cm","瘦肉切条，厚度 0.3-0.5 cm，加入料酒、生粉、盐、水搅拌","姜切片、蒜头剁碎","起锅水烧开，放入茭白，水煮 60-90 S 后取出沥干","起锅，倒入 15 ml 油，倒入瘦肉，反复翻炒 60 S 取出","起锅，倒入 15 ml 油，倒入姜、蒜翻炒 30S，加入茭白继续翻炒 30 S","继续加入瘦肉翻炒 60 S，加入 20 ml 水，加入盐、鸡精后翻炒 60S 出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"茶叶蛋","time":20,"level":"中等","tags":["早餐","开源"],"ings":["鸡蛋","八角","香叶","桂皮","茴香","冰糖","红茶","生抽"],"steps":["用冷水将鸡蛋煮熟，大火大约 8 分钟（根据自家厨具决定）","鸡蛋捞出，过冷水","将鸡蛋互相碰撞，使每个鸡蛋产生裂缝","将鸡蛋下锅，放入八角，香叶，桂皮，茴香，冰糖，红茶，生抽，老抽，食盐","加水直至没过鸡蛋","大火煮开之后，转中小火煮 15 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"草莓冰淇淋","time":20,"level":"简单","tags":["甜点","开源"],"ings":["加糖炼乳","草莓","重奶油","香草精"],"steps":["先做草莓糖浆。把草莓洗干净，去掉顶部叶子。将草莓切成 **5mm** 的小块。保留一半切碎的草莓，稍后折叠成冰淇淋。","将另一半切碎的草莓和糖一起放入酱汁锅中。用中火搅拌和烹饪，直到草莓释放液体并在锅中形成糖浆。","让草莓在糖浆中加热，不时搅拌，直到它们分解并变形，糖浆稍微变稠。","当糖浆保持分开 **3秒钟** 时，就已经准备好了。把糖浆从火上移开，加入香草和盐搅拌。将草莓糖浆放在一边冷却。","当糖浆冷却时，准备冰淇淋基料。在碗中加入甜炼乳、浓奶油、香草精和盐。使用手动搅拌器搅打混合物，直到它变得轻盈蓬松，并形成柔软的尖峰。","将保留的切碎的新鲜草莓折叠到冰淇淋底座中。将生过的冰淇淋底座转移到冷冻安全容器中。将冷却的草莓糖浆淋在冰淇淋上，然后轻轻地将其旋入混合物中。","盖上冰淇淋并冷冻 **八小时** ，然后舀取和食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"草莓酱","time":20,"level":"简单","tags":["调料","开源"],"ings":["草莓","白砂糖"],"steps":["草莓洗净去叶","将草莓切碎放入合适的碗中","将白糖倒入碗中与草莓搅拌均匀","碗用保鲜膜覆盖静置 1 小时","将静置的草莓和糖的混合物倒入不粘锅中开大火烧开","烧开后转小火不断搅拌直至果酱呈粘稠状关火","待草莓酱冷却后装入准备好的密封罐中"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"荔枝肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["瘦肉","凤梨","鸡蛋","食用油","白砂糖","淀粉","生抽","鸡精"],"steps":["瘦肉切块（每块 2-3 cm ），放入大碗中，加入鸡蛋 1 个 、生粉 50 g 、生抽 3 ml 、鸡精 2 g","充分搅拌,直至生粉包裹住瘦肉块（太稀则继续加生粉，太干则加水），然后加入 5 ml 油，在充分搅拌后备用","在准备一个碗，加入番茄酱、鸡精 3 g 、生抽 2 ml 、姜末、白砂糖、生粉 10 g \\香醋、凉水 200 ml ,充分搅拌后备用","切一个凤梨, 准备 6 个 （每个 1.5-2 cm）凤梨块","起锅烧油，倒入 500 ml 油，一直烧油直到听到油炸声","将瘦肉一个一个放入锅中（切记不可以整碗倒入），保证每个肉不要粘在一起","全部放入瘦肉后，每 30 S 用勺子来回两面翻转瘦肉块，直至瘦肉块表面金黄","取出瘦肉，一分钟后倒入油锅中继续炸，直至瘦肉块表面出现焦黄后，取出放入大碗备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"荷兰豆炒腊肠","time":15,"level":"简单","tags":["肉菜","家常","开源"],"ings":["荷兰豆","腊肠","生抽","食用油"],"steps":["把荷兰豆去掉蒂，有时间的也可以同时把尾部去掉","买腊肠之前可以问老板是生的还是熟的，如果是生的，需要提前蒸一下，如果是熟的可以直接使用","把荷兰豆清洗一下，然后焯一下水，大概 45s，荷兰豆焯至变色即可，捞出过凉水备用","热锅，锅内放入大约 10ml 食用油。等待 10 秒让油温升高","放入腊肠，保持翻炒至腊肠*微微卷边*，注意这里一定要**保持小火**，小到不能小的那种，不然容易糊","放入荷兰豆，转为中大火，翻炒 30s 放入生抽，接着再翻炒 20-30s 即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"莴笋叶煎饼","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["莴笋叶","鸡蛋","食用油","生抽","淀粉","鸡精"],"steps":["莴笋叶剁碎，加入鸡蛋、生粉、生抽、鸡精搅拌均匀备用","起锅烧油，倒入莴笋叶浆汁，均匀平铺在锅面上","第一面炸 120 S 后，翻面再炸 60 S 后出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"菌菇炖乳鸽","time":45,"level":"中等","tags":["汤","开源"],"ings":["乳鸽","菌菇","玉米","姜","料酒","食用盐"],"steps":["冷水洗干净热心摊主处理好的乳鸽","冷水锅中放入洗干净的乳鸽，加入 15ml 料酒与姜，水煮开即可捞出乳鸽，要不然会丢失营养","把乳鸽放到高压缩或者瓦罐中、倒入的水要没过乳鸽，放入生姜 20 g，玉米 200 g、菌菇 100 g","时间到了，盛到碗中，加入 3~5g 盐 即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"菠菜炒鸡蛋","time":15,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["菠菜","鸡蛋","食用油","食用盐"],"steps":["菠菜去根，洗净，放在篮子里，焯水","将鸡蛋打入碗中，搅匀","热锅，加入 10ml 油","油热后，倒入鸡蛋液，中火翻炒 15 秒，先煎成蛋饼，然后再用锅铲切成小块","关火，将鸡蛋块 盛到盘子中，不要洗锅","重新开火，倒入 5ml 油，油热后，放入菠菜，大火 翻炒 15 秒后，倒入鸡蛋块，翻炒均匀","加入 5g 盐、100ml 饮用水，大火 翻炒 10 秒","关火，盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"菠萝咖啡特调","time":20,"level":"中等","tags":["饮品","开源"],"ings":["咖啡液","菠萝汁","冰块","苏打水","奶油","牛奶","糖","海盐"],"steps":["杯子里依次加入冰块，咖啡液，菠萝汁和苏打水","奶油加糖打发至湿性发泡，加入朗姆酒和牛奶均匀只有流动性","在第一部混合液上方倒入奶油","奶油顶面撒上海盐"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"萝卜炖羊排","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["羊排","白萝卜","大葱","花椒","白芷","姜","料酒或者黄酒","食用盐"],"steps":["萝卜去皮、滚刀切成 3-5cm 的大块，备用","羊排在购买时可以让卖家切好，因为家用刀一般难以切动，备用","羊肉冷水下锅，加入一半的料酒，一半的葱姜，煮 10 分钟去掉血腥，（可选）把焯的过程中出现的血沫子可以用勺子盛出来","另起一锅冷水，放入切好的白萝卜，放入一半的冰糖，等水开后煮 5 分钟去掉白萝卜的辣味","盛出来焯好的羊排，放入高压锅中，加水没过所有食材后再增加大约 300ml 的水","将剩余的葱姜料酒，花椒，冰糖，白芷（可选），盐放入锅中，盖锅等待上汽后计时，中火炖大约 15 分钟。","关火，等待高压锅放气完毕，开盖，加入之前焯好的萝卜，调味，加入 3-10g 的食盐或者水，品尝汤的咸淡，","再开火，中火，高压锅上汽再炖 10 分钟，普通锅盖盖再炖 20 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"葱油","time":20,"level":"中等","tags":["调料","开源"],"ings":["油","葱","姜","洋葱","料酒","香菜","开洋"],"steps":["开洋泡入 50 度温水中，加入 10ml 料酒去腥，泡 10 分钟后取出沥干水分","葱，香菜洗净，切成 5cm 长的段，擦干表面水份","洋葱切成丝，在锅里用热水煮 5 分钟，取出沥干水份","姜去皮，切成片","锅里倒入全部油，放入上述预处理好的材料，开中小火炸 20 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"葱油拌面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["干面条","小葱","生抽","老抽","白糖"],"steps":["将 小葱 洗净，切成长段（约 5-7 cm）。葱白和葱绿可以分开。","锅中加入 100 ml 食用油，中火烧热。先放入葱白段，煸炒至微黄。","加入葱绿段，转小火，继续煸炒。","保持小火，耐心煸炒约 **15-20 分钟**，直至葱段变得焦黄酥脆。","将焦黄的葱段捞出（葱油保留在锅中）。","取 80 g 干面条。","锅中加入 1000 ml 饮用水，大火烧开。","放入 面条，根据面条包装说明，煮至熟透（通常 **3-8 分钟**，以包装说明为准）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"葱油桂鱼","time":45,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["桂鱼","小葱","小米辣","姜","料酒","植物油","盐","蒸鱼豉油"],"steps":["去菜市场买已经处理好的鱼（自己处理的话最好不要内脏），将鱼身表面的所有鳞片刮干净","用厨房用纸将鱼肚子里的贴骨血和黑膜擦干净（帖骨血会影响口感，黑膜是鱼腥味的来源）","用菜刀在鱼身表面来回刮几次，将鱼身的黏液刮掉，进一步去除腥味，然后用清水将鱼内外冲洗干净","将鱼平放在砧板，使用厨房纸将鱼内外的水分擦干，然后鱼头朝左，尾朝右，从鱼鳃边开始，每隔 3cm 纵向划一刀，深度达到鱼的脊椎骨即可，另一面使用同样的处理方式","将鱼平放在盆中，确保盘中没有多余水分","取一块 50g 姜（鸡蛋大小），用削皮刀把表面的皮去除并洗干净，然后切成厚度为 3mm 的姜片","将小米辣洗干净、去蒂，切成厚度为 2mm 的小圆片（或切成 1mm 宽度的丝状）","将小葱洗干净，去除根须，切成 3cm 的小段，稍微粗一点的小葱，可以沿着小葱生长的方向沿中间劈开"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"葱烧海参","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["泡发好的海参![海参]","大葱葱白"],"steps":["葱白切成 1cm 的段，备用。","海参切成 1cm 的段，备用。","准备一个空碗，倒入 20g 蚝油， 10g 生抽， 2g 白糖，搅拌均匀。","另一个空碗倒入淀粉，水，制备水淀粉，勾芡用。","热锅，锅内放入 20ml - 25ml 食用油。等待 10 秒让油温升高。","放入葱白，调*小火*，注意不要让葱白变焦。大概煎 3-5 分钟即可。","用筷子夹出葱白，放入盘中备用。","倒入调好的料汁，炒香，**等待 1 - 2 分钟** 。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"葱煎豆腐","time":20,"level":"中等","tags":["素菜","蔬菜","开源","豆腐"],"ings":["白豆腐","葱","青辣椒","盐","鸡精"],"steps":["豆腐洗净。切约 5 mm 厚度，置于碟中。","葱洗净，除去根部，切成葱花，备用。","辣椒洗净，切开，去籽，切成 1cm * 1cm 状，备用、","热锅，加入份数 * 9ml 油。","油入锅后，使其均匀布于锅底，均匀放入豆腐，小火煎至金黄翻面。","待两面金黄，盛入碟中备用。","补油至覆盖锅底，倒入辣椒大火翻炒，并铲碾 3 分钟。","倒入豆腐，翻炒，加入盐与鸡精，中火翻炒 1 分钟后倒入 10 ML 水，大火收汁。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"蒜苔炒肉末","time":10,"level":"简单","tags":["肉菜","家常","开源"],"ings":["五花肉薄片","蒜苔","食用盐","生抽","食用油","蒜瓣"],"steps":["蒜苔切成 5cm 小段，备用","五花肉切成 5mm * 5cm 丝状，备用","蒜瓣拍碎切成末，备用","热锅，锅内放入 10ml 食用油。等待 10 秒让油温升高","放入蒜末，中火翻炒 **10 秒** 将蒜末炒出香味","放入五花肉和 5ml 生抽，中火翻炒 **30 秒** 将肉炒熟并上色","将蒜苔放入锅内并加入 10ml 生抽，翻炒 **30 秒**","锅内加入 20g 水，中火翻炒 **5 分钟** 将蒜苔炒至稍稍变软"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蒜蓉炒芹菜","time":10,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["芹菜","猪油（没有可用食用油替代","蒜","盐"],"steps":["芹菜摘去大部分叶子，只保留少量嫩叶。如果梗部较粗，纵向剖开一刀使其粗细一致，然后切成不超过 5 cm 的段（约大拇指长度，太长容易卡嗓子）","蒜切成蒜末，备用","芹菜段入锅前尽可能沥干水分，甩得越干越好","炒锅烧热，放入 15 ml 猪油，油热后先撒入 2 g 盐","放入蒜末，小火炒 10 秒煸香","**转大火**，倒入芹菜段，快速翻炒 **30 秒**，立即出锅","出锅标准：芹菜看起来**半生不熟**、颜色翠绿、没有炒软塌，这时的口感最脆"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蒜蓉空心菜","time":15,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["空心菜","蒜末","盐","生抽"],"steps":["空心菜洗净，去掉烂叶或者老梗，均匀切成 2 段或者 3 段（防止过长不好炒）","放入蒜末，小火炒 10 到 15 秒煸香","尽快均匀地放入空心菜，**开大火**，左手拿铲子，右手拿筷子，配合将空心菜不停翻动，**直至软化变绿**。","接着不需使用筷子，而是使用铲子快速翻炒已软化的空心菜 15 - 20 秒，使之受热更均匀，撒入盐 2 g ，白糖 3 g，生抽 8 ml。","继续大火翻炒 10 秒，即可出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"蒜蓉虾","time":15,"level":"简单","tags":["水产","海鲜","开源","虾"],"ings":["海虾","蒜蓉酱","食用油","生抽"],"steps":["用刀从从虾头中间切开，切到距离虾尾 1 cm","将蒜蓉酱铺在虾身中间，放在盘子中","锅中倒入热水，将盘子放入锅中，大火蒸 3 分钟","烧热油，倒入虾盘中，倒入生抽"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蒜蓉西兰花","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["西兰花","大蒜","生抽","蚝油","白糖"],"steps":["将 西兰花 切成小朵，清洗干净。","将 大蒜 去皮，切成蒜末，备用。","锅中加入 1000 ml 饮用水，大火烧开。","放入 西兰花，保持大火 **煮 2-3 分钟**，至 西兰花 颜色变翠绿，口感变软。","将 煮好的 西兰花 捞出，沥干水分，摆入盘中，备用。","热锅，加入 10 ml 食用油。油温升高后，放入 大蒜末，小火煸炒出香味。","加入 10 ml 生抽，5 ml 蚝油，2 g 白糖，加入 30 ml 饮用水。","将锅中汤汁烧开。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"蒜香酱油","time":20,"level":"简单","tags":["调料","开源"],"ings":["蒜头","白芝麻","花生油","酱油","蘸料碟"],"steps":["拍碎蒜头","往蘸料碟中加入酱油","起锅，加入花生油，等到油温滚烫后加入拍好的蒜头，炸半分钟","半分钟后，关火，把热油倒入蘸料碟，用筷子搅拌即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"蒜香黄油虾","time":20,"level":"简单","tags":["水产","海鲜","开源","虾"],"ings":["大虾","无盐黄油","大蒜","白葡萄酒","柠檬","厨房用夹"],"steps":["大虾去头去壳留尾，用牙签挑去虾线，洗净后用厨房纸吸干水分","大蒜切成蒜末，备用","中火加热平底锅，放入 10ml 橄榄油","油热后放入大虾，每面煎 1-1.5 分钟至变色，取出备用","同一锅中加入黄油，融化后放入蒜末，小火炒香（约 30 秒）","如使用白葡萄酒，此时加入并煮至酒精挥发（约 1 分钟）","将虾放回锅中，与蒜香黄油酱汁翻炒均匀（约 1 分钟）","挤入柠檬汁，翻炒均匀后立即关火"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蒲烧茄子","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["茄子","蒲烧汁","蜂蜜","白糖","生抽","老抽","料酒","水"],"steps":["茄子削皮、横着切成两段","蒸 5 分钟","纵向切开，不要切断，在两边切面各划 2~3 刀至可以摊平","煎至两面金黄","往茄子上浇蒲烧汁至没过 1/2 茄子高度","煎至背面上色，翻面","把剩下的蒲烧汁浇在茄子上","出锅，一份茄子烧蒲烧汁就烧好了"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"蒸卤面","time":20,"level":"中等","tags":["主食","开源","面"],"ings":["猪五花肉","芹菜","鲜面条（要求必须是最细的","葱","食用油","生抽","花椒","干红椒"],"steps":["猪肉去皮，切成 `2 cm * 6 cm * 0.5 cm` 薄片备用","芹菜去叶，去掉根部 2cm，然后从中对半切开，切成 2cm 段备用","大蒜去皮切粒备用，葱切 0.2cm 薄片备用，姜切细丝备用","炒锅烧热至冒烟后，倒入 3ml 食用油滑锅后倒出底油","重新加入食用油，加入肉片，葱姜蒜，干红椒，炒 1 分钟，注意不停匀速翻炒","加入料酒，生抽，老抽，再翻炒 1 分钟","续入 500ml 热水。盖上锅盖炖煮 3 分钟","将芹菜，青椒倒入锅中，加入盐，五香粉调味，盖上锅盖继续炖煮煮 3 分钟 后关火"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"蒸水蛋","time":20,"level":"简单","tags":["早餐","开源"],"ings":["新鲜鸡蛋","热水"],"steps":["鸡蛋打入碗中，打散","取其他容器，倒入 1.5 倍（半个蛋壳为 0.5 倍水）于蛋液的温水（温度 20~30），将盐倒入水中化开","将盐水倒入鸡蛋液中，顺时针或逆时针单方向搅拌均匀，气泡之类的可以用舀出丢弃，过筛则口感更加。","使用锡纸包裹盛蛋液的碗（或用盘子盖住），置入提前带盖并加入大约 3cm 深度水的锅中","中火烧至水开，转最小的火继续蒸 4 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蒸箱鸡蛋羹","time":15,"level":"中等","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["鸡蛋","食用盐","食用油","生抽","蒸箱"],"steps":["一个鸡蛋放入碗中打散","向碗中加入鸡蛋体积 1.0-1.5 倍 60 度纯净水，并且搅拌均匀","加入食用盐 1g","加入食用油 5ml","过滤蛋液，去掉蛋液中的浮沫（可选，不过滤蒸出来的蛋会有气泡导致不好看）","确认蒸箱的水源已经补充至足够（若不确定，可把水槽补满）","将已经完全搅拌均匀的鸡蛋液碗放入蒸箱","调节至**100摄氏度**蒸 **10 分钟**"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"蒸花卷","time":20,"level":"简单","tags":["早餐","开源"],"ings":["冷冻花卷","圆碟子","蒸架","水"],"steps":["从花卷的包装袋中取出 5 个花卷","把花卷平铺在碟子上，尽量不用重叠","往锅里倒入 400ml 水，把蒸架放里面，把装花卷的碟子放在蒸架上，盖上锅盖。","开大火加热，直至水沸腾。","转中火加热 15 分钟","开盖用手感受花卷的表面温度，如果不够热，就继续盖上盖子加热，否则就可以关火出锅。","碟子取出放凉至 50 度即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"蔗糖糖浆","time":20,"level":"简单","tags":["调料","开源"],"ings":["白砂糖","水"],"steps":["将称好的白砂糖的饮用水于容器混匀","容器封盖放冰箱冷藏"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"虎皮肘子","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["猪前肘","食用植物油","冰糖","盐","老抽","生抽","白醋","香叶"],"steps":["猪肘解冻后水泡 1 小时去除血水。","使用清洁球在水中刷洗猪肘，将其表面烧焦的部分去除。刷洗结束后，猪肘再次呈现出未被灼烧前的状态。","将猪肘置于铁锅中，加尽量多的冷水，具体视铁锅深度与猪肘大小而定，在保证可以拿得动铁锅及其内容物的情况下，能浸没猪肘 3/4 以上为最佳。","取 1 棵葱的葱白，分成 3 段，放入锅中。","取 3 粒蒜，分别用刀身拍扁，放入锅中。","取 3 克姜，放入锅中。","将 2 汤匙料酒加入锅中。","锅中水烧开后，等待五分钟，随后将猪肘取出，捡出锅中所有配料，更换容器保留所有肉汤备用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"虎皮青椒","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["青椒","大蒜","白糖","醋","生抽","盐"],"steps":["去掉青椒蒂，用自来水冲洗干净。","青椒切长片，平均一个青椒纵向切成 3-4 片即可。","大蒜去皮，切成碎末，体积在 2mm x 2mm x 2mm 即可。","`调料 1`：拿一个小碗倒入 20ml 油，将大蒜末放入其中。","`调料 2`：白糖、生抽、醋、盐全部倒入砵（碗）等容器，搅拌。","将 `调料 1` 倒入锅中，开火加热 5 成放入青椒，青椒片不要叠在一起，单独成片放置锅中。","用锅铲不停的按压青椒，合适的时候翻面。","翻炒约 2 分钟，待青椒表皮出现褶皱时，倒入 `调料 2`。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"蚂蚁上树","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["红薯粉丝","猪肉末","郫县豆瓣酱","生抽","老抽","食用油","蒜末、姜末","小葱"],"steps":["红薯粉丝提前泡软，泡水时间为 20 分钟，备用","将蒜、姜分别剁碎，备用","锅烧热，加入 10ml 食用油，加入蒜末、姜末炒香","加入猪肉末翻炒至**肉色发白且微微出油**","加入郫县豆瓣酱，炒至**红油析出**","加入生抽和老抽，翻炒均匀","倒入 300ml 清水，煮沸","放入泡软沥干的粉丝，用筷子轻轻拨动防止粘连"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蚝油三鲜菇","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["香菇","蟹味菇","白玉菇","小米辣","菜椒","食用油","盐","料酒"],"steps":["蟹味菇、白玉菇 去掉根部泥土，掰散菌朵","香菇切片（每片厚度 0.5-1 cm，厚点相对薄点更有嚼劲）","生粉倒入小碗中，加入 50ml 水，搅拌生粉直至融化没有颗粒（即水淀粉）备用","水开，放入西蓝花，清水煮 3 分钟，放入碗中备用","洗锅烧开水，加入 5 g 食用盐，倒入蟹味菇、白玉菇、香菇，水煮 1 分钟","1 分钟后，捞出沥干水分","起锅烧油，待油开始冒小泡，放入姜末、小米辣、菜椒 煸炒 30 S","倒入三鲜菇，然后依次倒入生抽、蚝油、鸡精，翻炒均匀后，倒入水淀粉"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"蚝油生菜","time":15,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["生菜","蚝油","大蒜","生抽","盐","白糖","食用油"],"steps":["生菜洗净并去掉烂菜叶。","热锅，先放 1 L 清水（凉），然后在锅内放入 2 ml - 3 ml 食用油和 0.5 g 盐，等待锅中的水煮沸。","水沸后，放入生菜，将**每一片**生菜叶都焯水 10 s。","捞出生菜，控干水份，摆盘 。","调汁：将生抽 10 ml 、蚝油 6-8 ml 、盐 0.5 g 、 白糖 1 g 放入碗中调匀，并加入 10-15 ml 清水（凉）搅拌均匀。","再开火，热锅，放入食用油 5-8 ml，油热放入蒜泥。","等待有蒜香飘出，倒入调好的汁，煮沸即可，立马关火。","将锅中的汤汁均匀地**浇**在生菜上。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"蛋包饭","time":25,"level":"中等","tags":["主食","开源","饭"],"ings":["鸡蛋（建议使用土鸡蛋","洋葱","胡萝卜","玉米粒","青豆","火腿肠或鸡胸肉","米饭","番茄酱"],"steps":["洋葱、胡萝卜、火腿肠或鸡胸肉切成小丁，备用","热锅，锅中倒入 10ml 食用油，等待 10 秒加热","先放入洋葱丁翻炒 1 分钟，出香味后加入胡萝卜、玉米粒、青豆继续翻炒 2 分钟","加入火腿肠或鸡胸肉丁，炒至变色","加入米饭炒散后，加入番茄酱 20ml，翻炒均匀，炒饭完成，盛出备用","鸡蛋打散，加入 10ml 牛奶搅匀","锅中放入 5ml 食用油，倒入蛋液，轻晃锅底让蛋液均匀铺满锅面","用小火加热，待蛋液表面半熟状态时，将炒饭放入蛋液中央"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"蛋炒饭","time":25,"level":"中等","tags":["主食","开源","饭"],"ings":["冷饭","鸡蛋","火腿","黄瓜","胡萝卜","油","盐","胡椒粉"],"steps":["米饭提前用铲子铲成小块","火腿肠、胡萝卜、黄瓜等根据需求切片或者块状","如果家里有熟肉 准备好味道更佳","将蛋白，蛋黄分开，分别打入一个大碗里，各自搅匀。注意，不要在这一步加盐。","大火热锅，待锅里冒烟放入食用油，放入蛋白，待主体凝固后盛出备用。","如果油够，则直接放入蛋黄，如果油不够则放入食用油并等其升温到大火热锅","待主体凝固后，将火调至中小火，倒入火腿肠、熟肉，胡萝卜、黄瓜等备料、翻炒 10 秒钟（到爆香）","重新倒入蛋白，翻炒 5s 钟，迅速倒入米饭大火翻炒，为的就是每一粒饭都裹上鸡蛋。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"蛋煎糍粑","time":20,"level":"简单","tags":["早餐","开源"],"ings":["鸡蛋","糍粑","白糖或红糖"],"steps":["把糍粑切成长方形小块，便于后面煎","碗里打入一个鸡蛋并把鸡蛋搅碎，加入 2g 食用盐","将切好的小糍粑依此放入搅碎的鸡蛋里面，涂抹完糍粑双面为止","锅里倒入植物油 10ml ，把涂抹好的糍粑小块放进去小火慢慢煎软。","将剩下的鸡蛋液慢慢倒在糍粑表面","用筷子或者勺子为糍粑翻面，来回煎至金黄色后开吃"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"蛏抱蛋","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["蛏子","鸡蛋","食用油","洋葱","淀粉","生抽","鸡精","料酒"],"steps":["烧开水，将蛏子放入水中，水煮 2 分钟后，捞上来去壳，放入大碗","往大碗中加入洋葱、生抽、料酒、鸡精、生粉后，充分搅拌","往大碗中打入 2 个 鸡蛋，继续搅拌","起锅烧油，倒入碗中蛏子，煎炸至单面金黄后，翻面继续煎炸"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"螺蛳粉","time":20,"level":"简单","tags":["主食","开源"],"ings":["袋装螺蛳粉一包","米粉","螺蛳肉包","汤料包","醋包、辣椒油等调味包","电磁炉/灶台"],"steps":["锅中加水，将水烧开","下米粉，煮 3-5 分钟，期间用筷子搅拌，防止米粉粘在一起","下汤料包，按个人口味添加","下一部分配料包，如木耳，花生，螺蛳（这部分配料需要煮一会才入味）","下调味包，按个人口味添加","搅拌后捞出，放入碗中","下剩下的配料包，如酸笋，豆皮（这部分配料不适合被汤泡太久）","享用美食"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"血浆鸭","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["鲜仔鸭肉","姜","蒜仔","葱","辣椒","酒","生抽","料酒"],"steps":["鲜仔鸭肉切成约 3cm 小块，加料酒、姜片，去除血水。","炒锅烧热，放入约 100ml 食用油，大火待油烧开，放入腌制好的鲜鸭肉，不断翻炒。","待鸭肉完全变色（肉眼可见泛白），放入酒，再加入 200ml 开水，刚好淹没鸭肉即可，盖上锅盖中火煮 15 分钟。","水开之后，打开锅盖放入姜蒜，翻炒一遍，盖上锅盖持续加热 10 分钟。","打开锅盖放入辣椒，不断翻炒，待至肉眼可见辣椒炒软，放入鲜鸭血，此时需要不断翻炒，确保每块鸭肉和每片辣椒都有鸭血的浸润（此乃血浆鸭的精髓）。","翻炒至肉眼可见鸭血均为黑色，加入盐，鸡精，香葱，（喜欢食用山胡椒油的朋友也可以在此时放入 3-6 滴山胡椒油）再次翻炒一到二次即可。","出锅盛盘，上桌食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"西红柿土豆炖牛肉","time":20,"level":"中等","tags":["肉菜","家常","开源","土豆","牛肉"],"ings":["牛肉","小料","葱","姜","料酒","花椒","八角","香叶"],"steps":["备菜:","制作","炖煮"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"西红柿炒鸡蛋","time":15,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["西红柿","鸡蛋","食用油","盐","糖","葱花"],"steps":["西红柿洗净","可选：去掉西红柿的外表皮","西红柿去蒂，切成边长不超过 4cm 的小块，即为 `西红柿块`","将鸡蛋打入碗中，加入 `1g * 份数` 的盐，搅匀，即为 `鸡蛋液`","热锅，加入食用油","油热后，倒入 `鸡蛋液`。翻炒至鸡蛋结为固体且颜色微微发黄，即为 `半熟鸡蛋`","关火。将 `半熟鸡蛋` 盛盘，重新开火","加入 `西红柿块`，锅铲拍打并翻炒 20 秒，或至西红柿软烂"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"西红柿牛腩","time":90,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["西红柿","牛腩","燃气灶","生抽、白胡椒粉"],"steps":["牛腩切条、切块成长宽高均 2cm ，冷水下锅，开锅煮制 2 分钟去除血水，捞出冲洗干净","西红柿去皮：西红柿头部滑十字至腰线，筷子/刀叉从果蒂捅入，煤气灶小火，一边转动一边烤，及时拿下来查看，起皮后撕下来，切块。越小越好","起锅烧油，油温 7 成热，葱、姜各 10g，番茄下锅，炒透炒出番茄红色，加入煮好的牛腩和原汤，原汤刚刚没过牛肉即可","根据个人口味放入盐、糖、生抽调味盖盖","开锅后大火继续炒制 3-5 分钟","待番茄汁呈中等粘稠程度后关火，散入葱花，盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"西红柿豆腐汤羹","time":20,"level":"简单","tags":["素菜","蔬菜","开源","豆腐","汤"],"ings":["西红柿","鸡蛋","豆腐","食用油","盐","淀粉","鸡精","香葱"],"steps":["西红柿切成小丁、鸡蛋打入碗中搅拌、豆腐切块备用","起锅烧油，放入姜片 5 S 后倒入入西红柿翻炒 30 S","锅中加入开水，汤水烧开，60 S 后到入鸡蛋液、豆腐块","汤水重新烧开后，加入水淀粉，沿一个方向搅拌 2 圈","加入鸡精、盐、香葱，30 S 后起锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"西红柿鸡蛋挂面","time":20,"level":"简单","tags":["主食","开源","鸡蛋","鸡","面"],"ings":["挂面或者鲜面条也行","西红柿一个","盐","鸡蛋","葱","酱油、蚝油或者鸡精","白砂糖（中和西红柿的酸味","青椒"],"steps":["小葱洗净并切成葱花","西红柿切块儿，如果不太会切建议先百度一下~","青椒切成菱形块","生鸡蛋打入一个小碗并打散，如果鸡蛋有点腥味可以加 2g 白醋去腥","起锅烧热，倒入 15~20g 食用油，鸡蛋炒嫩滑就得多一点油，同时为后面煸炒西红柿留一些底油","待油温到七成热时（手掌隔大概 10cm，能感觉到热），倒入蛋液快速划散","鸡蛋滑到凝固后，一点不会有蛋液了后倒入小碗备用，此处留一些底油","锅中留底油后先加入葱白、蒜末炒香"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"西红柿鸡蛋汤","time":20,"level":"简单","tags":["汤","开源","鸡蛋","鸡"],"ings":["西红柿","鸡蛋","香油","味素","盐","葱、姜、蒜"],"steps":["将西红柿洗净，切块。","葱姜蒜切碎。","鸡蛋打到碗中，用筷子（或打蛋器）搅拌均匀。","热锅，并放入 15 毫升的油，待能从油中看到冒出一丝烟时，放入葱姜蒜翻炒 30 秒。","放入西红柿翻炒 1 分钟。","倒入水，水的高度大约为锅内菜品高度的 1.2 倍，并放入盐。","待开锅后，将鸡蛋液放入，并用筷子将鸡蛋打散，放入味素和香油。","等待 30 秒，关火出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"西葫芦炒鸡蛋","time":15,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["西葫芦","鸡蛋","西红柿","食用盐","食用油"],"steps":["西红柿洗净，切成小块，备用","西葫芦洗净，切成边长约为 4cm 的菱形，备用","打三个鸡蛋到碗里，打散搅匀，备用","热锅，锅内放入 5ml - 10ml 食用油","倒入鸡蛋，保持翻炒至鸡蛋成固体，用锅铲分成小块后盛到碗里，备用","锅内放入 5ml - 10ml 食用油，倒入西红柿，炒至变软","倒入西葫芦一起翻炒均匀，放入 6g 食用盐，将火调小然后**等待 4 - 5 分钟**","倒入备用的鸡蛋，中火翻炒 15 秒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"话梅煮毛豆","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["毛豆","话梅","食用盐"],"steps":["清水加入食用盐，毛豆浸泡 15 分钟","加入开水，倒入毛豆、话梅，水煮 20-30 分钟","起锅开吃"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"豆角焖面","time":20,"level":"中等","tags":["主食","开源","面"],"ings":["鲜面条","肉","盐","豆角","鸡精","耗油","味精","十三香"],"steps":["将豆角切成 5cm - 6cm 的小段。","将葱切成 1cm - 2cm 小段。","将姜切成 1mm x 1mm x 3cm 的长条","将蒜放在砧板上拍碎，切成 1mm 的粒度。","将五花肉切成 2mm 厚度的肉片。","首先将锅烧热，烧去锅内全部水汽，手放过内距离锅底 10cm 处，感觉明显有些许烤手。","加入上述定量的食用油，手持锅柄，离灶 5cm 处，摇晃锅，使食用油充分挂满锅的三分之二（自下而上）。","放入全部的姜和全部的葱段，翻炒爆香 5 秒（注意！此时有油飞溅的危险，建议带上手套或做好防护措施）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"豆豉鲮鱼油麦菜","time":20,"level":"简单","tags":["肉菜","家常","开源","鱼"],"ings":["油麦菜","甘竹牌鲮鱼罐头","蒜","生抽","白糖","食用油"],"steps":["**食材处理**：","**炒制过程**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"豉汁排骨","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["肋排","阳江豆豉","蒜蓉","姜末","生抽","老抽","蚝油","白砂糖"],"steps":["将排骨用冷水浸泡 10 分钟泡去血水，换水重复 2 次，用厨房纸吸干","将豆豉放入水中浸泡 5 分钟","将所有食材混合（食用油放 10 ml），腌制 8-30 分钟","水开后上锅蒸 18 分钟","焖 2 分钟","锅中倒入 10 ml 热油，加热到 180-200 ℃","均匀撒上葱花和白芝麻，热油浇在撒料上"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"豉汁蒸白鱔","time":30,"level":"中等","tags":["肉菜","家常","开源"],"ings":["白鱔","豆豉","蒜头","姜","葱","生抽","老抽","糖"],"steps":["**检查与清洗白鱔**：","**准备酱汁**：","**摆盘**：","**蒸制**：","**装饰与完成**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"贵州辣子鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["农村玉米鸡","土豆","大蒜","香叶","姜","老抽","花椒 or 麻椒","糍粑辣椒（花溪党武的辣椒"],"steps":["在锅中加入和锅一半高度的油，将切成长条的土豆先炸至表面金黄然后捞出备用，等油温上至烤手时候将切好的鸡块放入锅中炸，并放入切好的生姜片和花椒","刚开始炸鸡的时候，油是浑浊的，因为鸡块里面有水的原因，等到油炸至清澈，鸡块就炸好了，然后捞出备用","现在锅里面的油可以捞三分之一出来，现在用不到这么多的油","将锅中剩余的油加热，加入糍粑辣椒，豆瓣酱，生姜片，炒出红油状，将炸好的鸡块翻炒均匀","等到鸡块都上色，加入老抽，倒入啤酒，啤酒一定要盖过鸡块，加上香叶盖上盖，闷十分钟，期间间隔翻炒","然后加入土豆条，大蒜（不用切，一颗一颗的最好），然后再闷 20 分钟","最后加入酒糟翻炒均匀再加入切好的蒜苗，就可以出锅了"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"辣椒炒肉","time":30,"level":"中等","tags":["肉菜","家常","开源"],"ings":["青椒（吃辣的话推荐用杭椒","猪瘦肉","盐","生抽","蚝油","大蒜","姜","酱油"],"steps":["将`青椒`洗净，去除`青椒把`以及`青椒籽`，再用`滚刀手法`切好备用。","`大蒜`用刀拍一下，再横切成`蒜瓣`，`生姜`切碎成`姜末`。","将`猪瘦肉`切成`肉片`（顺着猪肉的纹理切，即刀和肉的纹理呈水平线，出来的肉片，纹路呈“川”字）。","将切好的`猪肉`洗净，放入空碗，再加入计算好的`生抽`、`蚝油`、`盐`搅拌均匀，腌制 10 分钟。","热锅，不用倒油，把`切好的青椒`放入锅中，大火干煸至虎皮状后，再加 2g`盐`继续翻炒 1 分钟 后捞起。","不用洗锅，大火热锅，加入份数 * 8ml`油`，等待 30s，加入`蒜瓣`、`姜末`翻炒 15s。","加入腌制好的`猪肉`倒入锅内翻炒 2 分钟，再加入干煸过的`青椒`翻炒 1 分钟。","根据个人口味喜好加入`豆豉`，最后加入`酱油`，继续翻炒 30s。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"速冻水饺","time":20,"level":"简单","tags":["半成品","开源"],"ings":["未过期的一袋速冻水饺"],"steps":["中火，将水倒入锅中，静候水煮沸。","将饺子倒入锅中。","倒入锅前可以适当用水过一下。","倒入饺子后，可以用炒菜勺子或铲子搅水，但要注意不要铲到饺子上，以避免粘锅上撕破皮或互相粘连造成粘连处夹生。","频率不需要太高，平均每 `30` 秒摇 `3` 秒，饺子浮起后不需要再做此步。","所有饺子浮起后（下饺子后约 8 分钟）用铲子或漏勺把饺子铲入盘或碗中，装盘后即可食用。","吃完饺子后，等锅内水温降低，将水倒掉并用洗洁精及时刷锅，不然过段时间锅内煮过的面粉会在锅壁形成黏糊糊的物质。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"速冻汤圆","time":20,"level":"简单","tags":["半成品","开源","汤"],"ings":["速冻汤圆"],"steps":["取出速冻汤圆，放入碗中。","倒入开水，直至浸没汤圆。","微波炉高火 4 分钟。","假如汤圆均已吸水膨胀，则已熟。","如果没熟，再加热 1 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"速冻馄饨","time":55,"level":"简单","tags":["半成品","开源"],"ings":["未过期的一袋速冻馄饨","盐","鸡精","胡椒粉","香油","香菜"],"steps":["将水倒入电饭煲中，按炖或煮的模式运行 35 分钟，此时揭开电饭煲应看到水为沸腾状态。","将速冻馄饨小心放入水中，注意不要烫伤。","放入电饭煲前可以适当用水过一下。","如果馄饨有调料包，此时可一并加入水中。","盖上电饭煲，按同样炖或煮的模式运行 20 分钟。","将所有馄饨连同能没过所有馄饨的水一同盛入碗中。","如果此前没有加入调料包，此时可按自身口味轻重加入盐、鸡精、胡椒粉、香油调味。","也可撒上 5~8 片香菜叶佐味（仅适用于对香菜味道不敏感的人）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"酒酿醪糟","time":20,"level":"中等","tags":["饮品","开源"],"ings":["糯米","清水","温度计"],"steps":["将 800g 糯米淘洗干净放入电饭煲，加入 720g 清水选择蒸饭模式","蒸熟后将米饭倒出摊凉，使用干净的工具将其摊至 30°C （用温度计测量为宜，体感温热但不烫手）","将 8g 安琪甜酒曲用 20ml 温水（约 30°C）化开，均匀撒在糯米饭中，同时翻拌均匀","向糯米饭中加入 600g 清水帮助酒曲翻拌均匀。静置 2-3 分钟后发现糯米饭吸饱水分。这次加水可以让酒酿首次发酵便汤汁丰富","用擀面杖在糯米饭中央挖一个小洞（便于出酒）","将混合好的米饭装入干净容器中，轻轻压平表面，盖上盖子或保鲜膜密封好","放置于 28 ～ 32°C 环境下发酵 24 ～ 48 小时。发酵期间不可剧烈摇晃或移动","发酵成功标准为：中间凹槽有透明酒液渗出，整体略带酒香，无异味、不酸败"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"酱拌荞麦面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["荞麦面","黄瓜","红萝卜","老干妈"],"steps":["荞麦面下冷水煮熟，8-10 分钟 后捞出沥干备用","黄瓜、萝卜 切成小条","将荞麦面、黄瓜、萝卜放入盘子，放上老干妈，搅拌"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"酱排骨","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["排骨","五香粉","料酒","食用油","白砂糖","老抽","生抽","蚝油"],"steps":["起锅烧热水，放入排骨、姜片、料酒，煮开后用勺子舀去白色油沫，2-3 分钟后出锅","冷水清洗排骨，清洗 2-3 遍","小火起锅，加入食用油，加入白砂糖 ，轻轻搅拌到糖水变成黄色","倒入排骨翻炒 30 S 后，加入生抽、蚝油、五香粉、蒜、小米椒后翻炒 30 S 后，加入清水没过排骨","大火煮 30 分钟，加入老抽上色，再煮 10 分钟","起锅摆盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"酱炖蟹","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["螃蟹（首选河蟹","豆瓣酱","冰糖","老抽","菜油（未脱色的菜籽油","番茄酱","料酒","老姜"],"steps":["把螃蟹刷洗干净，然后在砧板上对半劈开","锅里下菜油，放入姜末和豆瓣酱爆香，加入冰糖炒化，直到冒小气泡就盛出","在盘子里铺上一层酱，然后把切好的螃蟹切开面朝下，整齐排放在酱上","放点葱段和姜片，建议敲个鸡蛋或在盘底铺肉末","上锅蒸 10-12 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"酱牛肉","time":20,"level":"进阶","tags":["肉菜","家常","开源","牛肉"],"ings":["牛腱子肉","香叶","姜","葱","老抽","桂皮","冰糖","花椒"],"steps":["牛腱子肉清洗干净，用清水浸泡 1 小时，去除血水","用牙签或者叉子在牛腱子肉表面扎孔，加料酒、花椒、姜片后，用保鲜膜紧密包裹容器，腌制 4-6 小时","牛腱子肉切成 8cm，不超过 10cm 的肉块","牛腱子肉放入锅中，加入冷水至水面没过牛肉，开锅至水沸腾开始计时，同时捞出浮沫。3 分钟后停火，捞出牛肉，用温水洗净","将洗净后的牛腱子肉放入砂锅或炖锅，加水没过牛腱子肉，开大火，放入除盐之外其他未使用的配料","水开之后，大火转为小火，持续加热 90 分钟，加盐","加盐后，继续小火 90 分钟（注：每 30 分钟确认水位线，要求至少达到牛肉面高度的 80%）","加热 180 分钟后，捞出牛腱子肉，捞出牛腱子肉，用保鲜膜紧密包裹，放入冰箱冷藏数小时"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"酸奶意式奶冻","time":20,"level":"中等","tags":["甜点","开源"],"ings":["淡奶油","糖","原味酸奶","吉利丁片","筛网"],"steps":["吉利丁片剪成小片，泡入冷水中","淡奶油和糖放入锅中，加热至 60 度","关火，吉利丁从水中取出，控干水份，加入热淡奶油中，搅拌均匀","淡奶油降温至 40 度，加入原味酸奶，搅拌均匀","将上述步骤得到的混合物过两遍筛网","分装入合适的容器，放入冰箱冷藏 4 小时以上"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"酸梅汤","time":20,"level":"简单","tags":["饮品","开源","汤"],"ings":["水","乌枣","乌梅","山楂片","黄冰糖","甘草","陈皮","红豆蔻"],"steps":["冲洗材料（干桂花和冰糖除外）， 1.5 升水常温浸泡两小时以上（干桂花和冰糖除外）","开中大火煮沸，盖盖，转小火煮 40 分钟，为头煎","将冰糖放入盆内，再将沥好用材的头汤趁热倒入，搅拌至冰糖融化。","药材重新装回锅内再 600 毫升的水，开大火煮沸，盖盖，转中火，再煮 20 分钟为二煎","最后将二煎和冰糖水趁热混合为成品。在成品 60-70℃加入干桂花（不要超过 80℃）加盖晾凉再放入冰箱冷藏 3 小时以上。","饮用时记得将干桂花沥出。如饮茶般细啜，冰凉振齿，酸醒人、甜适度，滋味丰满而悠长"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"酸梅汤（半成品加工）","time":20,"level":"简单","tags":["饮品","开源","汤"],"ings":["酸梅晶固体饮料","方糖"],"steps":["取饮用水 1177 克。","放入酸梅晶固体饮料 60 克，使用汤匙顺时针搅拌 50 圈。","再放入剩下 60 克酸梅晶固体饮料，再次使用汤匙顺时针搅拌 50 圈。","放入 9 克的方糖，使用汤匙顺时针搅拌 100 圈。","放入北京二锅头酒 48 克，用汤匙顺时针搅拌 30 圈。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"酸辣土豆丝","time":20,"level":"简单","tags":["素菜","蔬菜","开源","土豆"],"ings":["土豆","大蒜","青椒","红椒","干辣椒","葱","生抽","陈醋"],"steps":["土豆去皮、切丝（或用刨丝器）。","切好的土豆丝用清水清洗，去除多余的淀粉，然后对土豆丝焯水 10 秒。沥干，备用。","葱切成葱花；大蒜拍碎切成蒜末（分为两等份备用）；干辣椒切小段；青红椒切丝。","热锅，小火热油，下入一半的葱花（葱白部分）、一半的蒜末和干辣椒爆香。","加入青红椒翻炒几下，加入土豆丝翻炒至变色。","加 5ml 生抽，10ml 陈醋，倒入剩下的一半蒜末和 2g 盐快速翻炒均匀。","出锅前撒上剩余的葱花，翻匀即可装盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"酸辣蕨根粉","time":10,"level":"简单","tags":["主食","开源"],"ings":["蕨根粉","油泼辣子","酱油","香醋","小米辣","蒜","葱","盐"],"steps":["锅中加入约为深度 3/5 的水，烧开","水沸腾后加入蕨根粉，中小火煮 8 分钟","出锅","根据配比，加入酱油、醋、油泼辣子","用筷子蘸取，尝一口","如果觉得此时酱油味稍浓，加入准备好的盐","如果觉得此时不够鲜，加入准备好的糖","充分搅拌至大部分颗粒状调料溶解"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"醉排骨","time":40,"level":"中等","tags":["肉菜","家常","开源"],"ings":["排骨","白砂糖","食用油","鱼露","芝麻","番茄酱","香醋","蒜头"],"steps":["排骨中加入 5 g 地瓜粉和水进行搅拌，清洗 2-3 遍后放入大碗备用","排骨中加入鱼露、地瓜粉、鸡蛋黄 充分搅拌","将排骨一个一个放入锅中（切记不可以整碗倒入），保证每个不要粘在一起","全部放入后，每 30 S 用勺子来回两面翻转瘦肉块，直至排骨表面金黄","取出排骨，一分钟后倒入油锅中继续炸，直至瘦肉块表面出现焦黄后，取出放入大碗备用","准备一个小碗，加入蒜末、香醋、白砂糖、鱼露、番茄酱、葱花、芝麻搅拌均匀，倒入 5 ml 热油","将汤汁浇灌入排骨，在充分搅拌后倒入盘中"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"醪糟小汤圆","time":20,"level":"简单","tags":["主食","开源","汤"],"ings":["小汤圆","醪糟","白糖","枸杞"],"steps":["将水倒入锅中并煮沸","放入小汤圆煮 8 分钟","放入醪糟和枸杞再煮 2 分钟","盛入碗中根据个人口味加入白糖并搅拌均匀","吃"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"金枪鱼酱三明治","time":20,"level":"简单","tags":["早餐","开源","鱼"],"ings":["方形吐司片","蛋黄酱","俄式酸黄瓜汁","芝士片","火腿片","轻食机"],"steps":["将金枪鱼、蛋黄酱、俄式酸黄瓜汁倒入碗中，用勺子搅拌，保证将金枪鱼块搅碎，酱整体呈糊状，并备用","将 1 片吐司放在轻食机上","将做好的金枪鱼酱涂抹到吐司上，建议 10-15ml","将另一片方形吐司片覆盖在上面，并按压轻食机，开机","待轻食机自动停止加热，即可装盘使用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"金汤力","time":5,"level":"简单","tags":["饮品","开源","汤"],"ings":["金酒","汤力水气泡水","柠檬","冰块","新鲜绿叶（可选","手动压汁器"],"steps":["将柠檬对半切（**刀方向垂直于柠檬的头尾连线**），并从其中的一半中切取一片柠檬备用","再次将柠檬对半切，将得到的 4 角柠檬用压汁器压出柠檬汁置于容器中备用","选择一个杯子，建议使用容量在 350~400 毫升的透明玻璃杯","将 100 克冰块放置在杯底","倒入 30~40 毫升金酒","倒入 15 毫升柠檬汁（如果喜酸可以加多点或全加）","用勺子搅拌均匀","将之前准备的一片柠檬放置好"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"金菲士","time":5,"level":"简单","tags":["饮品","开源"],"ings":["金酒","苏打气泡水","柠檬","[蔗糖糖浆]","冰块","新鲜绿叶（可选","手动压汁器","雪克瓶"],"steps":["将柠檬对半切（**刀方向垂直于柠檬的头尾连线**），并从其中的一半中切取一片柠檬备用","再次将柠檬对半切，将得到的 4 角柠檬用压汁器压出柠檬汁置于容器中备用","选择一个杯子，建议使用容量在 350~400 毫升的透明玻璃杯","将 100 克冰块放置在杯底","倒入 30~40 毫升金酒","倒入 20 毫升柠檬汁（如果喜酸可以加多点或全加）","倒入 30~40 克蔗糖糖浆","用勺子搅拌均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"金针菇日本豆腐煲","time":30,"level":"简单","tags":["素菜","蔬菜","开源","豆腐"],"ings":["金针菇","日本豆腐","小米椒","生抽","蚝油","盐","糖","食用油"],"steps":["豆腐切片，小火煎到两面金黄出锅备用。","切蒜成蒜末；将生抽，蚝油，老抽，糖，100ml 水调汁备用。","热锅放油，油热放小米椒、蒜末爆香，先放金针菇，炒软，把煎好的豆腐平铺在金针菇上，倒入#2 配好的料汁，焖 5 分钟，大火收汁。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"金针菇汤","time":10,"level":"简单","tags":["汤","开源"],"ings":["金针菇","鸡蛋"],"steps":["金针菇徒手掰散，越散越好**不然容易藏牙**，洗净备用。","用菜刀或者水果刀将上述金针菇段段切，可依据个人喜好，但长度不宜超过 5 cm。","将金针菇放入锅中，加水没过约食材总高度 1.1 倍，沸腾后**等待 3 分钟**。","加入味精和食盐并搅拌。","继续加热约 30 秒，关火装盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"金钱蛋","time":30,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["鸡蛋","线椒","小米辣","豆瓣酱","蒜","小葱","玉米淀粉","食用油"],"steps":["鸡蛋冷水下锅，大火煮开转小火煮 8 分钟","用自来水冲凉，方便剥皮","蒜切沫（粒径不大于 1 mm），线椒和小米辣切小粒（约 2-3 mm）","每个熟鸡蛋沿短轴切成体积类似的 4 份","如果打算沾淀粉，每片鸡蛋粘上淀粉，抖掉多余的淀粉","锅内放入 25 ml 油（如果不沾淀粉，放 20 ml），放入熟鸡蛋片","煎至微焦黄后，补 10 ml 油（如果不沾淀粉，补 10 ml），翻面","第二面微黄后，加入线椒、小米辣、蒜末煎制约一分钟，翻面"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"银耳莲子粥","time":20,"level":"中等","tags":["汤","开源","粥"],"ings":["银耳","去心莲子","红枣","枸杞","冰糖"],"steps":["把银耳、莲子用清水浸泡 2 个小时，红枣浸泡 10 - 20 分钟，枸杞洗净，备用","在锅中倒入 600ml 水，烧开后依次放入银耳、莲子、红枣","等待水再次烧开后，盖上锅盖，转至中火继续熬","熬到大约 1 小时后，放入 5g - 10g 冰糖和 5g - 6g 枸杞，转至小火熬","小火继续熬 30 分钟，此时银耳开始呈现粘稠状态","再次放入 5g - 10g 冰糖，用勺子搅拌 5 - 10 分钟","关火，用勺子盛出"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"长岛冰茶","time":20,"level":"简单","tags":["饮品","开源"],"ings":["金酒","龙舌兰酒","伏特加","白朗姆酒","橙味甜酒","柠檬","枫糖浆","可乐"],"steps":["柠檬对半切，挤出 30ml 柠檬汁至杯中；","依次向杯中加入：","向杯中缓慢倒入 20ml 枫糖浆，边倒边搅拌；","向杯中加入 75ml 可乐；","向杯中加入冰块直至满杯；","轻轻搅拌 20 秒；","开始享用."],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"阳朔啤酒鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["剑骨鱼或鲤鱼（约","漓泉啤酒（一瓶","番茄","青椒","红椒","大蒜","生姜","葱"],"steps":["鱼处理好内脏，保留鱼鳞，清洗干净，从腹部剖开成两半（背部相连），用 15ml 料酒、姜片、食盐 3g 腌制 15 分钟","番茄切块，青椒红椒切块，大蒜拍碎，生姜切片，葱切段（葱白葱叶分开）","用姜片擦拭锅底，热锅后倒入 30ml 食用油，油热后放入鱼（鱼皮朝下），煎至两面金黄、鱼鳞酥脆，盛出备用","锅中留底油，放入葱白、姜片、蒜瓣爆香","加入 15g 桂林辣椒酱，炒出红油","放入番茄块，翻炒至番茄出汁变软","倒入整瓶啤酒，加入 15ml 生抽、5ml 老抽、5g 白糖、5g 食盐，搅拌均匀","放入煎好的鱼，大火烧开后转中小火，盖上锅盖焖煮 15-20 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"陈皮排骨汤","time":20,"level":"中等","tags":["汤","开源"],"ings":["排骨","陈皮","西洋参","石斛","玉竹","麦冬","煲汤盅","盐"],"steps":["排骨用热水过一边，去血水","陈皮、麦冬、玉竹、石斛和西洋参，冲洗干净即可","煲汤盅洗干净","打开煲汤盅，先放入排骨在底部，然后依次放入陈皮、麦冬、玉竹、石斛和西洋参","加入热水进煲汤盅，水不宜太满","煲汤容器加入水，炖煮 1.5 小时即可","加入食盐，趁热饮用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"陕北熬豆角","time":30,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["豆角","土豆","西红柿","螺丝椒","盐","生抽","五香粉","蚝油"],"steps":["葱切花，蒜切沫，姜切丝，备用。","豆角去筋，切*2-10cm*小段，备用。","土豆去皮，切*1cm³*小块，备用。","西红柿去皮，切*1cm³*小块，备用。","辣椒去仔，切*0.15cm 宽*条，备用。","起锅烧油(10ml - 15ml)，冒烟后放入葱姜蒜，翻炒至闻到葱姜蒜香味；","加入豆角，翻炒至变色（青绿色变为翠绿色）；","加入土豆块，翻炒 30s；"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"陕西油泼面","time":30,"level":"简单","tags":["主食","开源","面"],"ings":["鲜面条![
