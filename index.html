input,textarea,button,select{font-family:inherit}
input,textarea,select{font-size:16px!important;-webkit-user-select:text;user-select:text;touch-action:manipulation}
button{touch-action:manipulation}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.3)}
@keyframes tk{0%,100%{opacity:.15}50%{opacity:.9}}
@keyframes fl{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-62%)}}
@keyframes fp{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes su{from{transform:translateY(42px);opacity:.4}to{transform:translateY(0);opacity:1}}
@keyframes ps{0%,100%{box-shadow:0 0 8px 2px rgba(255,255,255,.2)}50%{box-shadow:0 0 18px 6px rgba(255,255,255,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-4px) rotate(1deg)}}
@keyframes wink{0%,100%{transform:scale(1)}45%{transform:scale(1.04)}}
.spin{display:inline-block;animation:spin .9s linear infinite}
.xb-paper-card{position:relative;overflow:hidden;border:1px solid rgba(130,120,150,.12);transition:transform .18s ease,box-shadow .18s ease}
.xb-paper-card:before{content:"";position:absolute;left:18px;right:18px;top:0;height:3px;background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.75),rgba(255,255,255,.1));opacity:.8}
.xb-paper-card:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(54,46,67,.08)!important}
.xb-card-title{display:flex;align-items:center;gap:7px}
.xb-card-title:before{content:"✦";font-size:11px;opacity:.7}
.xb-hand-note{border:1px dashed rgba(120,110,140,.28);box-shadow:0 8px 24px rgba(54,46,67,.06);animation:wink 6s ease-in-out infinite}
.xb-sticker{animation:bob 4.5s ease-in-out infinite;transform-origin:center}
.xb-dock{box-shadow:0 -10px 30px rgba(45,38,58,.08)}
.xb-bg-ornaments{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.xb-bg-ornaments svg{position:absolute;opacity:.34;filter:drop-shadow(0 8px 18px rgba(80,66,50,.06))}
.xb-bg-ornaments .floral-a{right:-76px;top:86px;width:260px;color:#A99468}
.xb-bg-ornaments .floral-b{left:-70px;bottom:86px;width:220px;color:#B98A93;transform:rotate(-8deg)}
.xb-bg-ornaments .doodle-cafe{right:22px;bottom:118px;width:170px;color:#7B624F;opacity:.22}
.xb-bg-ornaments .star-sprinkle{left:8%;top:128px;width:126px;color:#D6A85E;opacity:.2}
.xb-month-card{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.76));border-radius:24px;padding:16px;margin-bottom:14px;box-shadow:0 10px 28px rgba(54,46,67,.07);border:1px solid rgba(255,255,255,.72);position:relative;overflow:hidden}
.xb-month-card:after{content:"";position:absolute;inset:12px;border:1px dashed rgba(120,110,140,.16);border-radius:18px;pointer-events:none}
.xb-month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px;position:relative;z-index:1}
.xb-month-day{min-height:82px;border:1px solid rgba(130,120,150,.15);border-radius:15px;background:rgba(255,255,255,.72);padding:7px;text-align:left;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s ease,background .15s ease}
.xb-month-day:hover{transform:translateY(-1px);background:#fff}
.xb-month-day.is-on{border-color:currentColor;box-shadow:0 0 0 3px rgba(90,78,114,.13)}
.xb-month-day.has-mood{border-width:1.5px}
.xb-month-day.has-mood:after{content:"";position:absolute;right:6px;bottom:6px;width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 0 3px rgba(255,255,255,.68)}
.xb-day-num{font-family:Georgia,"Songti SC",serif;font-size:14px;font-weight:700}
.xb-day-icons{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;align-items:center}
.xb-day-icons span{font-size:13px;line-height:1;background:rgba(255,255,255,.68);border-radius:999px;padding:2px 3px}
.xb-day-weight{position:absolute;left:7px;bottom:6px;font-size:10px;color:inherit;opacity:.68;font-family:Georgia,"Songti SC",serif}
.xb-cafe-strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin:10px 0 2px}
.xb-cafe-tile{min-height:58px;border-radius:16px;background:rgba(255,255,255,.62);border:1px dashed rgba(120,100,85,.22);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;overflow:hidden}
.xb-cafe-tile:after{content:"";position:absolute;right:-10px;top:-12px;width:32px;height:32px;border:1px solid rgba(120,100,85,.16);border-radius:50%}
@media (hover:none){
  .xb-paper-card:hover{transform:none!important}
  .xb-month-day:hover{transform:none}

@media (min-width: 900px){
  .xb-shell{max-width:1040px!important;padding-left:28px!important;padding-right:28px!important}
  .xb-card-grid{display:grid!important;grid-template-columns:1.05fr .95fr;gap:16px;align-items:start}
  .xb-wide{grid-column:1/-1}
  .xb-vocab-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .xb-vocab-list > div{margin-bottom:0!important}
  .xb-detail-grid{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);gap:16px;align-items:start}
  .xb-detail-wide{grid-column:1/-1}
  .xb-today-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,.82fr);gap:16px;align-items:start}
  .xb-today-wide{grid-column:1/-1}
}
@media (min-width: 1180px){
  .xb-shell{max-width:1120px!important}
}
@media (max-width: 520px){
  .xb-month-grid{gap:5px}
  .xb-month-day{min-height:62px;border-radius:12px;padding:5px}
  .xb-day-icons span{font-size:11px;padding:1px 2px}
  .xb-day-weight{display:none}
  .xb-cafe-strip{grid-template-columns:repeat(3,minmax(0,1fr))}
  .xb-bg-ornaments .floral-a{width:180px;right:-82px}
  .xb-bg-ornaments .floral-b{width:160px}
  .xb-bg-ornaments .doodle-cafe{display:none}
}

function openDB(){
  if(!canIDB)return Promise.reject(new Error('no idb'));
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('xbn1',2);
    r.onupgradeneeded=ev=>{
      const db=r.result;
      if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
      if(!db.objectStoreNames.contains('dict'))db.createObjectStore('dict');
    };
    r.onsuccess=()=>{_db=r.result;res(_db)};
    r.onerror=()=>rej(r.error)

}

  // 存整个词典对象到一个 key（一次写入，瞬间完成）
  saveAll:(obj)=>openDB().then(db=>new Promise((res,rej)=>{
    let tx;try{tx=db.transaction('dict','readwrite')}catch(err){rej(err);return}
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>rej(tx.error||new Error('写入失败'));
    tx.onabort=()=>rej(tx.error||new Error('写入中止'));
    try{tx.objectStore('dict').put(obj,'__full__')}catch(err){rej(err)}
  })),
  // 读出整个词典对象
  loadAll:()=>openDB().then(db=>new Promise(res=>{
    const r=db.transaction('dict').objectStore('dict').get('__full__');
    r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null)
  })).catch(()=>null),
  // 检查是否已存词典
  has:()=>openDB().then(db=>new Promise(res=>{
    const r=db.transaction('dict').objectStore('dict').getKey?db.transaction('dict').objectStore('dict').count('__full__'):db.transaction('dict').objectStore('dict').count();
    r.onsuccess=()=>res(r.result>0);r.onerror=()=>res(false)
  })).catch(()=>false),
  clear:()=>openDB().then(db=>new Promise(res=>{const r=db.transaction('dict','readwrite').objectStore('dict').clear();r.onsuccess=()=>res(true);r.onerror=()=>res(false)})).catch(()=>false)
};

function fmtMoney(n){if(!Number.isFinite(n))return '';const v=Math.round(n*100)/100;return String(v).replace(/\.0+$/,'').replace(/(\.\d)0$/,'$1')}
function calcAmount(raw){
  let s=String(raw||'').trim();if(!s)return NaN;
  s=s.replace(/[，,]/g,'').replace(/[×xX]/g,'*').replace(/[÷]/g,'/').replace(/[＋]/g,'+').replace(/[−－—–]/g,'-').replace(/\s+/g,'').replace(/[￥¥$€£]/g,'');
  if(!s||!/\d/.test(s)||!/^[0-9+\-*/().]+$/.test(s))return NaN;
  try{const v=Function('"use strict";return ('+s+')')();return Number.isFinite(v)?Math.round(v*100)/100:NaN}catch(e){return NaN}
}

function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function aHex(a){return Math.round(clamp(a,0,1)*255).toString(16).padStart(2,'0')}
function h2hsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4}h/=6}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}
}
function hsl2hex(h,s,l){
  s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(255*c).toString(16).padStart(2,'0')};
  return'#'+f(0)+f(8)+f(4)
}

function compressFile(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,600/Math.max(img.width,img.height));
      const w=Math.round(img.width*s),h=Math.round(img.height*s);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',.6))

    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('img'))};
    img.src=url
  })
}

async function doAiRec(){
  if(!photoPrev){return}
  if(!S.apiKey){alert('请先在 ⚙️ 设置里填入 Anthropic API Key。');return}
  aiLoading=true;render();
  try{
    const base64=photoPrev.split(',')[1];
    const mt=photoPrev.startsWith('data:image/png')?'image/png':'image/jpeg';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mt,data:base64}},
            {type:'text',text:'请识别图中所有食物。每样食物输出一行，格式：\n食物名称 | 估算分量 | 热量kcal\n\n最后一行输出：\n合计 | | 总热量kcal\n\n要求：只输出上述格式内容，用中文，不加任何其他说明或解释。'}
          ]
        }]
      })
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    const text=json.content&&json.content[0]&&json.content[0].text||'';
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.includes('|'));
    // 改为生成可编辑草稿，而不是直接写入
    const items=[];
    for(const line of lines){
      const parts=line.split('|').map(x=>x.trim());
      const name=parts[0]||'';
      if(!name||name.includes('合计'))continue;
      items.push({name,qty:parts[1]||'',cal:(parts[2]||'').replace(/[^\d]/g,'')})
    }
    if(!items.length){
      alert('未能识别到食物，请重试，或确认图片中有清晰的食物。');
      aiLoading=false;render();return
    }
    aiDraft={type:mType,items,photo:photoPrev};
    photoPrev='';aiLoading=false;render()
  }catch(err){
    console.error(err);
    alert('AI 识别出错：'+(err.message||'网络错误，请检查 API Key 是否正确。'));
    aiLoading=false;render()
  }
}

function pill(on,col,soft,label,action,val){return`<button data-a="${action||''}" data-v="${e(val??label)}" style="padding:5px 12px;border-radius:999px;border:none;cursor:pointer;font-size:13px;background:${on?col:soft};color:${on?'#fff':col}">${e(label)}</button>`}
function xbtn(action,id){return`<button data-a="${action}" data-id="${id}" style="background:none;border:none;color:${C.faint};cursor:pointer;font-size:18px;line-height:1;padding:0;flex-shrink:0">×</button>`}

function lab(id){return (S.labels&&S.labels[id])||TAB_LABELS[id]||id}

function foodSticker(n){
  const s=String(n||'');
  if(/[鸡蛋]/.test(s))return'🥚';if(/[鸡腿鸡胸鸡肉鸭]/.test(s))return'🍗';if(/[牛猪羊肉]/.test(s))return'🥩';if(/[鱼三文鱼鳕鱼金枪鱼]/.test(s))return'🐟';if(/[虾蟹贝蛤蜊]/.test(s))return'🦐';
  if(/[奶酸奶豆浆]/.test(s))return'🥛';if(/[芝士奶酪]/.test(s))return'🧀';
  if(/[米饭米小米粥燕麦]/.test(s))return'🍚';if(/[面粉面包吐司粉条乌冬意面]/.test(s))return'🍞';if(/[土豆红薯南瓜]/.test(s))return'🥔';
  if(/[西兰花]/.test(s))return'🥦';if(/[番茄西红柿]/.test(s))return'🍅';if(/[胡萝卜]/.test(s))return'🥕';if(/[蘑菇香菇]/.test(s))return'🍄';if(/[白菜青菜生菜菠菜黄瓜芹菜蔬菜]/.test(s))return'🥬';
  if(/[蓝莓莓]/.test(s))return'🫐';if(/[香蕉]/.test(s))return'🍌';if(/[牛油果]/.test(s))return'🥑';if(/[苹果柠檬水果橙橘]/.test(s))return'🍎';
  if(/[坚果核桃杏仁腰果]/.test(s))return'🌰';if(/[豆腐豆类扁豆鹰嘴豆红豆绿豆]/.test(s))return'🫘';if(/[咖喱酱油味噌豆瓣酱盐]/.test(s))return'🧂';return'🍽️'
}
function foodIcon(n){return foodSticker(n)}
function drinkSticker(type,name){
  const s=String(name||'');
  if(type==='咖啡'){
    if(/(拿铁|latte|奶)/i.test(s))return'🥛';
    if(/(冰|冷萃|cold|ice)/i.test(s))return'🧊';
    if(/(摩卡|mocha|巧克力|可可)/i.test(s))return'🍫';
    if(/(豆|手冲|espresso|美式|americano)/i.test(s))return'🫘';
    return'☕';
  }
  return (DRINK_STICKERS[type]&&DRINK_STICKERS[type][0])||'✨'
}
function drinkIcon(type){return drinkSticker(type,'')}
function estimateCaffeine(type,name,size){
  const n=String(name||'').toLowerCase(), t=String(type||'');
  const ml=Number(size)||({咖啡:240,奶茶:500,茶:300,饮料:330,酒:150,'奶/豆浆':250,果汁:300,其他:250}[t]||250);
  let per=0;
  if(t==='咖啡'){
    if(/decaf|低因|脱因/.test(n))per=5;
    else if(/冷萃|cold/.test(n))per=150/240;
    else if(/浓缩|espresso|dirty/.test(n))per=63/60;
    else if(/拿铁|latte|卡布|cappuccino|flat white|澳白|摩卡|mocha/.test(n))per=80/300;
    else per=95/240;
  }else if(t==='奶茶')per=/咖啡|鸳鸯/.test(n)?70/500:/乌龙|红茶|绿茶|茉莉|茶/.test(n)?55/500:35/500;
  else if(t==='茶')per=/抹茶|matcha/.test(n)?70/300:/红茶|乌龙|普洱|black|oolong/.test(n)?45/300:/绿茶|茉莉|白茶|green/.test(n)?30/300:35/300;
  else if(t==='饮料')per=/能量|红牛|monster|魔爪/.test(n)?80/250:/可乐|cola|pepsi/.test(n)?38/330:0;
  else per=0;
  const val=Math.round(per*ml);
  return val>0?val:null
}
function dayMood(id){return DAY_MOODS.find(x=>x.id===id)||null}
function nutritionScan(ent){
  const mealText=(ent.meals||[]).map(m=>m.text||'').join(' ');
  if(!mealText.trim())return null;
  const text=mealText.toLowerCase();
  const hasAny=arr=>arr.some(k=>text.includes(String(k).toLowerCase()));
  const covered=[],missing=[];
  NUTRI_RULES.forEach(r=>{
    const hit=hasAny(r.keys);
    (hit?covered:missing).push(r)
  });
  const pairs=FOOD_PAIR_RULES.filter(r=>hasAny(r.a)&&hasAny(r.b));
  const hasVeg=/蔬菜|青菜|菠菜|生菜|白菜|西兰花|番茄|西红柿|胡萝卜|黄瓜|蘑菇|彩椒|南瓜|紫甘蓝/.test(mealText);
  const hasFruit=/水果|苹果|香蕉|蓝莓|草莓|莓|橙|橘|柠檬|猕猴桃|牛油果/.test(mealText);
  const hasProtein=covered.some(x=>x.id==='protein');
  let summary='这顿/今天还可以更完整一点。';
  if(hasProtein&&hasVeg)summary='蛋白质和蔬菜都有出现，基础搭配不错。';
  else if(hasProtein&&!hasVeg)summary='蛋白质看起来有了，但彩色蔬菜和水果偏少。';
  else if(!hasProtein&&(hasVeg||hasFruit))summary='蔬果有了，可以再补一点优质蛋白。';
  const priority=['fiber','vitc','omega3','calcium','iron','magnesium','antioxidant','probiotic','protein'];
  const suggest=missing.sort((a,b)=>priority.indexOf(a.id)-priority.indexOf(b.id)).slice(0,4);
  return {covered,missing:suggest,summary,pairs}
}
function renderNutritionScan(ent){
  const scan=nutritionScan(ent);
  if(!scan)return`<div style="background:${C.pS};border-radius:16px;padding:12px;margin-top:12px;color:${C.muted};font-size:13px;line-height:1.7">🕯️ 记下一餐后，我会在这里粗略看一眼：可能已经覆盖了什么、还可以补什么。</div>`;
  const covered=scan.covered.slice(0,6).map(x=>`<span style="background:${C.gS};color:${C.g};border-radius:999px;padding:5px 9px;font-size:12px">${x.icon} ${e(x.name)}</span>`).join('');

    <div style="font-size:13px;font-weight:700;color:${C.ink}">${x.icon} 可以留意：${e(x.name)}</div>

  </div>`).join('');
  const pairs=scan.pairs.slice(0,4).map(x=>`<div style="background:${x.type==='plus'?C.gS:C.wS};border-radius:14px;padding:10px;margin-top:8px">
    <div style="font-size:13px;font-weight:800;color:${x.type==='plus'?C.g:C.w}">${x.type==='plus'?'✦ 加分搭配':'⚑ 留意搭配'} · ${e(x.title)}</div>
    <div style="font-size:12px;color:${C.muted};line-height:1.65;margin-top:4px">${e(x.msg)}</div>
  </div>`).join('');
  return`<div style="background:${C.pS};border-radius:18px;padding:14px;margin-top:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="xb-sticker" style="font-size:22px">🔎</span><div><div style="font-size:14px;font-weight:800;color:${C.ink}">本地营养扫描</div><div style="font-size:12px;color:${C.muted};line-height:1.6">${e(scan.summary)}</div></div></div>
    <div style="font-size:12px;color:${C.muted};margin-top:8px">可能已覆盖</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${covered||`<span style="font-size:12px;color:${C.faint}">还不明显</span>`}</div>
    <div style="font-size:12px;color:${C.muted};margin-top:12px">建议补充</div>
    ${missing||`<div style="font-size:12px;color:${C.g};margin-top:6px">看起来已经比较丰富，继续保持食物多样性。</div>`}
    <div style="font-size:12px;color:${C.muted};margin-top:12px">搭配提醒</div>
    ${pairs||`<div style="font-size:12px;color:${C.faint};margin-top:6px">暂时没有明显的加分/留意搭配。</div>`}
    <div style="font-size:11px;color:${C.faint};line-height:1.6;margin-top:10px">这是根据文字关键词做的本地粗略提示，不等同于营养诊断。</div>
  </div>`
}

function recordSignals(ds){
  const ent=S.entries[ds]||{}, sig=[];
  const meals=ent.meals||[], drinks=ent.drinks||[], exp=(S.expenses||[]).filter(x=>x.date===ds);
  const tasks=(S.lists||[]).flatMap(l=>(l.items||[]).map(it=>({...it,listIcon:l.icon||'📝'}))).filter(it=>it.due===ds&&!it.done);
  const journal=(S.journal||[]).filter(x=>x.date===ds);
  const mood=dayMood(ent.mood);if(mood)sig.push({i:mood.icon,t:'心情 '+mood.name});
  if(ent.weight!=null)sig.push({i:'⚖️',t:'体重 '+kg2disp(ent.weight)+wUnit()});
  if(ent.water)sig.push({i:'💧',t:'喝水 '+ent.water+' 杯'});
  if(drinks.length)sig.push({i:drinks[0].sticker||drinkSticker(drinks[0].type,drinks[0].name),t:'饮品 '+drinks.length+' 杯'});
  if(meals.length)sig.push({i:'🍽️',t:'餐食 '+meals.length+' 条'});
  if(exp.length)sig.push({i:'💰',t:'账单 '+exp.length+' 笔'});
  if(tasks.length)sig.push({i:tasks[0].important?'⭐':(tasks[0].listIcon||'✓'),t:'待办 '+tasks.length+' 件'});
  if(S.period.days&&S.period.days[ds])sig.push({i:'🌷',t:'生理期'});
  if(journal.length)sig.push({i:journal[0].sticker||journal[0].mood||'✍️',t:'手帐'});
  return sig
}

// ═══════════════════════ CHART ═══════════════════════
function renderChart(ser){
  if(ser.length<2)return empty('记录两天以上体重，这里会出现趋势曲线。');
  const W=500,H=155,pad=28;
  const ws=ser.map(s=>s.w),mn=Math.min(...ws),mx=Math.max(...ws);
  const lo=mn-.5,hi=mx+.5,range=(hi-lo)||1,n=ser.length;
  const xx=i=>pad+(n===1?(W-pad*2)/2:(i/(n-1))*(W-pad*2));
  const yy=v=>pad+(1-(v-lo)/range)*(H-pad*2);
  const pts=ser.map((s,i)=>xx(i)+','+yy(s.w)).join(' ');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:155px" preserveAspectRatio="none">
    ${[0,.5,1].map(t=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+t*(H-pad*2)}" y2="${pad+t*(H-pad*2)}" stroke="${C.line}" stroke-width="1"/>`).join('')}
    <polyline points="${pts}" fill="none" stroke="${C.p}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${ser.map((s,i)=>`<circle cx="${xx(i)}" cy="${yy(s.w)}" r="3.5" fill="${C.p}"/>`).join('')}
    <text x="2" y="${yy(mx)+4}" font-size="11" fill="${C.muted}">${kg2disp(mx)}</text>
    <text x="2" y="${yy(mn)+4}" font-size="11" fill="${C.muted}">${kg2disp(mn)}</text>
    <text x="${xx(0)}" y="${H-3}" font-size="11" fill="${C.muted}">${ser[0].l}</text>
    <text x="${xx(n-1)}" y="${H-3}" font-size="11" fill="${C.muted}" text-anchor="end">${ser[n-1].l}</text>
  </svg>`
}

      <div style="font-size:12px;color:${C.muted};margin-top:10px">重点营养</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${goal.focus.map(x=>`<span style="background:${C.card};color:${C.p};border:1px solid ${C.line};border-radius:999px;padding:5px 9px;font-size:12px">${e(x)}</span>`).join('')}</div>
      <div style="font-size:12px;color:${C.muted};margin-top:12px">常见来源</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${goal.foods.map(x=>`<span style="background:${C.card};color:${C.g};border-radius:999px;padding:5px 9px;font-size:12px">${e(x)}</span>`).join('')}</div>
    </div>
  `);
  const pList=sorted.map(x=>{
    const d=daysUntil(x.exp);
    const badge=d==null?'':d<0?`<span style="font-size:11px;background:#FBE3E3;color:#C03;padding:2px 7px;border-radius:6px;margin-left:6px">已过期</span>`:d<=2?`<span style="font-size:11px;background:#FCE9D6;color:#C7723;padding:2px 7px;border-radius:6px;margin-left:6px">剩${d}天</span>`:d<=5?`<span style="font-size:11px;background:#FBF2D6;color:#A88A2E;padding:2px 7px;border-radius:6px;margin-left:6px">剩${d}天</span>`:`<span style="font-size:11px;background:${C.gS};color:${C.g};padding:2px 7px;border-radius:6px;margin-left:6px">剩${d}天</span>`;
    return`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid ${C.line}">
      <span style="font-size:22px;width:28px;text-align:center">${e(x.sticker||foodIcon(x.name))}</span>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${e(x.name)}${badge}</div>
      ${x.qty!=null?`<div style="font-size:12px;color:${C.muted};margin-top:2px">${x.qty} ${e(x.unit)}</div>`:''}
      </div>
      ${x.qty!=null?`<div style="display:flex;gap:6px">
        <button data-a="stepP" data-id="${x.id}" data-v="-1" style="width:30px;height:30px;border-radius:8px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:16px;cursor:pointer;line-height:1">−</button>
        <button data-a="stepP" data-id="${x.id}" data-v="1" style="width:30px;height:30px;border-radius:8px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:16px;cursor:pointer;line-height:1">＋</button>
      </div>`:''}
      ${xbtn('delP',x.id)}
    </div>`}).join('');
  const uOpts=UNITS.concat(['自定义']).map(u=>`<option value="${u}" ${pU===u?'selected':''}>${u}</option>`).join('');
  const foodStickerPicks=FOOD_STICKERS.map(s=>`<button data-a="setPSticker" data-v="${e(s)}" style="width:34px;height:34px;border-radius:12px;border:1px solid ${(pSticker||foodIcon(pN))===s?C.g:C.line};background:${(pSticker||foodIcon(pN))===s?C.gS:C.card};font-size:18px;cursor:pointer">${e(s)}</button>`).join('');
  const pCard=card('我的食材库',`
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${foodStickerPicks}</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input id="pN" value="${e(pN)}" placeholder="食材名" style="${IS('flex:2')}">
      <input id="pQ" value="${e(pQ)}" inputmode="decimal" placeholder="数量" style="${IS('flex:1;min-width:0')}">
      <select id="pU" style="${IS('flex:0 0 64px;padding:10px 4px')}">${uOpts}</select>
    </div>
    ${pU==='自定义'?`<input id="pUcustom" value="${e(pUcustom)}" placeholder="输入单位，如 袋、串、罐…" style="${IS('margin-bottom:8px')}">`:''}

      <input id="pE" type="date" value="${e(pE)}" style="${IS('flex:1')}">
      <button data-a="addP" style="${BS(C.g)}">加入</button>
    </div>
    <div>${pList||empty('把买回来的食材记在这，快过期的排前面。')}</div>
  `);
  const wList=S.wishlist.map(x=>`<span style="display:inline-flex;align-items:center;gap:6px;background:${C.wS};color:${C.w};padding:6px 10px;border-radius:999px;font-size:13px;margin:3px">${e(x.name)}${xbtn('delW',x.id)}</span>`).join('');
  const wCard=card('想吃清单',`
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="wiIn" value="${e(wiTxt)}" placeholder="牛油果、虾、莲藕…" style="${IS()}">
      <button data-a="addW" style="${BS(C.w)}">加入</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:2px">${wList||empty('想吃的随手记下来。')}</div>
  `);
  return fridgeCard+nutritionCard+pCard+wCard
}

const HOWTOCOOK_RECIPES=[{"id":"htc-howtocook-master-dishes-drink-b52-md","name":"B52轰炸机","time":5,"level":"中等","tags":["饮品","开源"],"ings":["甘露咖啡酒","爱尔兰百利甜酒","蓝天原味伏特加","利口酒杯","打火机"],"steps":["在利口酒杯的最底层倒入甘露咖啡酒到 1/3 处。(10ml)","顺着吧勺缓缓倒入爱尔兰百利甜酒，也是 1/3 处 (10ml)。注意要慢，保证层次分明。（太快甜酒会和咖啡混合）","最后在上层倒入蓝天原味伏特加 （10ml)","用打火机热一下杯口","最后一步点火： 看到淡蓝色的小火苗了吗？"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-mojito-md","name":"Mojito莫吉托","time":20,"level":"中等","tags":["饮品","开源"],"ings":["打碎的冰块","冰镇苏打水","压汁器","海波杯","研杵"],"steps":["将切成半块的青柠之一切成小块，放入海波杯，随后用研杵将其捣出汁；","用 3-4 珠薄荷叶沿着杯口涂抹，随后将其放入杯中；","加入 糖浆 20ml；","加入 金色朗姆酒 45ml；","将剩下的半块青柠压出汁水放入杯中；","轻轻搅拌，使砂糖/糖浆处于半融合状态；","将打碎的冰块放入杯中，直到占杯中 3/4；","加入冰镇苏打水直到刚好淹没碎冰；"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"上汤娃娃菜","time":20,"level":"中等","tags":["素菜","蔬菜","开源","汤"],"ings":["娃娃菜","皮蛋","午餐肉","葱","姜","蒜","盐","糖"],"steps":["娃娃菜洗净, 竖着切开切成段。","葱 3g 切 小段。蒜 10g 切片。姜 10g 切小片。","皮蛋切成丁, 火腿肠或者午餐肉切成丁（1cm 大小的丁）","金针菇洗净撕开","烧热水娃娃菜放进去十秒钟出一下水捞出。","热锅凉油, 加热锅倒入油过一遍就倒出来, 重新倒入一点油。","调至小火加入葱姜蒜，煎炒出香味即可。","加入适 300g 清水（水量没过娃娃菜即可）, 放入娃娃菜, 金针菇, 午餐肉"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"中式馅饼","time":20,"level":"中等","tags":["主食","开源"],"ings":["面粉","肉沫","油","盐","糖","生粉","酱油","蒜头"],"steps":["取肉沫（解冻），加入 1/2 所有上述调料（油、盐、糖、酱油、风味调料）和全部的生粉，搅拌均匀，腌制 30 分钟。","将面粉加入碗中，加入鸡蛋，加入剩下 1/2 所有上述调料，加入相当于面粉 1/2 的水（使得面粉相对粘稠但可以流动），搅拌均匀。","蒜头切为蒜末。","大葱切段。","胡萝卜切末（作为馅料用，所以要求尽量细碎，可用乱刀）","热锅冷油，宽油起锅。","待油烧热后，放入蒜末爆香。","加入腌制的肉沫，翻炒，直至断生。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"乡村啤酒鸭","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["鸭肉","啤酒","青椒","红椒","大蒜","生姜","小米椒","蒜苗"],"steps":["鸭肉清洗一遍放进锅中","加清水淹没鸭肉","加 20 ml 料酒","加备用的 1 根 大葱","加生姜 ,拍散的 2 厘米","开火烧滚","捞出浮沫","鸭肉捞出,清水洗干净备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"乾隆白菜","time":10,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["大白菜（取黄心嫩叶","芝麻酱","陈醋","白糖","香油","熟白芝麻（可选"],"steps":["大白菜只取内部嫩叶（黄色部分），去除菜帮，用手撕成半个巴掌大的块，**不要用刀切**（手撕截面粗糙更易挂酱）","将撕好的白菜叶冲洗干净，充分控干水分，水分残留会导致酱汁无法挂附","碗中加入 30g 芝麻酱，**先加入 45ml 陈醋**，沿同一方向搅拌，将麻酱慢慢稀释开，直至*成细线状滴落*为止（切勿来回搅拌，会导致芝麻酱\"走油\"）","向麻酱汁中加入 5g 白糖，搅拌均匀；再加入 1g 食盐，搅拌均匀；最后加入 5ml 香油，搅拌均匀（各调料需分次加入并分别搅拌，边加边感受稀稠度）","将调好的麻酱汁均匀淋在白菜叶上，用手轻轻抓拌，使每片菜叶都裹上酱汁","撒上熟白芝麻，装盘即可食用；若时间充裕，可**静置 5 分钟**待其入味后再食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"农家一碗香","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪肉","青椒","蒜片","豆瓣酱","酱油","小米椒","白糖","姜片"],"steps":["备菜阶段：将猪肉切片，最好把肥瘦分开放。同时要把青椒和小米辣切成段，蒜片用刀背拍成末，姜切成丝。鸡蛋打到小碗中，用筷子打散。","备好菜，就可正式煮菜了。先将油倒入锅中，锅中开小火，油热后将蛋液倒入锅中，将鸡蛋炒散，炒至断生即可，放回小碗中备用。","将锅中继续加一点油，开小火，锅热后将之前切的肥猪肉倒入锅中逼出猪油。","肥肉出现金黄色的时候，加大火力到中火，将瘦肉一起放入锅中翻炒。","瘦肉全部炒至变色的时候加入备好的姜丝、蒜末和豆瓣酱翻炒均匀给猪肉上色。","放入青红椒、炒至断生的鸡蛋后加入酱油和白糖，继续将它们翻炒到青椒微微断生，保持青椒清脆口感。","出锅上菜！"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"冬瓜茶","time":20,"level":"简单","tags":["饮品","开源"],"ings":["冬瓜","冰糖"],"steps":["**准备冬瓜**：将冬瓜去皮，去籽，切成小块（每块不超过 4cm）。","**加入冰糖**：冬瓜加入冰糖，搅拌均匀，盖上保鲜膜放冰箱冷藏 2 小时以上。","**煮冬瓜**： 此时冬瓜出了很多水, 倒入锅中 大火煮开，然后转中小火慢慢熬制 1~2 个小时，中途多搅拌防止糊锅。","**过滤冬瓜茶**：使用过滤网将煮好的冬瓜茶液过滤，取出冬瓜块，只保留茶液。","**冷却**：将冬瓜茶液放凉后，倒入干净的容器中，放入冰箱冷藏即可。","**享用**: 熬好的冬瓜茶液是浓缩汁，根据个人喜好添加水或其他饮品，冷热皆宜。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"冬瓜酿肉","time":30,"level":"中等","tags":["肉菜","家常","开源"],"ings":["冬瓜","猪肉末","鸡蛋","葱","葱姜末","胡椒粉","生抽","淀粉"],"steps":["冬瓜去皮，切成 25cm 长 3cm 厚的片","将切好的冬瓜放入碗中，放入 15g 盐，将冬瓜抹匀，放置 10 分钟","放置冬瓜的同时，换个碗放入肉末，葱姜末， 5g 盐，淀粉 5g，胡椒粉，生抽，胡椒粉","使用筷子在肉末中进行顺时针搅拌，搅拌到食材颜色没有明显对比（约 2 分钟）","将腌制好的冬瓜（会变软）使用清水洗三遍","拿出 1 片冬瓜片卷起来，并把肉塞进去","放入碟子中摆到碟子的边缘","打入 1 个鸡蛋到中间圆圈处"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"冰粉","time":20,"level":"简单","tags":["饮品","开源"],"ings":["冰粉籽","凉白开","薄荷汁","一次性透明塑料杯","遇水发光冰块"],"steps":["将凉白开倒入盆中；","将冰粉籽全部用纱布包起来，开口处打结","将包好的冰粉籽放入凉白开中，在凉白开中用力揉搓 6 分钟","然后将凉白开放置 2.5 小时，即可成型"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"冷吃兔","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["兔肉","盐","味精","蚝油","料酒","蒜","姜","小葱/大葱/洋葱"],"steps":["蒜、姜扒皮并剁碎备用，八角、桂皮、香叶、山奈、白蔻、小茴香洗净备用。","干辣椒剪成 2 厘米的小段，洗净备用。","小葱/大葱/洋葱洗净，洋葱切成小块。","兔肉剁成 2 厘米的小块，加入盐、料酒、味精调味，腌制 15 分钟。","锅中倒油，油温 4 成热下小葱/大葱/洋葱，中小火煸炒出香味，待到小葱/大葱/洋葱微焦，将其捞出。","开大火升高油温，油温 8 成热时下入兔肉，炸制过程转中小火，炸至兔肉微微焦黄时捞出兔肉。","升高油温，倒入干辣椒、青花椒、八角、桂皮、香叶、山奈、白蔻、小茴香；转小火将辣椒段炸脆。","重新倒入兔肉，加入蚝油、翻炒几分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌木耳","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["干木耳 （湿木耳也可","蒜瓣","白糖","小米辣","盐","香油","生抽","醋"],"steps":["泡发干木耳, 水量约为 400ml, 泡发约 45 分钟。 （湿木耳跳过此步骤）","将泡发好的木耳, 进行去根处理（如图 4, 5, 6）, 并彻底洗净。","起锅烧水，水开后放入木耳, 大火煮 1.5-2 分钟。","将蒜瓣、小米辣切碎放入碗中 （可选取中大碗）, 并依次加入盐、糖、生抽、醋、香油、芥末, 用量如上。","木耳盛出后沥水, 放入上一步碗中。","搅拌充分，端盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌油麦菜","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["油麦菜","芝麻酱","酱油","醋","蚝油","白糖","香油","蒜"],"steps":["蒜拍碎切末","醋，酱油，芝麻酱，香油，糖，蚝油，蒜末放到碗里搅拌均匀","油麦菜切段，每段不超过 4cm","油麦菜放到一个大点的盆里,倒入上述碗中酱料,充分搅拌均匀."],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌莴笋","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["莴笋","萝卜","小米辣","姜","蒜头","盐","食用油"],"steps":["莴笋削皮，切小条。萝卜切条，一起放入大碗，加入盐搅拌，放置 10 分钟","放置后的莴笋用水清洗 1-2 遍","起锅烧水，放入莴笋，水煮 1 分钟 捞出，沥干水分，放入大碗","起锅烧油，放入姜片、蒜粒、小米椒煸炒 30-45 S ，倒入莴笋中","搅拌充分，端盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌豆腐","time":10,"level":"简单","tags":["素菜","蔬菜","开源","豆腐"],"ings":["豆腐","小葱","大蒜","生抽","香油","醋","白糖","辣椒油"],"steps":["将 豆腐 切成 2 cm 见方的小块，备用。","锅中加入 500 ml 饮用水，大火烧开。","放入 豆腐 块，煮 **1-2 分钟**，以去除豆腥味并使豆腐口感更紧实。","将 煮好的 豆腐 块捞出，沥干水分，放入碗中，备用。","将 小葱 洗净，切成葱花，备用。","将 大蒜 去皮，切成蒜末，备用。","在一个干净的小碗中，加入 15 ml 生抽，5 ml 香油，5 ml 醋（可选），2 g 白糖（可选）。","加入切好的 大蒜末。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌金针菇","time":10,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["金针菇","小葱","大蒜","生抽","醋","白糖","香油","辣椒油"],"steps":["将 金针菇 根部切除，用清水冲洗干净，备用。","将 小葱 洗净，切成葱花，备用。","将 大蒜 去皮，切成蒜末，备用。","锅中加入 1000 ml 饮用水，大火烧开。","放入 金针菇，煮 **1-2 分钟**，至金针菇变软。","将 煮好的 金针菇 捞出，沥干水分，放入一个较大的碗中，备用。","在另一个干净的小碗中，加入 15 ml 生抽，10 ml 醋，3 g 白糖（可选），5 ml 香油（可选）。","加入切好的 大蒜末。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"凉拌鸡丝","time":30,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡胸肉","麻油","生抽","香醋","白糖","盐","料酒","姜"],"steps":["姜切片，备用","锅中倒入 4 升水","加入鸡胸肉、姜片","倒入 20 毫升料酒","开大火不盖盖将水烧开","水开后转中火，用勺子将浮沫捞出","继续煮 **5-7** 分钟，如果是非冷冻肉煮 5 分钟，冷冻肉煮 7 分钟","鸡胸肉大小会影响成熟时间，用筷子插入鸡胸肉，如果能轻松插入，代表鸡肉熟了。如果不熟需延长煮制时间"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"凉拌黄瓜","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["黄瓜","醋","酱油","蒜"],"steps":["用菜刀将黄瓜拍扁，再剁成长 3 厘米的碎块","将碎黄瓜装入碗中","将蒜拍碎切成碎末","将碗中放入 5 克白糖，搅拌均匀腌制 15 分钟（用糖腌制更好吃，且成色更好不会蔫）","将醋，酱油，盐，蚝油和蒜依次倒入碗中搅拌均匀","将香油倒入碗中并均匀搅拌"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"凉皮","time":40,"level":"中等","tags":["半成品","开源"],"ings":["凉皮、面筋","黄瓜、大蒜、绿豆芽"],"steps":["锅中加入 500ml 水。煮沸。","将绿豆芽放入锅中，大火煮 60 秒。豆芽捞出，过凉水，放入盘中备用。","黄瓜切丝放入盘中备用","将 10g 蒜瓣剥皮、放入蒜臼中加入 1g 盐。锤成蒜泥，加入 10g 自来水。放置备用。","注：超市购买来的凉皮表面一般会有食用油，可以使用自来水清洗。面筋同样。","注：清洗面筋之后，请用手将面筋中的大量水分挤出（不需过于用力）。","准备小碗，加入 3g 盐、2g 鸡精、5g 生抽、1g 老抽、1g 香油、2g 蚝油、香醋 5g、（盐、香醋均可根据个人口味酌量添加，以上数据只是大众口味）。","以上调料加入 25-35g 温水（据个人咸淡程度），使用筷子将其拌匀、溶解。静置一旁冷却。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"凉粉","time":20,"level":"中等","tags":["主食","开源"],"ings":["豌豆淀粉","大蒜","小米辣","辣椒粉","酱油","醋","白糖","鸡精"],"steps":["准备食材。","把豌豆淀粉和水各 100 克混合搅拌。","往锅中倒入 600g 水，大火煮开后转为小火。","倒入淀粉水，边倒边不断的搅拌，搅拌到浓稠且色泽均匀。","找一个容器，在容器中刷一层薄薄的食用油。","将煮好的淀粉倒入容器中冷藏 2-4 小时。","冷藏后取出，脱模，切条。","大蒜和小米辣剁成沫，放上 10g 辣椒粉，5g 花生碎，热油搅拌均匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"利提巧卡","time":60,"level":"进阶","tags":["主食","开源"],"ings":["全麦面粉","茄子","番茄","土豆","洋葱","大蒜","生姜","青辣椒"],"steps":["在碗中混合烤鹰嘴豆粉 120g、切碎的洋葱、青辣椒、生姜","加入孜然籽 3g、芝麻 5g、红辣椒粉 3g、印度黑盐 3g、盐 3g","加入芥末油 15ml、柠檬汁 10ml、切碎的香菜叶","充分混合均匀，馅料应呈松散但可捏合的状态，备用","将全麦面粉 200g 放入大碗中","逐渐加入温水，边加边揉，揉成*光滑柔软*的面团","面团静置 **15 分钟**","将面团分成 8 个等大的小剂子"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"勾芡香菇汤","time":25,"level":"中等","tags":["汤","开源"],"ings":["香菇","香葱","食用油","食用盐","鸡精","生粉"],"steps":["香菇切片（每片厚度 0.5-1 cm,厚点相对薄点更有嚼劲），放入大碗中，倒入 2g 食用盐 浸泡 15 分钟","生粉倒入小碗中，加入 50ml 水，搅拌生粉直至融化没有颗粒（即水淀粉）","倒掉碗中的盐水，适当去掉香菇本身的水分（方便下一步煎炸）【可选】","小火，倒入油，待油开始冒小泡（小火 30s ，看每个锅的功率），倒入香菇，每面煎 10s 【可选】","倒入开水 300ml ，调中火再煮 3-5 分钟","倒入水淀粉，适当搅拌锅中汤汁后，加入 3g 盐、3 g ，最后撒上葱花出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"包菜炒鸡蛋粉丝","time":20,"level":"中等","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["包菜","鸡蛋","粉丝","胡萝卜","菜籽油","盐、生抽、老抽、蚝油","葱、蒜、干辣椒"],"steps":["胡萝卜、包菜切丝备用","粉丝先用冷水浸泡 1 小时，然后将粉丝放入锅中，加入开水烧至粉丝烫软捞出备用","鸡蛋打入碗中，加入盐后搅拌 15 秒","葱、蒜、辣椒切成小粒备用","起锅烧油，倒入鸡蛋，打散炒熟盛出","再倒入油，放入葱、蒜、干辣椒翻炒 8 秒","下胡萝卜、包菜丝儿翻炒 30 秒","放入粉丝"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"半成品意面","time":20,"level":"简单","tags":["半成品","开源","面"],"ings":["1 袋 半成品意大利面","50 ml 清水"],"steps":["热锅","将 50 ml 清水倒入平底锅","将面条放入，炒 1 分钟","将酱料倒入，翻炒 1 分钟","装盘即可","将面条放入「可用于微波炉加热」的盘子中","将附带的酱料倒在面条上","倒入 50 ml 清水"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"南派红烧肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["注","工具","主料","辅料"],"steps":["`猪五花肉`先不切小块，切成能放入锅中的大块（约 5–6cm 宽）即可","`生姜`切片（每片厚度约 3mm ）","`开水`烧开","`凉水`自来水即可","`小葱`小葱白色的部分`葱白`切成小段（小葱最佳，大葱也可以）","`蒜`中间切开，不要拍扁，否则难以捞出以至最后`收汁`时影响味道","请将辅料分为两个\"预备包\"：","凉水锅中放入五花肉大块，加入 **20ml 料酒** 与 **A包**（2 片姜、2 段葱段），煮 15 分钟去掉血腥，捞出来后洗干净；"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"卤菜","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["卤料包","黄豆酱","豆瓣酱","蚝油","南腐乳","洋葱","生姜","大蒜"],"steps":["牛腱子提前浸泡在冷水中 3 小时以上，去除血水","准备糖色：锅中加入 30g 白糖，小火加热至糖完全融化并呈现棕褐色，加入 150ml 热水，搅拌均匀备用","将洋葱切块，生姜和大蒜拍碎，干辣椒掰断备用","在锅中加入足量的水，放入卤料包、洋葱、生姜、大蒜、干辣椒，大火烧开","加入黄豆酱、豆瓣酱、蚝油和南腐乳各 15ml，搅拌均匀","倒入准备好的糖色，混合均匀","加入生抽 120ml 和老抽 60ml，搅拌均匀","加入 10-15g 盐调味"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"印度土豆花菜","time":25,"level":"中等","tags":["素菜","蔬菜","开源","土豆"],"ings":["土豆","花菜","洋葱","番茄","生姜","大蒜","青辣椒","香菜"],"steps":["将土豆去皮切成约 2cm 的块状","将花菜掰成均匀的小朵，大朵可用刀切小","在炒锅中倒入 30ml 食用油，中火加热","油热后放入孜然籽 3g，炸至*孜然籽变深色且散发香味*（约 10 秒，注意不要炸糊）","放入切碎的洋葱，翻炒至*洋葱变透明微黄*（约 3-4 分钟）","加入生姜、大蒜和青辣椒，翻炒 1 分钟","加入切碎的番茄，翻炒至*番茄软烂*（约 2-3 分钟）","加入姜黄粉 3g、红辣椒粉 3g、香菜粉 5g、盐 5g"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"印度奶茶","time":20,"level":"简单","tags":["饮品","开源"],"ings":["红茶（CTC 红茶最佳","全脂牛奶","生姜","小豆蔻","肉桂棒","丁香","黑胡椒粒","糖"],"steps":["将生姜拍碎（不用切太碎，拍开即可释放姜汁）","将小豆蔻用刀背拍开，露出里面的籽","将黑胡椒粒拍碎","在小奶锅中倒入 120ml 水","放入拍碎的生姜、小豆蔻、肉桂棒、丁香、黑胡椒粒","大火煮沸后转小火，**煮 2 分钟**，让香料的味道充分释出","加入红茶 8g，继续小火**煮 2 分钟**，直至*茶汤颜色变深*","倒入全脂牛奶 120ml"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"印度烤饼","time":20,"level":"中等","tags":["主食","开源"],"ings":["中筋面粉","酸奶","酵母","糖","盐","酥油或黄油","温水","黑芝麻或白芝麻"],"steps":["将干酵母 3g 和糖 10g 溶解在 100ml 温水中（水温约 40°C，不可过烫）","静置 **5 分钟**，直至*表面冒出细泡沫*（说明酵母已激活）","在大碗中放入中筋面粉 300g 和盐 5g，混合均匀","倒入酵母水、酸奶 60ml 和食用油 15ml","用手揉成*光滑柔软*的面团（面团应比普通面团稍软，微微粘手是正常的）","揉面 **8-10 分钟**","在面团表面涂 3ml 油防止干裂","用湿布或保鲜膜盖住碗口"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"印度焖饭","time":90,"level":"进阶","tags":["主食","开源","饭"],"ings":["巴斯马蒂长粒香米","鸡腿肉（去骨","酸奶","洋葱","番茄","生姜","大蒜","青辣椒"],"steps":["在大碗中混合酸奶、磨碎的生姜和大蒜、红辣椒粉、姜黄粉、印度综合香料粉、盐、柠檬汁","放入鸡肉块，均匀裹上腌料","盖保鲜膜，冷藏腌制**至少 1 小时**（过夜更佳）","将藏红花 0.5g 放入 30ml 温牛奶中浸泡 **15 分钟**，备用","在锅中倒入 50ml 食用油，中火加热","放入洋葱薄片，翻炒至*深金棕色且酥脆*（约 12-15 分钟，需耐心）","捞出炸洋葱，用厨房纸吸油，备用","将浸泡好的巴斯马蒂香米沥干"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"印度葫芦丸子","time":40,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["瓠瓜","鹰嘴豆粉","洋葱","番茄","生姜","大蒜","青辣椒","香菜"],"steps":["将瓠瓜去皮，用刨丝器刨成细丝","用手将瓠瓜丝中的水分挤干，*尽量挤干*，否则丸子炸不成型","在挤干水分的瓠瓜丝中加入鹰嘴豆粉 80g、盐 3g、红辣椒粉 3g、香菜粉 3g","用手充分混合均匀，揉成不粘手的面团状","将混合物搓成直径约 3cm 的小丸子，备用","在深锅中倒入 500ml 食用油，中火加热至油温约 170°C（放入一小块面团，能快速浮起且冒泡即可）","将丸子分批放入油中，**炸 4-5 分钟**，直至*表面金黄酥脆*","炸好的丸子用厨房纸吸去多余油分，备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"反沙芋头","time":20,"level":"中等","tags":["甜点","开源"],"ings":["白砂糖或冰糖","水","葱"],"steps":["芋头切长条（稍微大条一点，翻炒过程不容易烂）","加入可以没过芋头的油，等油温起来（插入筷子冒小泡即可）","放进芋头到油里，去炸到芋头浮起来，一般是微微泛黄并且可以用筷子很轻松戳洞","炸芋头的油放起来别浪费，后面炒菜啥的都能用","接下来关键的一步，把糖(30g)和水(15g)按照 2：1 比例，加热至不变色且冒小泡","倒入葱花和芋头，关火翻炒，此时等温度下来，糖就会有反沙的效果","装盘上桌！"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"口水鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["半只鸡","辣椒粉","花椒","花生","葱姜蒜","白糖","生抽","醋"],"steps":["姜切片，1 颗小葱，15 颗花椒备用","鸡肉洗干净，放入锅中，清水没过鸡肉，放入姜片、小葱和花椒，开大火烧开。","大火烧开后，转中小火 20 分钟关火","取出鸡肉，放入冰水中，直至冰凉","取出鸡肉，切块摆盘子中，备用","小火把锅烧热，导入花生，烘烤至表皮爆裂。（注意随时翻动，不要糊了）","一颗葱切成段，蒜拍成末，花椒 15 颗，花生去皮切碎。","锅内导入油烧热后，放入葱段，花椒和一半蒜末，炒香"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"可乐桶","time":5,"level":"简单","tags":["饮品","开源"],"ings":["波旁威士忌","可口可乐","冰块","柠檬（可选","手动压汁器"],"steps":["将柠檬对半切（**刀方向垂直于柠檬的头尾连线**），并从其中的一半中切取一片柠檬备用","再次将柠檬对半切，将得到的 4 角柠檬用压汁器压出柠檬汁置于容器中备用","将挤压过的柠檬置于容器中备用","选择一个杯子，建议使用容量在大约 1 升的大型玻璃杯或铁皮酒桶","将冰块和挤压过的柠檬入杯中（可根据个人喜好设计柠檬与冰块的摆放）","倒入 15 毫升柠檬汁（如果喜酸可以加多点或全加）","沿杯壁缓慢倒入可口可乐至距离杯口 3/4 处（控制可乐和威士忌的比例约在 5:1 ）","倒入威士忌直至满杯"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"可乐炒饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["米饭","可乐","鸡蛋","火腿肠（或午餐肉","油","生抽","老抽","蚝油"],"steps":["将锅烧热后，加入 25 ml 油，放两个鸡蛋，煎至底部完全凝固","翻面，煎至两面完全凝固","关火，将鸡蛋取出，剪成 2-5 cm² 的小块后放回锅中（也可以直接用锅铲铲碎）","重新开火，倒入可乐、生抽、老抽、豆瓣酱、蚝油，搅拌均匀","加热到锅内液体剩 1/3，倒入米饭和火腿肠翻炒","翻炒均匀后，改小火，锅内食物中心挖一个洞，打入 1 个鸡蛋，盖上锅盖，焖 2 分钟","开盖翻炒至第三颗鸡蛋熟透，撒上葱花和胡椒粉，出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"可乐鸡翅","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡翅中","可乐","白糖","生抽","盐","生姜","料酒或啤酒","小葱"],"steps":["鸡翅入锅，倒入冷水淹没。放生姜 1 片和料酒 10 ～ 20 毫升。大火煮开（ 大约 2 分钟 ）后，撇去浮沫，沥出水分","捞出鸡翅，可用刀将两边各划上两口改刀。生抽约 10 克腌制鸡翅 10 分钟（生抽能完全包裹鸡翅表面入味就行）","鸡翅金黄，倒入可乐没过鸡翅，开大火将锅中可乐煮沸，然后撇去漂浮的黑色浮沫（包含血水）。此时加入葱结。","调味：加入食用盐 2 克，白糖 10 克，生抽 3 克调味（可以适当用老抽调底色，3 克）。","等到葱结变黄，和姜片一起捞出，转中火继续慢煮可乐鸡翅。","等到可乐呈现挂丝状态，关小火让汁牢牢挂在鸡翅上。出锅，装盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"台式卤肉饭","time":20,"level":"中等","tags":["肉菜","家常","开源","饭"],"ings":["红葱头","带皮五花肉","鸡蛋","食用油","生抽酱油","米酒","大蒜","香叶"],"steps":["带皮五花肉切成 $0.7cm（长）\\times 0.7cm（宽） \\times 2.5cm（高）$ 的细长条","红葱头、大蒜切末备用","鸡蛋煮熟剥壳，并用刀划破蛋白（便于入味），备用。","**大火**热锅，锅内放入 15 ml 食用油，让油滑满锅底即可。","放入五花肉条，翻炒至肉色稍微变白，沿锅边淋入米酒 10ml 。继续翻炒至五花肉不再出油。","将切好的红葱头加入锅中，翻炒 1 分钟爆出油葱香味。","将切好的红葱头加入锅中，翻炒 30 秒。","把猪肉推到旁边，放入冰糖加热到融化冒泡变成焦糖，再把猪肉一起翻拌，让焦糖均匀附着。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"吐司果酱","time":20,"level":"简单","tags":["早餐","开源"],"ings":["新鲜吐司","果酱","面包机"],"steps":["将吐司放入面包机","设置好档位,时间到了会自动弹出","两分钟后吐司加热完成弹出","先取出一片吐司,涂满果酱再盖上另一片吐司即可","用餐巾纸包一下可以边走边吃也可以吃完再出门"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"咕噜肉","time":40,"level":"中等","tags":["肉菜","家常","开源"],"ings":["梅头猪肉","青椒","罐头菠萝片","盐","茄汁","白醋","蒜蓉","生抽"],"steps":["将梅头猪肉（100 克）洗净，然后用厨房纸抹干水份，将猪肉切成比想要的成品小一圈的大小。","用盐（1/2 茶匙）腌制梅头猪肉 20 分钟。","将青椒（25 克）切碎。","将菠萝片（75 克）切件。","将梅头猪肉粒沾上生粉（6 汤匙）。","加入油（500 毫升）中火加热。","将梅头猪肉粒放至锅里中火炸 5 分钟，然后盛起。","加入梅头猪肉粒，再大火翻炸 1 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"咖啡椰奶冻","time":20,"level":"中等","tags":["甜点","开源"],"ings":["125ml 淡奶油","250ml 椰树牌椰汁","50ml 椰子水","10g 吉利丁"],"steps":["将定量淡奶油，椰树牌椰汁，espresso，椰子水混合备用。","将以上液体加热 1 分钟，温度达到 50-60 度即可。","（可选）如果格外嗜甜可以加额外的糖。","倒入吉利丁，搅拌至融化，煮 1 分钟。","（可选）过筛 （这一步可以让椰奶冻口感更佳顺畅）。","放入模具。","（可选）过滤掉表层的泡泡。这一步可以让椰奶冻口感更好，并且看着也会更棒。","放入冰箱冷藏区，等待 3 小时。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"咖喱炒蟹","time":30,"level":"中等","tags":["水产","海鲜","开源"],"ings":["青蟹（别称","咖喱块","洋葱","椰浆","鸡蛋","生粉（别称","大蒜"],"steps":["肉蟹掀盖后对半砍开，蟹钳用刀背轻轻拍裂，切口和蟹钳蘸一下生粉，不要太多。撒 5g 生粉到蟹盖中，盖住蟹黄，备用","洋葱切成洋葱碎，备用","大蒜切碎，备用","烧一壶开水，备用","起锅烧油，倒入约 20ml 食用油，等待 10 秒让油温升高","将螃蟹切口朝下，轻轻放入锅中，煎 20 秒，这一步主要是封住蟹黄，蟹肉。然后翻面，每面煎 10 秒。煎完将螃蟹取出备用","将螃蟹盖放入锅中，使用勺子舀起锅中热油泼到蟹盖中，煎封住蟹盖中的蟹黄，煎 20 秒后取出备用","不用刷锅，再倒入 10ml 食用油，大火让油温升高至轻微冒烟，将大蒜末，洋葱碎倒入，炒 10 秒钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"咖喱肥牛","time":40,"level":"中等","tags":["肉菜","家常","开源"],"ings":["香叶","纯牛奶","洋葱","胡萝卜","土豆","肥牛卷","咖喱块"],"steps":["洋葱切成条状、胡萝卜以及土豆切成块状，备用","烧一锅开水，水沸时将肥牛卷下锅，捞出血沫后放在一边沥水，备用","热锅，锅内放入 10ml - 15ml 食用油，**等待 10 秒让油温升高**","放入洋葱，翻炒至洋葱变软变透明","放入土豆以及胡萝卜**翻炒 2 分钟**","加入冷水至淹没所有食材即可","将香叶、咖喱块投入锅中，盖上锅盖，**待水沸腾后将火调小然后等待直至土豆块以及胡萝卜块炖至软烂（可用筷子确认）**","加入肥牛卷以及牛奶，盖上锅盖再小火煮 2-3 分钟即可出锅（用勺子搅拌食材，注意力度，避免肥牛卷破碎）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"咸肉菜饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["大米","青菜（推荐矮脚青菜","咸肉","冬笋","猪油","料酒","白糖","白胡椒粉"],"steps":["如果加入冬笋，切薄片后冷水下锅煮 10 分钟去涩味","咸肉切 1 cm 小丁","咸肉和冬笋冷锅下 10 g 猪油、料酒、白糖，中小火煸炒到透明冒泡","青菜切碎，菜梗和菜叶分开放，菜梗切成 0.5 cm 边长的正方形小块，菜叶切成长 2-3 cm，宽 1-1.5 cm 的长方形小块","菜梗下锅炒到翡翠色","米淘净后倒进电饭煲，加水","把炒好的咸肉和菜梗铺在米上","正常煮饭模式启动，最后 10 分钟开盖快速铺入菜叶"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"响油鳝丝","time":20,"level":"中等","tags":["水产","海鲜","开源"],"ings":["鳝丝","大蒜","姜末","料酒","生抽","蚝油","老抽","食用盐"],"steps":["将鳝鱼切成三段后切成细丝","加入 0.5 g 胡椒粉、3 g 料酒搅拌均匀，再加入 5 g 香油腌制","热油滑锅","加入植物油，烧到 6 成热","加入一半蒜末和全部姜末，翻炒几下","加入鳝丝，中火爆炒 30 秒","边缘淋入 10 g 料酒，翻炒几下","加入生抽，炒匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"商芝肉","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["带皮猪五花肉","商芝（又名紫萁","葱","姜","八角","蜂蜜","醋","料酒"],"steps":["将肉刮洗干净，入煮锅煮至六成熟（变色为白），捞出趁热用蜂蜜、醋涂抹肉皮。","炒锅内，放入鸡汤（100 克），加入原汁，用旺火烧沸，下入姜末、葱片、味精后搅匀，投入摊鸡蛋皮，淋芝麻油，浇入汤盘即成。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"啤酒鸭","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["鸭肉","啤酒","生抽酱油","老抽酱油","姜","蒜","冰糖","干辣椒"],"steps":["把鸭子切成 3 cm 小块，鸭肉冷水下锅，加姜片、料酒，焯一遍水，盛出沥干水分，备用。","炒锅烧热，放入约 100ml 食用油，大火待油烧开，鸭肉入锅翻炒至上色。","待鸭肉完全变色（肉眼可见泛白），将鸭肉拨到锅的一边，倒入豆瓣酱和糖，小火翻炒出香味和糖色。","加入丁香、八角、香叶、干辣椒、生抽、老抽、蒜，翻炒出香味。","倒入啤酒，没过鸭肉，加入盐、鸡精，然后中火将鸭子烧 30 分钟（牙口不好的话可以再多烧 5 分钟）。","出锅盛盘，上桌食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"回锅肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","小葱","生姜","青红椒","蒜苗","料酒","豆瓣酱","生抽酱油"],"steps":["锅烧热，用手将五花肉紧紧压在锅上炙皮","用钢丝球把皮刷干净，至黑色部分碳化部分被完全去除，不刷干净会有苦味","将五花肉放入锅中，放入能淹没五花肉的冷水，放入生姜片、料酒和小葱（取 2 棵小葱打结）","开大火煮，水开后撇去浮沫，继续煮 15 分钟，煮至瘦肉部分可以用筷子轻松刺穿","青红椒切圈","蒜苗切段","生姜切小薄片","将 5ml 豆瓣酱和 5ml 生抽提前混合"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"土豆炖排骨","time":20,"level":"中等","tags":["肉菜","家常","开源","土豆"],"ings":["肋排","土豆","姜","小葱","料酒","白糖","干辣椒","八角"],"steps":["**处理土豆：** 将 300g 土豆去皮，切成不规则的滚刀块 。**切好后立刻泡入一盆清水中**，隔绝氧气防止表面氧化发黑，备用。","**处理葱姜：** 将 30g 姜全部切成薄片（分成两份 15g）。将 25g 小葱处理好：15g 挽成一个葱结，剩余 10g 切成细小葱花备用。","**封装酱汁碗（一键调用）：** 拿一个小碗，依次加入 10ml 生抽、5ml 老抽、5ml 蚝油、5ml 黄豆酱，彻底搅拌均匀，放在灶台触手可及处备用。","**开启异步水程：** 按下电热水壶开关，开始烧制 700ml 开水。（确保炒制完成时，开水刚好就绪）。","**冷水焯水：** 将 750g 肋排冷水下锅，加入 15g 葱结、15g 姜片、15ml 料酒。大火煮沸后，继续保持沸腾焯水 2 分钟，逼出内部血沫。","**热洗冷防：** 捞出排骨，**必须用热水**将排骨表面残留的浮沫清洗干净（遇冷水肉质会剧烈收缩变硬）。","**绝对脱水（防爆防溅）：** 洗净的排骨**必须用厨房纸彻底吸干表面水分**，装盘放在炒锅旁边备用（防止后续下入高温糖色时发生剧烈炸锅）。","**炒制糖色：** 热锅凉油，加入 20ml 食用油。将 10g 白糖倒入锅中，中小火不停搅拌。翻炒至白糖完全融化冒泡，并呈现红棕色的焦糖色 。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"地三鲜","time":40,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["茄子","土豆","尖椒","葱","姜","蒜","豆瓣酱","生抽"],"steps":["土豆、茄子、尖椒洗净。","土豆去皮。","茄子、土豆均切成 15g 的不规则的小块。","尖椒用手顺着纹路撕即可，撕成比土豆、茄子略大 25%的块。","尽可能除去青椒表面的水分，避免后续炸的时候炸水。考虑使用厨房纸或风干半小时。","葱切 0.5cm 小段，共取 5g。蒜剁碎成蒜蓉取 15g，分成两份，各 7.5g。姜切沫取 5g。","拿一个空碗，放入生抽 10ml、糖 10g、淀粉 8g，加入 80ml 清水，彻底搅拌均匀，作为调料碗，备用。","热锅，加入 150ml 油。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"基础牛奶面包","time":120,"level":"进阶","tags":["主食","开源","面"],"ings":["鸡蛋","糖 （如有糖浆是最好的","干酵母","盐","谷朊粉","香草精","量杯","布"],"steps":["首先，将酵母和 ***30℃ 的温水*** 用刮刀或厨具混合均匀，静置 5 分钟。之后与面粉混合，搅拌均匀。此时的酵头应该是**特别粘稠**的面糊。","用布盖上面糊，将面糊放置到**温暖的地方**进行发酵，时长为 45 ~ 60 分钟。","最终的面糊应该是表面有很多气泡的且体积明显增大。","用手掌下部推开面团，然后对折再次推开，直至表面没有干粉结块。这时的面团还不是很光滑。","使用喷壶将至少是当前面团三倍大的容器内喷上一层植物油（也可用手涂抹均匀），将面团放入并盖上布，发酵 1 小时。","此时面团应该有原来的两倍大。在面板或硅胶垫上撒上薄薄的一层面粉（可以看见面板或硅胶垫的厚度即可），然后将面团拿出，用手压瘪面团排气。","之后使用擀面杖，擀成 1 cm 的厚片。并紧实、不留空隙地从一边卷起来。","然后旋转 90° ，重复步骤 4、步骤 5 。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"太阳蛋","time":5,"level":"简单","tags":["早餐","开源"],"ings":["鸡蛋","盐","油"],"steps":["准备一个小碗，倒入在上一步计算好的油，撒盐，搅拌均匀。倾斜碗使油沾在碗表面。","取出一个鸡蛋，打入小碗。","蛋黄表面戳孔。牙签戳 5 个或筷子戳 1 个。","放入微波炉，中火 3 分钟。","准备一个小碗，倒入在上一步计算好的油，撒盐，搅拌均匀。倾斜碗使油沾在碗表面。","取出一个鸡蛋，打入小碗。","蛋黄表面戳孔。牙签戳 5 个或筷子戳 1 个。","放入微波炉，1 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"奇异果菠菜特调","time":10,"level":"简单","tags":["饮品","开源"],"ings":["原料","奇异果","苹果","菠菜叶（","水","白砂糖","工具","榨汁机"],"steps":["将猕猴桃切成两半，每半再分四份小块","将苹果切丁","将菠菜叶去梗，只留叶子部分","将菠菜切碎","一起倒入榨汁机搅拌杯","注水","加入白砂糖","启动搅拌机，搅拌约 4 个 15 秒（每 15 秒停下看状态）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"奥利奥冰淇淋","time":20,"level":"中等","tags":["甜点","开源"],"ings":["淡奶油","原味奥利奥","电动打蛋器","一个容量在"],"steps":["将奥利奥拧开后去除利利（夹心），备用","用筷子将奥奥剁碎，需要有一半奥奥变成粉状，另一半的奥奥最大长度小于 0.5 厘米，备用（某宝可搜“奥利奥饼干碎”，节省时间精力^-^）","将奶油全部倒置于深容器中，并加入准备好的糖","搅打完成后将奥奥放入奶油中，搅拌均匀直至底部有奥奥。","可选：将混合物倒入冰淇淋模具中","放置冰箱冷冻室（ -18 度） 4 小时以上可取出"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"奶油蘑菇汤","time":30,"level":"简单","tags":["汤","开源"],"ings":["白蘑菇","洋葱","黄油","面粉","牛奶","淡奶油","黑胡椒碎","盐"],"steps":["白蘑菇切片备用，洋葱切末备用。","平底锅中放入黄油，小火融化后加入洋葱炒至透明。","加入白蘑菇翻炒至出水变软，撒入面粉搅拌均匀。","加入牛奶和清水，搅拌均匀后小火煮沸，保持搅拌防止糊底。","转小火煮约 10 分钟，汤汁浓稠。","倒入淡奶油继续加热 1 分钟，加入盐和黑胡椒调味。","熄火后可用料理机打成细腻浓汤（可选）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"奶茶","time":20,"level":"简单","tags":["饮品","开源"],"ings":["袋泡红茶","全脂奶粉或淡奶","杯子"],"steps":["取袋泡红茶 2 包放入杯中，加入 180-200mL **沸水**。","**等待 20 - 30 分钟**。","称取 11-12g 奶粉和 5-7g 砂糖，分别加入前一步骤得到的液体中。","搅拌均匀即可饮用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"奶酪培根通心粉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["通心粉","奶酪","肉类","洋葱","黄油","面粉","牛奶","大蒜"],"steps":["奶酪要磨成碎末","洋葱切成条状","通心粉用微咸的水煮 6 分钟","**中火**","锅中放入黄油，等待融化","加入洋葱","洋葱软化后加入大蒜","大蒜香味出来后，加入肉类，等待 5 秒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"姜炒鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡","生姜","啤酒","生抽","老抽","盐","小米椒","美人辣"],"steps":["鸡尽量剁成 1cm 的小块，洗净后滤干，再放生抽腌和料酒腌制 30 分钟","大先热锅到微微冒烟，放入食用油，等 5 秒","下入姜片后转中火炒 30 秒，","下入鸡块翻炒 3 分钟，炒干水分，炒出鸡油","放入各种剁碎的辣椒和大蒜子，加盐和老抽继续翻炒 30 秒","倒入啤酒，中小火焖 2 分钟","大火收汁盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"姜葱捞鸡","time":40,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡腿肉","盐焗鸡粉","葱"],"steps":["四个鸡腿清洗干净，放入碗中","碗中加入盐焗鸡粉和 5ml 油，搅拌均匀","让鸡腿静置腌制 15 分钟， 同时准备蒸锅并把水煮开","鸡腿腌制完成后， 放入水开后的蒸锅中，蒸制 20 分钟","将姜根据个人口味切成 1）姜蓉或 2）姜丝或 3）姜粒","将葱切成 0.5cm 小段","将葱姜放入蘸料碗，并加入盐和糖","将剩余的油倒入另一个锅中加热至六至七层热"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"孜然牛肉","time":20,"level":"中等","tags":["肉菜","家常","开源","牛肉"],"ings":["牛柳或牛肩肉","青椒","孜然","小米椒","生抽酱油","淀粉","油","盐"],"steps":["首先将小米椒切碎，和孜然粒一起放入捣药罐捣碎成颗粒，这样更入味。如果时间紧张可跳过捣碎步骤","青椒切头去籽（喜欢辣的可不去），切成丝。葱切段。","牛肉提前解冻，过一边水洗干净，晾干或用厨用纸吸干，将牛肉顺着纹理切成片","然后进行腌肉，加入生抽，淀粉，油，均匀搅拌，静止 30 分钟。腌肉方法也可参考[学习腌](../../tips/learn/学习腌.md)","热锅下油，放入葱，爆出香味后放入腌好的牛肉煸炒","牛肉变色后均匀放入孜然辣椒颗粒并炒熟","然后下入青椒丝，断生后放盐","大🔥炒 1 分钟后关火再翻炒 30 秒保证受热均匀即可出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"完美水煮蛋","time":20,"level":"简单","tags":["早餐","开源"],"ings":["新鲜鸡蛋","定时器"],"steps":["准备两锅水： A 锅维持 100°C 沸水， B 锅维持 30°C 温水","用漏勺将鸡蛋放入 A 锅，启动定时器","精准**每 2 分钟**将鸡蛋转移至另一锅水","重复转移操作共 16 次（总时长 32 分钟）","最后一次转移后，在 B 锅静置 30 秒","立即放入冰水（ 0 摄氏度）终止加热（维持 30 秒）","剥壳时从钝端气室处开始，沿纵轴剥离蛋膜"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"宫保鸡丁","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["手枪腿","大葱","干辣椒","熟花生","生抽酱油","香醋","白糖","料酒"],"steps":["手枪腿用剪刀去骨，鸡肉面用刀背拍打一遍，切条后切至 1.5cm 见方肉丁；泡于清水 10 分钟，捞出控干备用（若是鸡胸脯肉，则可以直接进行切丁以及之后的动作）","取大葱葱绿与姜片 5g 于碗中，倒入 50g 开水备用；葱白切 1.5cm 圆粒备用；取花生放入微波炉高火 5 分钟焙干备用","鸡丁中加入盐 2g，老抽酱油 5g，料酒 15g，淀粉 15g 搅拌均匀，至微微发干；缓慢加入部分葱姜水，搅拌鸡丁至粘手；保鲜膜密封，放入冰箱腌制 1 小时","干辣椒切段；起锅，大火烧热转小火；放入干辣椒焙干至微微发糊，捞起备用；花椒焙干至有香味，捞起备用","转大火，倒入 20g 植物油，7 成热（竹筷子起泡）下入鸡丁，煎至上面开始发白，用锅铲翻面，煎 30s 后翻炒均匀","下入葱粒翻炒，加入余下葱姜水不够 100g 再加一点清水（务必是热水）；盖上锅盖，转中小火焖 2 分钟；","转大火，下入熟花生，干辣椒和花椒；加入鸡精 2g，香醋 5g，白糖 2g，翻炒均匀；","淀粉 10g 加 50g 清水调成水淀粉，加入锅中，翻炒均匀，收汁到自己想要的浓度"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"家常日本豆腐","time":20,"level":"中等","tags":["素菜","蔬菜","开源","豆腐"],"ings":["日本豆腐","青椒","胡萝卜","火腿肠","黑木耳","洋葱","生粉","蒜"],"steps":["胡萝卜切片，尖椒切薄块，葱蒜碎切好","把买好的日本豆腐打开袋子切好，切成大概 1 cm 厚的圆柱体","生粉放到平盘中，准备给豆腐裹面","轻轻把豆腐放到面粉上，上下两面和周边都裹上面粉，注意不要包裹的太厚","在平底锅里放 150 ml 油，油能没过豆腐一大半即可，看边缘颜色变成金黄，翻面煎就可以了","两边都煎好的时候捞出来放在干净的盘里备用","在炒锅中倒入 10-15 ml 油，放入葱蒜，爆香后放入青椒、胡萝卜、火腿肠、黑木耳","加入蚝油、生抽、盐、鸡精、白砂糖、番茄酱"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"小炒肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","朝天椒","小米椒","豆豉","豆瓣酱","老抽","淀粉","盐"],"steps":["五花肉切片","把肉放入器皿内，加入淀粉、老抽、盐搅拌腌制半小时","葱切段","小米椒、朝天椒斜刀切好","热锅、倒油","油热后加入五花肉煸炒。炒至变色后盛出来","向锅中加蒜，煸出香味，加入豆豉，翻炒均匀","加入豆瓣酱翻炒均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"小炒藕丁","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["大葱","小米辣","莲藕","生抽","老抽","耗油","油"],"steps":["大葱、小米辣切小段，备用","莲藕去皮，切成不超过 3cm 的小块，放入水中备用（防止氧化发黑）","取炒锅，锅内放入 500ml 凉水，煮沸","将藕丁下入沸水中，焯水 2 分钟后，取出放入盘中备用","将锅中水倒掉后，将锅加热干燥，加入 10-15 ml 食用油","待油温升高后，下入葱花，小米辣爆香","将处理好的藕丁下入锅中，大火翻炒","加入生抽、老抽、耗油"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"小炒鸡肝","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["生鸡肝","蒜苗（蒜苗指的是","大葱、姜、料酒","烧烤料或孜然粉","芝麻","食用油"],"steps":["鸡肝清洗，备用","蒜苗清洗，切段，备用","大葱清洗，取 100g 切段，取 50g 切片，备用","姜清晰，取 70g 切片， 取 50g 切丁，备用","第一步：焯水","第二步：炒制"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"小炒黄牛肉","time":20,"level":"中等","tags":["肉菜","家常","开源","牛肉"],"ings":["牛里脊","芹菜","小米椒","野山椒","香菜"],"steps":["牛里脊切成不超过 3cm 宽，3mm 厚的薄片，倒入 6ml 酱油，用手抓匀备用","芹菜切成不超过 5cm 的小段，备用","小米椒切成丝状，备用","野山椒切成颗粒，备用","香菜切成成不超过 3cm 的小段，备用","热锅，锅内放入 15ml 食用油，大火等待 30 秒让油温升高","放入小米椒和野山椒爆香","放入牛里脊和芹菜，然后**大火翻炒 1 分钟**"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"小米粥","time":20,"level":"简单","tags":["汤","开源","粥"],"ings":["小米","水"],"steps":["小米 100 克，放入碗中，用水轻淘一遍（用手搅拌一下，将水倒掉，只是去掉外面的浮灰，不可搓洗！！！）","水烧开，务必烧开！！！","水烧开沸腾时，将小米倒入锅内。（很容易被忽视的一个很重要的环节）","搅拌使得小米不会粘连锅底，继续用大火熬 6-10 分钟，注意用中间穿插搅拌几次。","改中火、文火熬 15-20 分钟，锅盖要错开一条缝，千万不能让小米油溜掉哟，中间继续搅拌几次，不要糊锅底"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"小米辣炒肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["小米辣","花生油","五花肉/瘦肉","盐","生抽","蚝油","大蒜","姜"],"steps":["将小米辣洗净，斜刀切大一点","肉的话，想切丝切丝，想切片切片，倒入调料（生抽、蚝油、盐）腌制 5 分钟","热锅倒油，先把肉炒好盛起","姜蒜爆香，倒入豆瓣酱翻炒，到入切好的小米辣，再倒入瘦肉，翻炒一下，放点生抽、鸡精、盐、糖翻炒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"小酥肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["去皮猪肉","植物油","老姜","小葱","料酒","盐","十三香","胡椒粉"],"steps":["老姜切丝,小葱不用切。","根据计算公式倒入料酒、清水。","用手捏揉 5 分钟，使姜葱的味道充分溶解在水中。","将猪肉去皮洗净","切成长度 8~10 厘米，厚度 1.5 厘米的肉条。","根据上面的计算公式加入盐，十三香、胡椒粉、味精、鸡精、花椒碎、花椒粒、生抽。","倒入前面制作好的葱姜水","抓匀并且充分揉制 10 分钟，直至肉吸收所有水分并且变得粘手。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"小龙虾","time":45,"level":"中等","tags":["水产","海鲜","开源","虾"],"ings":["小龙虾","油","香叶","八角","桂皮","青花椒","花椒","子弹头辣椒"],"steps":["小龙虾刷干净去虾线，葱切 2cm 葱段，姜蒜切末。","烧油，油微热, 下香叶、八角、桂皮、青花椒、花椒、子弹头辣椒。","香料出香气之后下锅葱姜蒜","葱姜蒜爆香后，加入郫县豆瓣、黄豆酱，炒出红油。","下小龙虾，翻炒至变色。","加入啤酒，等啤酒烧开后加入生抽，盐。","将小龙虾完全煮熟后出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"尖叫牛蛙","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["牛蛙肉","泡姜","泡椒","野山椒","青红辣椒","大蒜","豆瓣酱","盐巴"],"steps":["牛蛙肉洗净后控干水分，加入 10 克以上的盐巴和 50ml 以上的啤酒，用手抓 5 分钟，去除牛蛙肉的腥味","然后对着清水冲洗，直至不再流出血水和杂质，控干水分，放到合适的器皿中，准备腌制","加入 5 克盐，30 克生粉，10ml 料酒，5 克胡椒粉，用手抓均匀，腌制 5-10 分钟","将泡姜 泡椒 野山椒 切丝或者片（根据自己刀工选择），青红辣椒切成圈圈 大蒜拨开即可","捞出蛙肉后，控油，并将锅中的热油倒出到碗中，保留 30ml,加入 20ml 猪油（如果没有，则在锅中保留总共 50ml 食用油）","待油温 6 成热，加入泡姜、泡椒、野山椒、大蒜，超出香味，加入豆瓣酱 20 克，中火翻炒至出红油（时间控制在 30 秒），倒入 400ml 啤酒，","然后倒入炸过的牛蛙肉，用勺子推着翻，不要用力搅拌，加入 5 克胡椒粉，加入 5ml 藤椒油，中火慢焖 3 分钟","加大火力，大火收汁半分钟，加入青红辣椒圈，再煮 10 秒准备起锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"尖椒炒牛肉","time":20,"level":"中等","tags":["肉菜","家常","开源","牛肉"],"ings":["牛肉","葱、姜、蒜","尖椒","酱油","盐","糖"],"steps":["蒜剁成蒜泥","葱切段","姜切成姜片","尖椒切成段","牛肉放入碗中","加姜、盐、酱油、糖进行腌制 30-40 分钟","腌制完姜可以去掉","冷油下锅，待油变热至偶有气泡"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"山西过油肉","time":40,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪里脊","蒜苔","盐","酱油","葱姜蒜","鸡蛋","淀粉","食用油"],"steps":["木耳提前泡发好，如果着急可以用热水泡发。","蒜苔切段大约 3cm，葱头切菱形块备用。","起锅烧油油要多一点，油温五成热，下入腌制好的肉片，将肉片打散，捞出控油备用。","将锅中多余油倒出，留 10ml 油炒菜，油温七成热","下入葱姜蒜爆香，先下蒜苔炒至断生，再下入木耳葱头，加入生抽，花椒粉，翻炒几下将之前炸好的肉片下入翻炒","加 10g 的盐，起锅前加 10ml 的醋和鸡精，起锅装盘。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"巴基斯坦牛肉咖喱","time":20,"level":"进阶","tags":["肉菜","家常","开源","牛肉"],"ings":["Masala 粉","牛肉","番茄","螺丝椒","原味酸奶","蒜粉","姜粉"],"steps":["全部螺丝椒切成段状，备用","全部番茄打成番茄蓉，备用","牛肉切成 2cm 的小块，洗净备用","炒锅中倒入一层油（用来防止番茄蓉沸腾蒸发）","倒入番茄蓉，持续搅拌 2-3 分钟，等待它越变越红","加入 5g 蒜粉，5g 姜粉和 1 包 50g 的 Masala 粉，搅拌均匀","加入牛肉和螺丝椒段，搅拌均匀","加入 1 盒酸奶（为了让整个酱汁变得粘稠），搅拌均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"带把肘子","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["带脚、爪猪前肘","红豆腐乳","甜面酱","精盐","红酱油","白酱油","料酒","蒜片"],"steps":["将肘子刮洗干净，肘头朝外、肘把（脚爪）朝里、肘皮朝下放在案板上。","用刀在正中由肘头向肘把沿着腿骨将皮剖开，剔去腿骨两边的肉（三面离肉），底部骨与肉相连，使骨头露出，然后将两节腿骨由中间用刀背（还是用斧头吧）砸断。","肘子放入煮锅煮至七成熟捞出（外观正常，内部淡红色），用干净抹布擦干水，趁热用红酱油涂抹肉皮。","取蒸锅一个，锅底放入八角、桂皮，先将肘把的关节处用手掰断，不伤外皮，再将肘皮朝下装进蒸锅内，装锅时根据肘子体型，将肘把贴住锅边窝着装进锅内，成为圆形。","撒入精盐，用消过毒的干净纱布盖在肉上，再将甜面酱（50 克）、葱（75 克）、红豆腐乳、红酱油、白酱油、姜、蒜等在纱布上抹开，用旺火蒸大约三小时（以蒸烂为准）。","蒸完取出，揭去纱布，扣入盘中，拣去八角，上桌时另带葱段和甜面酱小碟（或将甜面酱抹到肘面上，另带葱段小碟亦可）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"干煎阿根廷红虾","time":20,"level":"中等","tags":["水产","海鲜","开源","虾"],"ings":["阿根廷红虾","海盐","黑胡椒","白葡萄酒","生抽","香菜","柠檬","洋葱"],"steps":["阿根廷红虾解冻，最好是提前 1 天从速冻取出放到冷藏里自然解冻，能更好保持风味和口感。可买已经开背去虾线的，节省了不少时间","解冻好的红虾洗净擦干备用，注意这里一定要沥干水分，赶时间可以用厨房用纸吸干水分","生姜切片，洋葱切小方块，香菜洗干净后，叶茎分离，把香菜叶切碎，大蒜压碎切成小块碎末","大火热锅，热锅后倒入两调羹橄榄油，等油温升高后，放入生姜片，洋葱块和香菜茎煸炒","约 1 分钟后取出生姜，洋葱和香菜茎，弃用","调中大火，放入红虾开始煎，注意所有虾需要单面都完整接触平底锅，煎约 2 分钟，同时给每只虾刷上一层油","待底面虾壳有微微焦黄时翻面，并撒入大蒜碎末，轻微晃动平底锅使得受热均匀","约 1 分钟后添加 20ml 白葡萄酒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"干煸仔鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡腿","土豆","青椒","大蒜","盐","胡椒粉","生抽","老抽"],"steps":["鸡腿去骨（如使用鸡腿排可忽略此步骤），鸡腿肉用刀背砸一砸，切成 2cm 的块。","鸡腿肉中加入盐、鸡精（可选）、胡椒粉、生抽、老抽、料酒，抓拌至粘手时加入淀粉拌匀，加入食用油防止粘连，腌制 30 分钟。","土豆去皮，切成 2cm 的块，沸水煮 5 分钟后捞出，控干水分，防止油炸时爆锅。","青椒去籽，切成 2cm 小片，放在笊篱中备用。","锅中加入宽油（根据锅的形状，能没过食材即可），油温烧至 180℃ 时，下入土豆块炸 3 分钟后捞出。","待油温再次升高到 180℃时，下入鸡块炸 2 分钟后捞出。","待油温再次升高到 180℃时，下入鸡块复炸 1 分钟后捞出。","待油温再次升高到 180℃时，下入土豆块复炸 1 分钟后，将锅中的油和土豆块经过笊篱过滤倒出，让笊篱上的青椒片断生。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"干锅花菜","time":40,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["花菜","五花肉","辣椒","生抽","白糖","蒜","盐","油"],"steps":["花菜朵朝下，没入淡盐水中浸泡 20 分钟。然后洗净用小刀拆成小朵","入开水锅中焯水 1 分钟，捞出立即用冷水冲淋至完全凉透，沥水备用","五花肉切成薄片，大蒜白色切下用刀背拍扁，小红辣椒切成段","锅烧热放油，油热下大葱白爆香","下五花肉片入锅，用中火煸炒至表面全部变色，继续煸炒一会儿，把肥肉部分的油份逼出一部分","倒入红辣椒段和花菜，翻炒几下","加入 10 ml 生抽","再加入 5 g 白糖，转大火不断翻炒 1 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"广式萝卜牛腩","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["牛腩","白萝卜","姜片","蒜瓣","葱","八角","桂皮","干辣椒"],"steps":["萝卜滚到切块备用","牛腩整块焯水，加入 2 片姜和一把葱结，等水开之后煮 5-10 分钟，然后捞出切件","将牛腩切块，切成自己喜欢的大小（牛腩焯过水，待会儿焖的时候基本不会缩水了，大块的会焖相对就一点的时间）","准备焖牛腩的酱料，将南乳、柱侯酱、酱油、蚝油、糖、盐按上面的量调和（冰糖刚刚没了换成了白糖）","热锅下油，将姜蒜爆香,放入牛腩，炒至干身,加入调好的酱料，炒香,如果喜欢色泽浓一点的可以加一点老抽润色一下","调料充分混合之后倒入热水","将牛腩换到汤锅中，放入桂皮、八角、香叶和干辣椒，焖大概 2 个小时","牛腩焖到半软之后加入白萝卜继续焖 30 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"微波炉腊肠煲仔饭","time":15,"level":"简单","tags":["主食","开源","饭"],"ings":["工具","原料","米","腊肠","鸡蛋","红萝卜","盐","油"],"steps":["将米淘洗干净后倒入 `饭碗` 内，加入 400ml 的水，**盖上盖**","放入微波炉，高火，`6` 分钟，煮饭途中准备原料","6 分钟后，用毛巾或隔热手套取出碗，可以看见米饭已经八分熟","在米饭上摆入切片的腊肠，继续高火 `2` 分钟","取出腊肠饭，放入 `青菜碗`，高火 `4-5` 分钟","在腊肠饭上摆好青菜，磕入鸡蛋，看个人喜好继续高火 `40-60` 秒","取出腊肠饭，此时已经基本完成。","将 `小碗` 放入，继续高火 `30` 秒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"微波炉荷包蛋","time":20,"level":"简单","tags":["早餐","开源"],"ings":["鸡蛋","芝麻油","盐"],"steps":["将鸡蛋打入小碗中，用筷子在所有鸡蛋黄上扎 2 个洞，避免加热弄脏微波炉","然后向碗内倒入常温饮用水","再向碗内倒入食用盐","最后加入芝麻油","将放好材料的碗放入微波炉中，高火加热 80 秒","到达设定时间后，使用抹布垫着手取出成品"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"微波炉蒸蛋","time":20,"level":"简单","tags":["早餐","开源"],"ings":["鸡蛋","温水或高汤","食盐","生抽","香油"],"steps":["将鸡蛋打散，加入温水/高汤、盐、生抽，轻轻搅匀，尽量不要起泡。","将蛋液过筛倒入耐热碗中，表面若有气泡可用牙签轻戳。","覆盖保鲜膜并扎 8-10 个小孔，或使用微波炉专用盖（留缝隙）。","放入微波炉中加热：","加热完成后取出静置 1 分钟，让余温使中心完全熟化。","淋上香油，撒葱花即可食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"微波炉蛋糕","time":5,"level":"简单","tags":["早餐","开源"],"ings":["黄油","面粉","泡打粉","鸡蛋"],"steps":["加入以下食材，注意不要超过容器的 3/4","夸赞一下自己🥰","微波炉（高火）加热 **1分钟** （至蓬松蛋糕形态）","取出杯子（烫手啊啊啊啊↑）并拍朋友圈就可以吃了"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"微波炉鸡蛋羹","time":20,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["鸡蛋","水"],"steps":["将鸡蛋打入可使用微波炉加热的陶瓷碗中，使用筷子将其打散。","加入水和盐，搅拌均匀。","将虾皮放入碗中，搅拌均匀，保证所有虾皮不会堆积在一起。","葱切碎至边长 0.6±3mm 状，放入碗中搅拌均匀。","将此碗及内容物放入微波炉中，容器表面覆盖保鲜膜或以可微波瓷盘加盖（注意：不得密封，必须留有涨缩量）加热 2 分钟(500W)。","小心地取下保鲜膜或其他覆盖物，然后继续加热 2 分钟。","若微波炉不带旋转式加热盘，将碗缓慢的水平旋转 180 度，以确保内容物加热均匀。","放入芝麻油。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"微波葱姜黑鳕鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["黑鳕鱼","青葱","姜","料酒","酱油","芝麻油","花生油","密封袋"],"steps":["鱼片分别放入密封袋，鱼皮向下放在盘子中。","取葱白切丝 25g，姜去皮后切丝，10g，混合在一起后分成两半，分别放在袋内鱼片上。","每个袋子倒入 2.5mL 料酒。","封好密封袋，放入微波炉中，中火（800 瓦）微波至*不透明且容易散开*时（约 3.5-5 分钟），从袋中取出鱼片。","去除青葱和姜。","取酱油 25mL，芝麻油 2mL，混合均匀后平均淋在两片鱼片上。","取葱绿切细丝 10g，姜去皮后切丝 3g，混合后分成两份撒在鱼片上。","取花生油 50mL，在小锅中加热至 190℃。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"徽派红烧肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","白砂糖","食用油","生抽","蚝油","老抽","姜片","蒜头"],"steps":["五花肉切块，每块 2-3 cm 大小","锅中加入 150 ml 食用油，倒入五花肉，煎炸 2 分钟 后，加入盐，翻炒五花肉，2 分钟 后出锅","锅中加入 50 ml 食用油，倒入白砂糖，翻炒到咖啡色","倒入五花肉，翻炒 30 S ，加入姜片、蒜头后翻炒 30 S","加入料酒，五香粉、葱，加入水没过五花肉，盖上锅盖煮 10 分钟","加入生抽、老抽、蚝油，中火煮 20 分钟","开锅，大火烧汁，端盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"意式烤鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡腿肉","盐","黑胡椒","橄榄油","蒜","柠檬汁","欧芹"],"steps":["鸡腿肉涂上盐、黑胡椒、橄榄油和蒜末","放入预热至 180 度的烤箱中，烤 30-40 分钟或至熟","欧芹切成碎末备用","柠檬挤出汁备用","烤好的鸡肉取出，淋上柠檬汁","撒上欧芹碎即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"意式肉酱面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["意大利面","意大利面酱","肉沫","白洋葱"],"steps":["锅中加水，烧开后放入意面（等待 6 - 12 分钟）","在烧水的时候可以进行下面这些步骤，但请注意煮面的时间","洋葱切成小丁","空锅中倒油，中火下入洋葱碎","时刻搅拌，注意不要让洋葱烧糊，直到洋葱变成半透明状","下入肉沫，继续搅拌（搅散），直到肉末变成棕色","加入意大利面酱，稍微搅拌一下即可","把煮好的意大利面沥干水分并倒入肉酱中搅拌均匀即可（或者直接把做好的肉酱倒在意面上也行）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"意式香肠北非蛋","time":20,"level":"中等","tags":["早餐","开源"],"ings":["百味来  拿坡里意面酱","鸡蛋","甜椒","洋葱","橄榄油","帕马森干酪","新鲜欧芹","干辣椒碎"],"steps":["将意式猪肉香肠去肠衣备用；洋葱切小丁；甜椒切细丝。","在宽口平底锅中倒入 10ml - 15ml 橄榄油，中火加热。","放入处理好的香肠或午餐肉，翻炒至边缘金黄酥脆（如果使用生香肠，翻炒时用勺子将其捣碎变色）。","将洋葱丁和甜椒丝加入锅中与肉一起翻炒，持续翻炒 4 - 5 分钟，直到蔬菜变软，洋葱呈半透明状。","倒入百味来拿坡里意面酱，搅拌均匀。将火调至中低火，保持微沸炖煮 2 - 3 分钟。（如果酱汁看起来太稠，可以加入 15ml 水）。","用勺子的背面在锅内的酱汁中挖出 3 - 4 个小“坑”。","依次小心地将鸡蛋打入每个坑中。","关火。根据个人喜好撒上磨碎的帕马森干酪、新鲜欧芹或干辣椒碎。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-semi-finished-md","name":"懒人蛋挞","time":40,"level":"中等","tags":["半成品","开源"],"ings":["隔热手套","网购蛋挞液"],"steps":["烤箱 200 度，预热 10 分钟","在烤盘上放上蛋挞皮，蛋挞皮中倒入蛋挞液约 10ml，具体分量需要看蛋挞皮大小，通常倒入 4/5 即可","将烤盘放入烤箱内，上下火 190 度，烤 10 - 20 分。如果想快速烤出蛋挞液上的焦褐斑点，需要上火更高一些，通常是 200 - 210 度","蛋挞液烤出焦褐斑点，蛋挞皮完全蓬松冒油即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"戚风蛋糕","time":20,"level":"进阶","tags":["甜点","开源"],"ings":["打蛋器（电动最好","鸡蛋","白糖","牛奶","食用油（或黄油","低筋面粉","[可选] 柠檬汁或白醋"],"steps":["从冰箱中取出新鲜的鸡蛋","准备两个容器并擦干，分别盛放蛋清与蛋黄","对盛放蛋清的容器，可稍有水珠，但**不能有任何油**；盛放蛋黄的容器不能有水珠","打蛋，手工或利用分蛋器，将蛋清与蛋黄分离到两个容器中。","分离过程中蛋黄不能破碎，**蛋清中不能混有任何蛋黄**，否则会严重影响打发。（白色系带可进入蛋清，不影响）","（注意，不使用厨房机的情况下，盛放蛋清的容器也是打蛋的容器，为避免溢出，加入全部蛋清后不要超过容器的 **1/8**）","准备一个新的空碗，加入配方中**全部的食用油**和**全部的牛奶**","用打蛋器手动快速搅拌，直到油水完全融合，呈现乳白色悬浊液状态（完成乳化）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"手工水饺","time":20,"level":"进阶","tags":["主食","开源"],"ings":["面粉","冷水","直径","芝麻香油"],"steps":["盆中加入所有面粉","加入芝麻香油","面粉中央挖小洞","分 4-5 次加入水，并搅和，当出现碎末状的稍微干燥面团时","取消加水，用手将面团压实","面团压实至可把盆周围的面粉纳入即可，此步骤为面光盆光","将面团置于桌上，盆倒扣于桌上，环境温度为 25 度，使面团醒发约 45 分钟","醒发完成后，将面团搓成条状，合成一团，再次搓成条，重复 3 次"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"手抓饼","time":40,"level":"简单","tags":["早餐","开源"],"ings":["普通面粉","开水","冷水","食用油","盐","鸡蛋","生菜","火腿"],"steps":["面粉放入碗中，加入开水搅拌成絮状，再加入冷水揉成光滑面团，覆盖湿布静置 20 分钟。","面团分成每份约 100 克，搓圆，擀成薄片。","表面均匀涂抹食用油，撒上盐，卷成蜗牛状，松弛 10 分钟。","面团再次擀成薄饼，厚度均匀。","热锅中倒入油，小火煎至两面金黄起泡。","煎好的饼依次铺入煎蛋、生菜、火腿、芝士片等配料，卷起即可。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"手撕包菜","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["包菜","五花肉","小米辣","食用油","料酒","生抽","香醋","鸡精"],"steps":["包菜对半切开，去掉中间白色部分【参见图一】","手撕包菜，碗中放入 2 g 盐，清洗包菜并沥干备用【参见图二】","姜片、蒜头、小米辣、蒜苗处理后备用【参见图三】","五花肉切片，清水清洗后备用","锅中加入 30 ml 食用油，倒入包菜翻炒，大火翻炒 1 分钟 后，加入 3 g 盐 ，继续翻炒 2 分钟 后取出备用","锅中加入 30 ml 食用油，倒入五花肉，大火翻炒 1 分钟","倒入姜片等材料，翻炒 1 分钟","倒入包菜翻炒后，加入 香醋、料酒、鸡精、料酒，大火继续翻炒，2 分钟 后出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"扬州炒饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["冷饭","鸡蛋","冷冻去皮基围虾","午餐肉罐头","青豆","胡萝卜","玉米粒","葱"],"steps":["胡萝卜切丁 0.2cm*0.2cm*0.2cm，备用","午餐肉切丁 0.2cm*0.2cm*0.2cm，备用","葱分别取葱白和葱绿，各切成 0.25-0.5cm 的小段，分开备用","在碗中打入鸡蛋液，均匀搅拌，备用","将胡萝卜，青豆，玉米粒煮熟捞出，备用（水别倒）","将虾煮熟，捞出备用（水可以倒了）","热锅热油，可以参考[学习炒与煎](../../../tips/learn/学习炒与煎.md)中的热锅双油","鸡蛋凝固后立刻捞出，备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"披萨饼皮","time":20,"level":"中等","tags":["主食","开源"],"ings":["中筋面粉","水","安琪干酵母粉","食用盐","橄榄油","白砂糖","烘焙油纸","披萨石（有更好"],"steps":["用准备好的温水把酵母粉化开，稍微搅拌小就好，备用","取准备好的面粉，依次添加盐、橄榄油、白砂糖","准备混合水和面粉，边加水边搅拌直至水全部加完","搅拌至看不到干米粉为止","用差不多三倍大面团的容器装好，密封，冰箱冷藏（4 度） **等待 8~12 小时，一般晚上做第二天就可以用**","观察面团醒发完毕 **差不多是原始大小大约两倍算醒发完毕**","取醒发好的面团，均匀分成四份，分别用保鲜膜盖好，备用","案板撒稍微多一点的干面粉，准备开始揉面"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"拔丝土豆","time":20,"level":"中等","tags":["素菜","蔬菜","开源","土豆"],"ings":["土豆","食用油","淀粉","白砂糖","水","芝麻"],"steps":["土豆去皮，切均匀的小块。放入淀粉（不加水）搅拌，使得淀粉覆盖土豆表面","起锅烧油，放入土豆块，缓缓翻滚煎炸 5-7 分钟 ，直至筷子可以插进土豆","取出土豆，放入大碗备用","锅中加入水、白砂糖，沿着一个方向慢慢搅动白砂糖，直到白砂糖颜色变成褐色","重新倒入土豆，翻炒 30 S 后 出锅","土豆盛盘，散上芝麻"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"排骨山药玉米汤","time":20,"level":"简单","tags":["汤","开源"],"ings":["排骨","山药","胡萝卜","玉米","生姜","小葱","料酒","食盐"],"steps":["**食材预处理**：","**排骨焯水**：","**翻炒排骨**：","**炖煮过程**：","**调味与出锅**："],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"排骨苦瓜汤","time":20,"level":"中等","tags":["汤","开源"],"ings":["排骨","苦瓜","虾皮"],"steps":["排骨洗净，切到约 4cm ±2cm * 3 ± 2cm 的小块（如没有剁排骨的工具，可以求助摊主）","炒锅倒入冷水 700ml 和排骨一起加热至煮沸，关火捞出排骨","苦瓜中间切为两半，清除干净内部的种子和苦瓜瓤，切为 0.5 ± 0.3 cm 的苦瓜条，洗净"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"提拉米苏","time":20,"level":"中等","tags":["甜点","开源"],"ings":["马斯卡彭芝士","手指饼干","放凉浓缩咖啡","无菌鸡蛋","白砂糖","可可粉","打蛋器"],"steps":["分离蛋黄蛋清","盛有蛋白的碗中加 10g 白砂糖湿性打发","盛有蛋黄的碗中将 40g 白砂糖分三次加入，搅拌至均匀","蛋黄中分三次加入马斯卡彭芝士，搅拌至均匀","蛋黄中最后加入朗姆酒，搅拌均匀","将打发好的蛋白分三次加入蛋黄芝士液中","手指饼干两面浸湿咖啡液，平铺入容器","两层芝士液两层饼干交替放入容器（这一步按照大家意愿及容器高度酌情处理）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"新疆大盘鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["花椒","油","鸡肉"],"steps":["肉先剁好，块状，用清水+盐浸泡 5 分钟，去除血水，去腥，然后空干水","葱蒜辣椒土豆等洗干净，土豆削皮","葱白切长段，长度 4cm 一段，菜椒和线椒切块状","土豆切成滚刀土豆，即切一刀动滚动一下，一块土豆大概有 4cm*4cm 大小即可","炒糖色：先将油加入锅中，然后将白砂糖放入，用锅铲来回搅拌，将糖炒化，然后炒出焦黄色，此时将空干水的鸡肉倒入锅中翻炒，进行上色","放入花椒，香叶，香果，干线椒等进行翻炒","放入 5g 盐，生抽 7ml，蚝油 10g ，料酒 100g，倒入 1 升清水，料酒可以用啤酒代替","调至中火，将水烧开，调制中小火慢炖入味"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"无厨师机蜂蜜面包","time":20,"level":"进阶","tags":["甜点","开源","面"],"ings":["高筋面粉","牛奶","酵母","鸡蛋","白砂糖","盐","黄油","蜂蜜"],"steps":["制作面团：将面粉，牛奶（建议加热到 40°，本人使用微波炉 15 - 20s），酵母，鸡蛋，面粉，糖和盐混合起来。","搅拌面团，将原料混合均匀成团。","加入黄油混合。","继续搅拌 + 手揉，均匀混合。","开始发面，使用保鲜膜覆盖容器，普通气温(10 - 20°)放置 1 - 2 小时，稍长时间对效果影响不大。","明显看到面团发酵变大（2 倍）即可开始切分面团, 此时面团应该不再十分黏手。","切分面团：理想状态每一份 60g（美观），可根据喜好适当调整大小。","将每一份小面团使用擀面杖擀成舌状后卷起, 再次醒面 10。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"无骨鸡爪","time":20,"level":"进阶","tags":["肉菜","家常","开源","鸡"],"ings":["鸡爪","姜","料酒","大葱","大蒜","小米辣","洋葱","生抽"],"steps":["用剪刀 / 刀 把鸡爪上的指甲的部分全部剪掉 **包括指甲下面的肉和骨头，让它一点指甲都不剩**","用水把他们洗干净，放一边","把`鸡爪`放入大锅中，准备去腥味","`大葱`，`料酒`，`姜` 全放进去","加水没过`鸡爪`","大火煮开 **中途可以把浮末捞起来**","水开**100度，沸腾**后等 10 分钟","关火，捞出来，把水沥干，洗干净，放入盆里"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"日式咖喱饭","time":20,"level":"中等","tags":["主食","开源","饭"],"ings":["咖喱块","土豆","胡萝卜","洋葱","肉","蒜头","花椰菜","培根"],"steps":["胡萝卜去头尾，去皮，滚刀切","洋葱剥去外层去芯，切成月牙状","土豆去皮、切大块","肉切块状","剥蒜拍平切碎","咖喱块切碎，增加接触面积加速溶解","热油锅放入蒜和肉，**快速翻炒**至肉*表面变白*","加入胡萝卜，**快速翻炒**至均匀受热"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"日式肥牛丼饭","time":30,"level":"中等","tags":["主食","开源","饭"],"ings":["葱","白芝麻","味淋（一种常用日式调料","[温泉蛋]"],"steps":["洋葱剥去外层去芯，切成月牙状","葱洗净切成 0.5cm 的小段","热锅直接放入白芝麻，**前后晃动锅体**使芝麻均匀受热至*略呈金黄色*","肥牛焯水 1 分钟后捞出","热油锅放入洋葱，**快速翻炒**至洋葱*变透明状*","关小火，加入 250g 水（或出汁），开回大火加热**等待 3 分钟**","加入牛肉和`调料`","**不断翻动**所有食材 **10 分钟**，防止食材粘锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"昂刺鱼豆腐汤","time":20,"level":"中等","tags":["汤","开源","豆腐","鱼"],"ings":["昂刺鱼或者沙光鱼","豆腐","香葱","姜","食用油","料酒","食用盐","胡椒粉"],"steps":["鱼处理好后洗净，（特别注意肚内的血丝、不洗干净会有腥味），放入大碗中，倒入料酒、10g 姜片、5g 盐，腌制 15 分钟","豆腐切块，放入凉水浸泡 5 分钟，捞出备用","煎鱼前，先用生姜片擦一下锅防止粘锅，倒入油（油量为 15ml * 鱼的条数 ），烧热后放入鱼煎 2~3 分钟，期间需要晃动一下鱼，防止粘底，且需要翻一次身","待鱼全部煎好之后，倒入开水、5ml 料酒、姜片，小火转至大火，盖上锅盖、大火煮 10 分钟（水要稍微多一些，后面会蒸发掉一些）","见汤变白后倒入准备好的豆腐，调中火再煮 5 分钟，加入 10g 盐、3g 胡椒粉调味，最后撒上葱花出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"朱雀汤","time":20,"level":"简单","tags":["汤","开源"],"ings":["鸡蛋","香油","白糖","水"],"steps":["鸡蛋在碗中打散，再倒入香油。","水烧开后，在沸腾状态下快速倒入盛有鸡蛋的碗中。","放入白糖。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"杀猪菜","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["血肠","酸菜","排骨","料酒","辣椒","香叶","八角","葱结"],"steps":["血肠用牙签多扎一些小孔，然后放水中小火煮十分钟，不要让水烧开，保持 80 度，否则血肠非常容易爆开。","煮好的血肠切块备用。","排骨放料酒焯水，控干水分备用。","锅内放入菜籽油，放蒜瓣，干辣椒，姜粉炒香。","放入排骨翻炒至表面金黄。","酸菜洗净拧干水分，放入锅中，加入香油翻炒，香油可以更好的去除酸味而且让酸菜更香，大火翻炒二分钟。","加入 600 毫升热水。","转入电压力锅，加香叶，八角，葱结，盐。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"杨枝甘露","time":20,"level":"简单","tags":["饮品","开源"],"ings":["杯子","牛奶","冰块","调理机/果汁机"],"steps":["奇亚籽泡牛奶 10 分钟。","泡籽之时，把半粒芒果、葡萄柚去皮切丁，放入杯中。","半粒芒果切小块放入调理机加冰块、椰奶打成泥。","倒入杯中，放上点缀材料（如有）。","一边享用一边写代码！！"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"松仁玉米","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["玉米粒","熟松子仁","胡萝卜（可选","食用油","白砂糖","盐","淀粉","水"],"steps":["玉米粒和胡萝卜丁提前焯水 1 分钟，捞出沥干备用","热锅凉油，放入胡萝卜丁略炒，再加入玉米粒翻炒","加入白砂糖和盐，炒匀","混合水与淀粉成水淀粉，倒入锅中快速翻炒使汤汁略稠","加入熟松仁翻炒均匀","出锅装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"枝竹羊腩煲","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["羊腩","腐竹","柱侯酱","腐乳","南乳","老抽","料酒","蚝油"],"steps":["准备工作: 香菇提前浸泡 2 - 3 小时至变软。腐竹提前浸泡 30 分钟至变软","准备酱汁 1: 南乳、柱侯酱、20g 腐乳、老抽放入同个小碗中搅拌均匀","准备酱汁 2: 20g 腐乳、砂糖、辣椒油放入同个小碗搅拌均匀","泡好的香菇去除根部","泡好的腐竹切成 5cm 的小段，挤干水分","洋葱去皮切丝。也可以用去皮红葱头进行替代，口味更佳。","小葱切成大约 5cm 的葱段","羊腩冷水下锅，放入 2 - 3 片姜片，倒入凉水，大火煮至水滚后关火"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"柠檬水","time":20,"level":"简单","tags":["饮品","开源"],"ings":["原料","柠檬","果蜜","冰","工具","雪克杯"],"steps":["称 40~45 克柠檬，放入雪克杯中","雪克杯盖盖子锤大约 10 次","加入果蜜 40~45 克","补水","摇晃均匀","最后根据喜好加冰"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"柱候牛腩","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["牛腩（首选坑腩","柱候酱","花雕酒","香叶"],"steps":["先把辅料备好：","牛肉不用切，直接冷水下锅，开大火焯水，水沸腾时将牛肉捞出","冲洗牛肉表面的杂质后，切成 4cm\\*4cm\\*4cm 的大块，控干水后放入碗中备用","大火，热锅下油，把碗 1（姜、蒜、小米辣）倒入锅中，炒香","中小火，倒入碗 2（香料），翻炒均匀，大概 30 秒","中小火，放入碗 3（南乳），用锅铲把南乳压碎","中小火，放入碗 4（豆瓣酱），翻炒均匀，大概 30 秒","中小火，放入碗 5（冰糖），炒至融化"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"桂圆红枣粥","time":70,"level":"简单","tags":["早餐","开源","粥"],"ings":["糯米","红枣","桂圆"],"steps":["将桂圆肉扒出，用清水洗两次，放入碗中浸泡 10 分钟","红枣用清水洗两次，放入碗中浸泡 10 分钟","糯米放入电饭锅中，清水淘米两次后，加入 2000ml 水","将桂圆和红枣加入电饭锅","打开电饭锅煮饭模式，1 小时后粥成"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"桂林十八酿","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["原则","猪肉馅（基础款","虾滑馅","鱼肉馅","混合馅（猪肉 + 虾滑"],"steps":["**青椒酿**：青椒去籽挖空 → 塞入猪肉馅或虾滑 → 煎至虎皮色 → 酱汁焖煮","**田螺酿**：田螺焯水取肉 → 螺肉与猪肉剁碎混合 → 塞回螺壳 → 紫苏薄荷焖煮","**猪肉馅**：最基础通用的选择，肥瘦 3:7 口感最佳","**虾滑馅**：鲜甜弹牙，青椒酿里常用","**螺肉猪肉混合馅**：田螺酿的灵魂，螺肉与猪肉 1:1，加紫苏薄荷","**混合馅**：猪肉 + 虾滑混搭，鲜甜与油脂香兼得"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"梅菜扣肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉","梅菜","五香粉","食用油","白砂糖","老抽","生抽","小米椒"],"steps":["梅菜放到清水中，浸泡 1 小时","锅中倒入 50 ml 食用油，将整个五花肉猪皮朝下，放到锅中 1 分钟 ，取出挂掉猪皮 【可选】","锅中加入开水，放入五花肉，大火煮 20 分钟 （筷子可以插进五花肉），取出五花肉","在五花肉表面涂抹均匀老抽、五香粉、白砂糖，放置 15 分钟","起锅烧油，加入五花肉，中火油炸直至两面金黄色（3-5 分钟）","起锅烧油，倒入梅菜，加上小米椒、蒜蓉、鸡精、食用盐后翻炒，直至炒干梅干菜水分","五花肉切片（后端 0.5-1 cm）,放在大碗中，散上梅干菜","中火蒸 45 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"椒盐排条","time":40,"level":"中等","tags":["肉菜","家常","开源"],"ings":["大排","鸡蛋","盐","椒盐粉","葱姜水","面粉","淀粉","吉士粉（增色增香"],"steps":["大排洗干净，剔骨，用刀面拍松，切成厚片，再改成粗条。","加入椒盐粉，搅匀，待到出胶质了**分次**加入葱姜水，放入冰箱腌制 20 分钟。","制作炸糊。放入 80 g 面粉，20 g 淀粉（注意是 20 g 淀粉，剩下 60 g 备用），2 - 3 g 吉士粉，盐 1 g。","打入一个鸡蛋，搅拌，再分次加入水 100 g ，再加 10 g 油，反复搅拌。直到炸糊完全调开，略粘稠即可。","取出剩余的 60 g 淀粉，取出排条，裹上一层淀粉，再裹上面糊。","待油温再次升高到 150 ℃ - 160 ℃ 时，下入排条复炸至金黄色后捞出。","撒上椒盐粉，搅拌均匀后出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"椒盐玉米","time":30,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["玉米粒","椒盐","芝麻粒","油","淀粉","两个塑料簸箕","若干吸油纸"],"steps":["玉米粒都是剥好的，直接解冻即可，温水泡 15 分钟或者灶上开水煮 5 分钟。","拿出一个簸箕，将其假设为 BoxA，垫上吸油纸，倒进解冻好的玉米粒。","shaking shaking shaking! - 直到吸油纸全部变湿为止。","拿出第二个簸箕 BoxB，垫上吸油纸，将 BoxA 的玉米粒全部倒入 BoxB 中。","shaking shaking shaking! - 直到吸油纸全部变湿为止。","重复上述操作多次，直到玉米表面没有明显可见的水滴但保持湿润的状态。","倒入大量淀粉，能够完全盖住玉米粒。","shaking shaking shaking! - 直到淀粉裹住了玉米粒"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"榄菜肉末四季豆","time":20,"level":"中等","tags":["素菜","蔬菜","开源"],"ings":["四季豆","五花肉","橄榄菜","大蒜","小米辣"],"steps":["将四季豆洗净，并把筋撕干净，然后切成大小均匀的颗粒备用。","将大蒜拍碎剁成蒜末备用。","将小米辣切成大小均匀的颗粒备用。","将五花肉去皮，然后剁成肉末备用。","将锅烧热，然后加入 20ml 油滑锅，锅滑好之后将热油倒出，然后加入 10ml 冷油，这就是传说中热锅冷油，这么做主要是防止肉末粘锅。","如果家里没有晾油瓶的话，也可以不用滑锅，放入油之后，直接加入肉末开始煸炒，小火煸炒两分钟，炒出猪油。","肉末炒香之后加入蒜末，橄榄菜和小米辣，炒出香味。","加入四季豆开中火煸炒，四季豆至少要炒 5 分钟，一定要保证四季豆**熟透**，否则可能会食物中毒。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"水油焖蔬菜","time":10,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["食用油","盐","蚝油","叶菜类蔬菜"],"steps":["洗净蔬菜","锅中加入 150ml 水，并烧开。（水不需要能完全没过蔬菜）","加入 3g 盐","（可选）加入 3ml 蚝油","加入 2ml 食用油","下菜， 翻拌一下，然后盖上锅盖焖 1 分钟","盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"水煮牛肉","time":20,"level":"中等","tags":["肉菜","家常","开源","牛肉"],"ings":["牛肉","豆芽","鸡蛋","香菜","豆瓣酱","料酒","淀粉","干辣椒粉"],"steps":["牛肉洗干净切片。","加入 15g 姜丝，1 个鸡蛋，15g 淀粉，8g 蚝油，10ml 料酒搅拌均匀，腌制 15 分钟。","香菜洗干净切好。","锅里倒油，加入豆瓣酱，5g 姜丝，蒜片。","倒入开水，煮成红汤。","豆芽洗干净去掉尾须，放进开水里焯熟。","将豆芽铺入碗底。","将牛肉片一片一片的放进红汤中，煮熟以后捞出。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"水煮玉米","time":20,"level":"简单","tags":["早餐","开源"],"ings":["新鲜玉米","水","盐","糖"],"steps":["将新鲜玉米剥去外皮，剩部分玉米皮入锅","加入淹过玉米约半节指头的水，加盐和糖","水煮开之后转至小火，加盖继续煮 15-20 分钟，玉米煮久点没事。","煮熟后沥干水分，冷却后食用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"水煮肉片","time":20,"level":"进阶","tags":["肉菜","家常","开源"],"ings":["猪里脊肉","食用盐","胡椒粉","生抽酱油","料酒","鸡蛋清","土豆淀粉","植物油"],"steps":["里脊肉改刀成小块，再切成 2 毫米薄片（可根据自己的口感改进），放入碗中，加入清水清洗两遍来去除血水和杂质，捞出挤干水分备用。","碗中加入食用盐 1.5g，胡椒粉 1g，生抽酱油 5g，料酒 3g，然后朝着一个方向搅拌 2 分钟，使其入味。","另外准备一个碗，加入一个鸡蛋清，加入 7g 土豆淀粉，一个方向搅拌均匀，倒入肉中","绿豆芽 100g，凤尾 1 根（改刀成小条），芹菜 3 根切成小段，蒜苗 2 根拍散切成小段。","大蒜 20g 剁碎，生姜小块剁碎，红泡椒 20g 剁碎。","锅烧热，放入 100g 植物油烧至 6 成热，加入 2g 青花椒、干辣椒爆香，配菜下锅，加入 1g 食用盐，炒至断生，盛入碗中垫底备用。","锅洗干净，加入 150g 植物油烧至 6 成热，加入制作好的姜蒜红泡椒，爆香后加入豆瓣 10g，开小火把豆瓣爆香炒出红油即可。","碗中均匀撒上刀口辣椒、蒜蓉和葱花。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"水煮鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["巴沙鱼","蔬菜","红油豆瓣酱","藤椒油","菜籽油","白胡椒粉","蒜瓣","盐"],"steps":["准备：巴沙鱼若是从冷冻柜里取出，需要放室温自然解冻 5 小时再做切片处理。","切片：巴沙鱼撇成薄片，约 5cm 长，3cm 宽。","[腌制](../../tips/learn/学习腌.md)：将切好片的巴沙鱼放入大不锈钢碗中","加入 30g 豆瓣酱，3g 盐，10ml 藤椒油，3g 白胡椒粉","用手抓匀后加入 5ml 菜籽油收尾封住口味","常温静置至少 30 分钟入味。","备菜：大蒜切成蒜末。以 300g 花菜，200g 生菜为例，将花菜与生菜洗净。","焯水与炒菜：花菜[开水锅焯水](../../tips/learn/学习焯水.md)备用；将生菜洗净晾干，炒熟备用（不用放油）。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"汤面","time":30,"level":"简单","tags":["主食","开源","面","汤"],"ings":["面食材料","菜类材料","牛羊鱼虾等肉类","鸡蛋鸭蛋鹅蛋鸵鸟蛋等蛋类","豆块豆筋豆腐皮等豆制品类","生菜菠菜油麦菜","青椒番茄胡萝卜等蔬菜类"],"steps":["先将菜类材料切成边长不超过 4cm 的块状，便于煮熟","如有生肉，则先放入冷水中，盖上锅盖，煮沸腾，先捞出上层血沫，再关火，捞出半熟的肉备用","先大火将水加热至沸腾，后调至中火","将较难煮熟的食材放入锅中（比如半熟肉类、香菇类、等最先放入锅中）。为保证煮熟，可在沸腾后计时 10 分钟，特别难熟的大块食材可追加 5 分钟。","将面食放入锅中，适当搅拌确保面和汤充分接触，使液面保持轻微沸腾，煮 5 分钟。加入面后液面易产生白色泡沫，可适当抬起锅盖通气或者撤下锅盖。","将易于煮熟的食材如青菜类放入锅中，适当搅拌以充分浸没，煮 2-5 分钟","关火，随后加入盐、胡椒粉、香油等自己喜欢的调味料，适当搅拌即可出锅食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"河南蒸面条","time":40,"level":"中等","tags":["主食","开源","面"],"ings":["挂面","五花肉","蒜薹","盐 + 鸡精 + 十三香","生抽 + 老抽 + 蚝油","麻油","蒸篦子","额外的盆"],"steps":["起锅加 7 成水，水开，上蒸篦子","将挂面，均匀铺开放置，淋 5ml 油并抹匀，蒸 15 分钟","将挂面和蒸篦子取出，放置一边，并倒掉锅中的水","五花肉，切成 2mm 厚度的肉片","蒜薹，切成 3cm 段","葱，切成 0.2cm 薄片","姜，切成 1mm x 1mm x 3cm 的细丝","蒜，放在砧板上拍碎，切成 1mm 的粒度"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"油泼辣子","time":20,"level":"中等","tags":["调料","开源"],"ings":["蒜头","干辣椒面","盐","熟白芝麻","小米椒","花生油","五香粉","草寇"],"steps":["拿出蒜头掰 2 个`小蒜头`去皮","拿出砧板剁碎`小蒜头`、`小米椒`","拿出碗倒入`花生油`","油热放入`其他配料`和`小葱`,等到香料变焦，捞出扔掉","拿出铁锅将碗内的油放入加热 2 分钟（菜籽油烧至冒烟）","此时是空碗","往空碗加入`干辣椒面`、`白芝麻`、`蒜末`、`小米椒`、`盐`、`五香粉`、`草寇`作为\"调料\"","关火将油温冷却至 `210` 摄氏度"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"油焖大虾","time":40,"level":"中等","tags":["水产","海鲜","开源","虾"],"ings":["黑虎虾 or 明虾、","葱、姜","料酒、盐、冰糖、植物油"],"steps":["剪虾枪到根上，虾须虾爪都剪掉，沙包挑掉，开背虾线挑出来，洗净备用","炸料油","下油，虾摆放整齐，两面变色后轻轻摁虾头","大火烧开转小火盖盖子闷（中途不能再加汤水，不要开盖）","皮亮虾弯就可以起锅，虾摆盘","收汁（过滤后倒回锅里收浓，放葱油 ） 汤汁剩余 1/4 时。","浇汁","完成"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-condiment-md","name":"油酥","time":5,"level":"简单","tags":["调料","开源"],"ings":["面粉","油","盐"],"steps":["面粉盛小碗里，加入盐","加入 200 度的热油","用筷子将其搅拌成无固状物体的糊状。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"油醋爆蛋","time":20,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["鸡蛋","小米辣","小葱","蒜","油","香醋","生抽","蚝油"],"steps":["鸡蛋不需打散，直接打入碗中备用","香葱切 3cm 长小段即可","蒜瓣和小米辣放入打蒜器，打成沫","将香醋、生抽、蚝油、白糖、水加入小碗，搅拌均匀作为糖醋料汁","油热倒入鸡蛋，等鸡蛋凝固之后铲成大块，倒入蒜沫、小米辣沫、倒入糖醋料汁","大火收汁、快出锅时加入葱段即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-drink-md","name":"泰国手标红茶","time":20,"level":"中等","tags":["饮品","开源"],"ings":["水","茶粉","炼乳","白糖","牛奶","克称","港式奶茶过滤袋"],"steps":["600cc 水大火烧开","在过滤袋中装入 20g 茶粉，开水倒入过滤袋中，过滤 20 遍","使用克称量取 24g 炼乳、24g 白糖和 18ml 牛奶放入 1000ml 以上的水壶中","将过滤好的茶水倒入水壶中搅拌，直到白糖融化","将水壶放到冰箱 4 小时以上","喝前可以加 6-8 颗冰块"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"洋葱炒猪肉","time":15,"level":"中等","tags":["肉菜","家常","开源"],"ings":["洋葱","猪肉片","蕃茄酱","麻油"],"steps":["洋葱切片，猪肉，蒜头拍碎，以及混合上述调味料备用","炒锅内倒入 1 大匙食用油（等待 10 秒让油温升高），倒入猪肉","炒至变色后下蒜头炒香盛起备用","原锅下洋葱翻炒 3~4 分钟后加入调味料炒匀","下刚盛起备用的猪肉翻炒至猪肉
