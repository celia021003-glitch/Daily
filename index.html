扯面]","盐","葱","蒜","干辣椒面","食用油","生抽","香醋"],"steps":["扯面的话, 用擀面杖（没有擀面杖,用手也行）上下两边轻压, 两手拽住左侧和右侧两端,轻轻拉开","葱切成葱花，蒜切成蒜末备用","青菜洗净，豆芽洗净备用（如使用）","锅中加入足量清水，大火烧开后加入 1g 盐","放入面条，用筷子轻轻搅动防止粘连，煮至面条浮起后再煮 1-2 分钟","在煮面的最后 1 分钟，放入青菜和豆芽焯水","将煮好的面条和青菜、豆芽捞出，沥干水分后放入碗中","在面条上依次加入生抽、香醋、葱花、蒜末和干辣椒面, 也可放点芝麻"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"雪花酥","time":30,"level":"中等","tags":["甜点","开源"],"ings":["一次性塑料手套","无盐黄油","棉花糖","全脂奶粉","混合坚果","饼干（非夹心型饼干"],"steps":["饼干超过一元硬币大小先切成小块","无盐黄油加入锅中，小火加热至无盐黄油完全融化","棉花糖加入锅中，使用刮刀搅拌，直至棉花糖融化并与无盐黄油均匀融合","20g 奶粉加入锅中，使用刮刀搅拌，奶粉与黄油棉花糖混合物搅拌均匀后立即关火","准备好的所有混合坚果与饼干趁热加入锅中，使用刮刀搅拌","搅拌到温度下降到手可以接触的温度后，戴上一次塑料手套，在锅中搓揉或者双手拿起拉扯，让饼干混合坚果与棉花糖黄油奶粉混合物分散均匀。","将上述步骤混合物压入模具中，边角压实，擀面杖擀平，未满的一边用手尽量压成直边","室温放凉，完全冷却后脱模，按照模具纹路切块，或切成自己喜欢的大小，撒上剩余奶粉，尽量使雪花酥每面都沾上奶粉"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"雷椒皮蛋","time":15,"level":"简单","tags":["素菜","蔬菜","开源"],"ings":["皮蛋","长条青椒（有些叫线椒","葱","蒜","小米辣","食用油","生抽","陈醋"],"steps":["青椒清洗，去除根部，侧面切开，去除内部的子后在案板压平，备用（一定要去除青椒子，否则会在锅里炸开）","葱切成半厘米小段，备用","蒜去皮，切成碎末，备用","皮蛋去皮，备用","小米辣，切成 5-10mm 的小段，备用","热锅，锅内放入 10ml - 20ml 食用油","放入全部青椒，改小火保持锅子温度，煎至青椒变软（可以用筷子试一下，插入即透即可）","关火，将皮蛋和青椒放入小铁盆中"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"青椒土豆炒肉","time":20,"level":"中等","tags":["肉菜","家常","开源","土豆"],"ings":["青椒","土豆","猪肉","葱","姜","蒜","盐","酱油"],"steps":["青椒去除根蒂切小块，土豆去皮切 2mm 薄片，猪肉切 4mm 薄片，葱横纵切 3mm 小段，姜蒜去皮拍散剁碎末；土豆淀粉加入约 15g 水搅拌均匀至水淀粉。","起锅烧油，加热至 7 成热放入猪肉片，缓缓翻滚炒至去肉红色，加入约 3ml 酱油，翻炒肉片均匀上色，放入约 2g 盐。","转 5 成油温，加入葱姜蒜炒 5 秒，然后加入土豆片，转 7 成油温均匀翻炒，加入加入约 5ml 酱油和 2g 盐，炒至土豆断生，表面轻微焦黄。","转 8 成油温加入青椒，大火煸炒出锅气（有白烟冒出），反复均匀翻炒 1 分钟上色，最后在锅周围倒入水淀粉转 4 成火勾芡。","在外观*呈粘稠状态*后关火，盛盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"青椒酿","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["青椒（6-8 个","猪肉（250g","葱","生姜","生抽","老抽","食盐","食用油"],"steps":["猪肉洗净剁成肉馅（或用绞肉机），姜切末，葱切葱花","肉馅中加入姜末、葱花、生抽 15ml、老抽 5ml、食盐 3g，搅拌均匀","可选加入：料酒 10ml、蚝油 10ml、鸡蛋 1 个、淀粉 5g、白胡椒粉 2g、白糖 5g","朝一个方向搅拌肉馅至粘稠上劲，腌制 10 分钟","青椒洗净，去蒂，用筷子小心挖去内部的籽和白筋，保持青椒完整不破","可选在青椒内壁撒干淀粉约 5g，摇晃均匀，帮助肉馅粘附不脱落","将腌好的肉馅用筷子或裱花袋塞入青椒中，尽量填满但不要太紧以防撑破","全部酿好后备用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"韩国麻药鸡蛋","time":20,"level":"简单","tags":["早餐","开源","鸡蛋","鸡"],"ings":["鸡蛋","韩式酱油","日式味淋","白糖","芝麻油","青葱","辣椒"],"steps":["烧一锅开水，水沸腾后放入鸡蛋，**煮 7 分钟**（得到完美的溏心蛋状态）。","煮鸡蛋的期间调制酱汁：将 4 汤匙酱油、4 汤匙清水、2 汤匙味淋、2 汤匙白糖倒入小锅中。","加热酱汁至沸腾，煮开以挥发掉味淋中的酒精味，随后关火放凉备用。","将切好的辣椒圈加入放凉的酱汁中。","将煮好的鸡蛋捞出，放入冰水中冷却后剥去蛋壳。","将剥好的鸡蛋放入调好的酱汁中，表面淋上 5ml 芝麻油并撒上葱花。","放入冰箱**冷藏等待 1 - 2 小时**，让鸡蛋充分入味。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"韩式拌饭","time":45,"level":"中等","tags":["主食","开源","饭"],"ings":["米饭","鸡蛋","豆芽","蘑菇","胡萝卜","西葫芦","韩式辣酱","雪碧"],"steps":["蔬菜清洗 切丝 放锅中翻炒 食材变软 便可称出","煮水 等沸腾时 焯牛肉卷 只需煮熟 大概三分钟即可捞出","煎[溏心蛋](../../breakfast/溏心蛋.md)","将[米饭](../../staple/米饭/电饭煲蒸米饭.md)放在一个碗里 然后倒扣在大碗","将准备好的蔬菜和肉卷依次绕圈放在米饭上面 将煎蛋放中间","备酱汁","将备好的酱汁倒在摆好盘的碗中"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"韭菜盒子","time":20,"level":"中等","tags":["主食","开源"],"ings":["韭菜","虾仁","鸡蛋","香油","盐","面粉"],"steps":["将面粉放入大碗中，加入水，搅拌成光滑的面团，静置 30 分钟。","韭菜洗净切碎，加入打散的鸡蛋、5g 盐，搅拌均匀。","将面团分成小剂子，擀成薄圆饼，包入韭菜、虾仁、鸡蛋液。","热锅，加入食用油，放入包好的韭菜盒子，煎至两面金黄，约 3-4 分钟。","盛盘，稍凉后即可享用。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"香干肉丝","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["猪里脊","香干","盐","生抽","淀粉","大蒜","青椒","鸡精"],"steps":["`肉丝`（没有肉丝，自己切）用生抽(3ml)，生粉混合均匀待用。","将`青椒`洗净，再用`滚刀手法`切好备用。","`大蒜`横切成片，`香干`切丝。","`淀粉`与水(10ml)混合，搅拌均匀。","干净锅 15ml 油，不用等油热就倒入肉丝慢慢划散，肉丝熟了，立马捞出，留油到锅里。","将蒜片和香干放入锅中，加入 2ml 生抽，翻炒均匀。","2-3 分钟，看火大小，将青椒丝放入锅中混合，翻炒。","1 分钟后，放入肉丝混合。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"香干芹菜炒肉","time":30,"level":"中等","tags":["肉菜","家常","开源"],"ings":["豆干","香芹/芹菜","猪肉","大蒜","辣椒","花椒","盐","鸡精"],"steps":["芹菜去叶切段、切成不超过 4cm 的条状，备用","香干切条，宽约小拇指，备用","蒜头切片或者剁成蒜泥都行，备用","辣椒切圈或者斜切成条都行，备用","热锅，锅内放入 10ml - 15ml 食用油。等待 10 秒让油温升高","放入花椒、大蒜爆香（可以吃姜的也可以额外放入一些姜片/姜丝）","加入猪肉炒至变色，再加入 8ml 老抽上色翻炒均匀（有豆瓣酱的，可以放入 3ml 豆瓣酱一起翻炒）","加入香干翻炒均匀（大约 2 分钟）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"香煎五花肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["五花肉条（推荐长宽高为","生菜","酱油"],"steps":["将五花肉条沿长边切片，每片厚 1mm-1.5mm，备用","将切好的五花肉放置碗中，依次加入 8g 酱油，1g 盐，1g 味精，10g 料酒，两片姜，两朵拍扁的大蒜腌制 10 分钟","将生菜叶直接用手扒下来，洗干净，备用","热锅，倒入 5ml 食用油。油轻微冒烟后下入五花肉。单面煎制焦黄色后翻面，另一边同理。","五花肉出锅后，装盘。","将豆瓣酱抹到菜叶上，卷着五花肉即可食用"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"香煎翘嘴鱼","time":20,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["翘嘴鱼（肉食性鱼类","姜","葱","蒜","青椒","香菜","老抽","白糖"],"steps":["鱼开背杀好（让卖鱼的杀好，千万不要剖腹杀鱼，切记是开背），清洗干净","鱼表面用盐涂抹均匀，倒入料酒约 80ml,姜末 20g，放入冰箱保鲜层进行腌制 1-2 天","取出腌制好的鱼，用绳挂起晾晒至半干（约 1-2 天，具体时间需结合气温与阳光）","食用前请将鱼用清水清洗，沥干水分（防止水遇油飞溅）","开大火将锅烧热，迅速改小火，锅中放油，尽量保持整个锅表面有油，将鱼沿锅边划入锅内（先煎鱼背面）","鱼入锅后（和翻面后），不要着急移动鱼的位置（此时容易破皮），煎约 30 秒后，尝试晃动锅","背面煎约 1 分钟后，翻面煎约 1-2 分钟，煎至两面金黄","等两面都煎好时，把鱼推向锅边一点，留点空间放入豆瓣酱炒香味，放入姜蒜，"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"香菇滑鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["大鸡腿","干香菇","姜","葱","蒜"],"steps":["温水泡发干香菇","姜切小块，葱切段，蒜对半切小粒","鸡腿去骨（不去骨也可，只是略影响程序员吃饭的效率而已），切成小块","泡发的香菇一分为四，香菇水留着备用","鸡腿肉焯水 1 分钟，去除血沫和杂质","鸡腿肉中加料酒 15ml、生抽 15ml、盐 1.5g、老抽 15ml，抓匀","油温 3 成，下入鸡腿肉煸炒，等鸡腿肉金黄后盛出备用","锅留底油，下入葱、姜、蒜炒香，香菇入锅，大火翻匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"香辣鸡爪煲","time":45,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡爪","葱","姜","料酒","香叶","八角","生抽","老抽"],"steps":["给鸡爪剪去指甲。如果买的鸡爪只有脚掌部分，对半切开即可。 如果是整只鸡爪，需要去骨。清水洗干净。","鸡爪冷水下锅，葱姜料酒焯水，水开，撇去浮沫。","加入香叶、八角、生抽、老抽，盖盖小火慢煮三十分钟。","捞出鸡爪，留一碗鸡汤备用。","起锅烧油，用小火炒香姜末、蒜末、小米椒，能吃辣再放点辣椒面。加入生抽、老抽、蚝油、五香粉、盐，炒出酱香味。","放入鸡爪，放一点盐调味，翻炒一两分钟，再倒入鸡汤，边炒边搅动。","放入鸡精提鲜，撒入葱段搅拌均匀即可出锅。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"魔芋蛋糕","time":20,"level":"中等","tags":["甜点","开源"],"ings":["电动打蛋器","烘焙纸","隔热手套","[可选] 分蛋器","鸡蛋","赤藓糖醇","可可粉","魔芋粉"],"steps":["在准备蛋糕糊之前，可以开始预热烤箱至 350 ℉( 150 ℃)以节省时间","从冰箱中取出新鲜的鸡蛋","准备两个容器并擦干，分别盛放蛋清与蛋黄","对盛放蛋清的容器，可稍有水珠，但**不能有任何油**；盛放蛋黄的容器不能有水珠","打蛋，手工或利用分蛋器，将蛋清与蛋黄分离到两个容器中。","分离过程中蛋黄不能破碎，**蛋清中不能混有任何蛋黄**，否则会严重影响打发。（白色系带可进入蛋清，不影响）","（注意，不使用厨房机的情况下，盛放蛋清的容器也是打蛋的容器，为避免溢出，加入全部蛋清后不要超过容器的 **1/8**）","蛋清中加入 1g 塔塔粉"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"鱼香肉丝","time":20,"level":"中等","tags":["肉菜","家常","开源","鱼"],"ings":["里脊肉","胡萝卜","青椒","木耳","生抽","料酒","蛋清","淀粉"],"steps":["制作`腌料`：将下列原料混合：","制作`香汁`：将下列原料混合：","用`腌料`腌制里脊肉 15-30 分钟。注意将肉抓匀。","干木耳泡 4 个小时，洗净，切成小块。","青椒洗净，去蒂，切成丝。","胡萝卜洗净，切成丝，将胡萝卜丝[焯水](../../tips/learn/学习焯水.md)。","姜、蒜切沫。","葱切成 5mm 的小段。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"鱼香茄子","time":30,"level":"中等","tags":["肉菜","家常","开源","鱼"],"ings":["茄子","肉末","盐","糖","味精","生抽","老抽","醋"],"steps":["将茄子切成条。","将肉切成肉沫，葱姜蒜切碎、小米椒切丁。","调鱼香汁：碗中放入盐、味精、糖、生抽、老抽、醋、水淀粉搅拌均匀。","锅中留 15-30ml 油，倒入肉沫炒至颜色变白就盛出来。","锅中倒入 15-30ml 油，放入豆瓣酱、葱白、姜、蒜炒香，然后倒入肉沫翻炒均匀。","加入 80-150ml 清水（水面预计茄子八成高度为准），倒入茄子、倒入料汁，爆炒入味收汁。最后放入葱翻炒均匀，就可以起锅了。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"鲜肉烧卖","time":20,"level":"中等","tags":["主食","开源"],"ings":["烧卖皮","猪肉末（肥瘦","生姜末","葱末","生抽","料酒","盐","糖"],"steps":["（低脂版本）取 10 mL 冷水，加入复配食品增稠剂，调成糊糊","（低脂版本）加入 25 mL 开水，搅拌至半透明凝胶","（低脂版本）冷却后混入 280 g 纯瘦肉糜 + 15 g 融化猪油（或鸡油）","将猪肉末与生姜末、葱末混合，加入酱油、料酒、盐、糖、白胡椒粉，顺一个方向搅拌上劲","如果使用浓汤宝，取浓汤宝块加入 15 mL 热水混合，搅拌至乳浊液完全分散，再加入 15 mL 常温水","慢慢加入水或高汤，继续搅拌，直到馅料吸收水分，变得粘稠，如果觉得肉馅太稠，补 5 mL 水继续搅拌","加入可选配料（冬笋、皮冻、香菇），最后淋上芝麻油，拌匀。冷藏 30 分钟，让味道融合","取一张烧卖皮，放上约 20-25 g 馅料（别太贪心，否则包不住）"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"鲣鱼海苔玉米饭","time":5,"level":"简单","tags":["主食","开源","鱼","饭"],"ings":["必备"],"steps":["盛好米饭，放入玉米粒拌好","放入鲣鱼海苔碎"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"鲤鱼炖白菜","time":40,"level":"中等","tags":["水产","海鲜","开源","鱼"],"ings":["食用油","姜","蒜","鲤鱼","白菜心/娃娃菜","盐","老抽","生抽"],"steps":["鲤鱼清洗干净，改刀（在鱼身上多划几个伤口，方便入味）","娃娃菜清洗干净放入盘中备用","锅中加油，等油热放入“少盐” “姜” “蒜” “郫县豆瓣酱” “桂皮” “八角” 炒出香味","把鱼放锅里煎（3 分钟）每（30 秒）需要翻面","加入“水”（水量尽量和鱼平齐，可以少一点点） 放入 “生抽” “老抽” “娃娃菜”","大火炖 15-20 分钟，汤汁快干时添加 “盐” 即可出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"鳊鱼炖豆腐","time":40,"level":"中等","tags":["水产","海鲜","开源","豆腐","鱼"],"ings":["鳊鱼","老豆腐","姜","葱","蒜","老抽","桂皮","冰糖"],"steps":["鳊鱼改刀,放上姜片和料酒腌制 5-10 分钟","老豆腐切块后放入水中备用","锅中加油，可以放点盐在锅里，防止煎鱼的时候粘锅，把腌制的鱼用厨房纸擦干水分，把鱼放到锅中，两面都煎一下","等两面都煎好时，把鱼推向锅边一点，留点空间放入葱姜蒜，干辣椒，香叶，八角炒出味道","炒出佐料香味后，加入料酒，生抽，老抽，冰糖，桂皮，倒入热水，水量和鱼平齐或者少点","大火烧开后，放入老豆腐，豆腐贴在锅边，加入食盐，转小火","小火烧 10-15 分钟，然后大火收点汁，即可出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-breakfast-md","name":"鸡蛋三明治","time":20,"level":"简单","tags":["早餐","开源","鸡蛋","鸡"],"ings":["鸡蛋","吐司","培根","黄油","蛋黄酱","盐","黑胡椒"],"steps":["吐司切去四边，备用","鸡蛋煮熟，捣碎","混合鸡蛋、蛋黄酱、盐、黑胡椒","锅中加入黄油，煎熟培根","组装吐司，在两片吐司间加入制作好的鸡蛋酱及培根","四边形吐司切成三角形装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"鸡蛋火腿炒黄瓜","time":20,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["黄瓜","鸡蛋","火腿肠","盐","生抽","红尖椒"],"steps":["黄瓜洗净，切半圆形片，备用","火腿切半圆形片，备用","红尖椒（可选）切碎，备用","将鸡蛋打入碗中，搅匀，即为 `鸡蛋液`","热锅里倒 5ml 食用油","油热后转小火，倒入打散的`鸡蛋液`，用筷子划散，翻炒至鸡蛋结为固体且颜色微微发黄，即为 `半熟鸡蛋`，盛出备用","**不用洗锅**，往锅内倒入 5ml 食用油，倒入黄瓜片大火**翻炒 1 分钟**","把 `半熟鸡蛋` 倒入锅中，调入 2g 盐、3ml 生抽，立刻倒入火腿片和辣椒碎（可选）翻炒均匀"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"鸡蛋羹","time":15,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["鸡蛋","食用盐","香油","生抽 / 味极鲜","白醋","藤椒油"],"steps":["两个鸡蛋放入碗中打散","加入食用盐 3g","加入 2ml 白醋，去除鸡蛋的腥味（可选）","向碗中加入鸡蛋体积 1-1.5 倍的 70 度纯净水，并且搅拌均匀","过滤蛋液，去掉蛋液中的浮沫（可选，不过滤蒸出来的蛋会有气泡导致不好看）","向任意一口锅中加入 300-500ml 清水，水烧开后，放入盛有鸡蛋液的碗","蒸煮步骤（二选一）","开**中火**蒸**10 分钟**, 10 分钟之后关火再闷上**5 分钟**。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-vegetable-dish-md","name":"鸡蛋花","time":5,"level":"简单","tags":["素菜","蔬菜","开源","鸡蛋","鸡"],"ings":["鸡蛋","白糖 （可选","食盐 （可选","搅拌器"],"steps":["将鸡蛋打入碗中。","使用筷子或搅拌器，顺着一个方向搅打蛋液，直至蛋清与蛋黄完全混合均匀，颜色一致。（此过程约需 1 - 2 分钟）","将糖或盐等调味料加入蛋液中，略微搅匀。","准备刚烧开的、100 ℃ 的沸水。","**一边用筷子快速搅拌碗中的蛋液，一边将沸水以细流状冲入蛋液中**。确保沸水与蛋液充分混合。","持续搅拌片刻，直至蛋液被完全烫熟，形成均匀的淡黄色蛋花。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"鹰嘴豆炸饼","time":20,"level":"中等","tags":["主食","开源"],"ings":["鹰嘴豆","中筋面粉","酸奶","洋葱","番茄","生姜","大蒜","青辣椒"],"steps":["将干鹰嘴豆用清水浸泡过夜（至少 8 小时），浸泡后体积会膨胀至约两倍","将浸泡好的鹰嘴豆沥干水分","放入锅中，加入 500ml 水和 1 个红茶包（用于上色）","大火煮沸后转中火，**煮 25-30 分钟**，直至*鹰嘴豆用手指可以轻松压碎*","取出红茶包，保留煮豆的汤水，备用","在炒锅中倒入 30ml 食用油，中火加热","放入切碎的洋葱，翻炒至*金棕色*（约 6-8 分钟）","加入磨碎的生姜和大蒜，翻炒 1 分钟"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"麻婆豆腐","time":40,"level":"中等","tags":["肉菜","家常","开源","豆腐"],"ings":["内脂豆腐","咸鸭蛋（推荐留夫鸭的","五花肉","大蒜","生姜","小米椒","香辣酱","花椒"],"steps":["大蒜和生姜切碎，备用","小米辣切成辣椒圈，备用","五花肉切成肉糜（本来就是买的肉糜的跳过）","肉糜中加入一半的食盐和味极鲜酱油，搅拌均匀，备用","鸭蛋用菜刀竖着对半切开（注意安全），去除蛋黄（一定要去除，不然会腥），剩下的蛋白捣碎成大约 2 mm * 2 mm 大小，不用太碎，备用","打开豆腐包装，用水果刀将在盒子中的豆腐划成大约 2.5 cm * 3 cm 大小，备用","热锅，锅内放入 10ml - 15ml 食用油。等待 10 秒让油温升高","调成小火，放入大蒜、生姜、辣椒圈、花椒、咸鸭蛋、蒜蓉辣酱翻炒 20 秒，炒出香味"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"麻油拌面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["麻油","胡椒粉","老抽","盐"],"steps":["将水倒入锅中并煮沸 （喜欢吃 q 弹面的同学，可在水里加入 30 克盐，用盐水煮出来的面会比较 q 弹）","将快熟面放入锅中 3 分钟（也可参考当下品牌快熟面的烹饪时间）","当面开始散了可以开始搅拌，让面受热均匀","将水滤干把面倒入碗中","按照上面的计量放入麻油，老抽，胡椒粉，生抽（可选）","筷子搅拌均匀","一道简单即省钱的懒人麻油拌面就完成啦"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-staple-md","name":"麻辣减脂荞麦面","time":20,"level":"简单","tags":["主食","开源","面"],"ings":["调味料","原料","洗菜盆、直径"],"steps":["娃娃菜、生菜洗好，备用","锅内倒入 500ml 水，开大火，将荞麦面和娃娃菜放进去，等待水沸腾","水沸腾后，转小火，加入火锅底料、花生酱、牛奶、生抽、辣椒油，水开后煮 5 分钟","加入生菜，再煮 2 分钟","加入醋、花椒油，关火，直接端着小锅开吃。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"麻辣香锅","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["青菜","无骨肉","干豆腐","北京麻辣方便面","干辣椒"],"steps":["烧开一锅水（水量能没过第 2-4 步中的食材即可）。","在开水中放入青菜，焯 5 分钟后盛出备用。","在开水中放入无骨肉，焯 4 分钟后盛出备用。","在开水中放入北京麻辣方便面，煮 2 分钟后盛出备用。","倒出开水，擦干锅具，放入 105 克食用油，大火加热 30 秒。","放入麻辣香锅调料，翻炒 20 秒。","放入干辣椒，翻炒 10 秒。","放入焯过的青菜，改中火，翻炒 3 分钟。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-aquatic-md","name":"黄油煎虾","time":20,"level":"中等","tags":["水产","海鲜","开源","虾"],"ings":["黄油（推荐安佳","黑胡椒粒","生抽","盐","白糖","米酒"],"steps":["鲜虾摘除头部，顺带扯出虾线（这步处理不好可在下一步开背时取出虾线），使用剪刀剪开或菜刀片开虾背，沥干水分备用","调制酱汁：小碗放入上述量的全部生抽、米酒、白糖、盐搅匀备用","中大火热锅，热锅内放入食用油，等待 10 秒让油温升高","虾全部放入锅中，开始瓶磨黑胡椒，均匀地撒在虾上翻炒","虾变色后加入黄油，黄油完全融化后倒入调制酱汁，继续翻炒","大火翻炒 15 秒收汁即可装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"黄油鸡","time":20,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡腿肉","酸奶","黄油","淡奶油","番茄","洋葱","生姜","大蒜"],"steps":["在大碗中混合酸奶、生姜泥、大蒜泥、红辣椒粉、姜黄粉、盐、柠檬汁","放入鸡肉块，充分裹上腌料","盖保鲜膜，冷藏腌制**至少 1 小时**","在平底锅中倒入 15ml 食用油，大火加热","将腌好的鸡肉块放入锅中（不要倒入腌料汁）","大火煎至*两面焦黄*（每面约 3 分钟），鸡肉不需要完全煮熟","盛出备用","在锅中放入番茄块、洋葱块、腰果、生姜、大蒜和水 100ml"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"黄焖鸡","time":40,"level":"中等","tags":["肉菜","家常","开源","鸡"],"ings":["鸡腿","香菇","青椒","生姜片","干辣椒","盐","料酒","白胡椒粉"],"steps":["鸡腿洗净，剁成**4cm**大小的块","生姜切片、干辣椒切成**小圈**","香菇切片，青椒切成细长的**马蹄状**，若为干香菇，洗净灰尘后泡一晚上并留香菇水备用","若有土豆，切为与鸡肉大小类似的**滚刀块**","炒糖色：锅里倒入底油，冷油时放入白糖（**有一定难度，新手可跳至鸡肉炒制并使用老抽替代**）","小火慢慢加热，待油温逐渐升高，白糖开始融化并变成较深的棕色（期间要不断搅拌，防止糊锅）","迅速倒入鸡块，转大火，快速翻炒！烹入料酒，继续翻炒片刻","将生姜片和干辣椒倒入"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"黄瓜炒肉","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["黄瓜","猪瘦肉","食用油","生抽","盐","蒜","小米辣"],"steps":["将猪瘦肉切片，放入碗中，倒入食用油 10 克，生抽，搅拌均匀，腌制 10 分钟","将黄瓜切去 5 厘米的头尾，剩余部分斜着切成 0.5 厘米的薄片","将黄瓜倒入碗中，撒上盐 8 克，搅拌均匀，腌制 5 分钟","将蒜瓣去皮，压扁，切成蒜末备用","将小米辣去丁切分成均匀 0.5 厘米的段状","热锅，倒油 40 克，等油温到冒烟，放入蒜蓉小米辣翻炒 5 次","放入腌制好的猪瘦肉，翻炒至肉熟变色","放入黄瓜，加入盐 2 克，大火翻炒均匀半分钟，出锅"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-soup-md","name":"黄瓜皮蛋汤","time":20,"level":"简单","tags":["汤","开源"],"ings":["黄瓜","皮蛋","大蒜","小葱","食用油","盐","鸡精"],"steps":["黄瓜洗净，切成 0.5-1.2 mm 厚的薄片","葱洗净切成末，蒜用刀拍几下去皮，对半切一下","皮蛋剥去壳，然后每个切成 6-8 份。锅里倒入油，放入切好的皮蛋和大蒜","小火炒至皮蛋和大蒜表面有些焦黄，加入水，转大火烧开","放入黄瓜片。水再次沸腾以后立马关火，放入盐、鸡精调味即可出锅","装入碗中，再撒上葱花即可"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"黑椒牛柳","time":20,"level":"中等","tags":["肉菜","家常","开源"],"ings":["牛肉","洋葱","菜椒","淀粉","黑胡椒","黑椒","盐","花生油"],"steps":["将牛肉切条，长度最好控制在 8 厘米以下，厚度约 5-10 毫米，宽度约 1 厘米（要求不严格）","利用腌料腌制牛肉，混合均匀后静置，用量与时间请参照商品说明，可以延长不能缩短。","如果使用液态腌料，可以在腌制结束前三分钟撒一层黑胡椒粉，然后再加入淀粉，再次混合均匀后静置 20 分钟。","开火，热锅，加入花生油。","当能看到锅里的油冒出一丝烟时，放入牛肉，翻炒。","开中火偏大，翻炒 2 分钟至牛肉外表变色（即不出现明显血色，有血色部分说明翻炒不到位）（此处应小心油滴溅射）。","放入洋葱和菜椒，翻炒 2 分钟。","加入盐，再次撒一份黑胡椒粉，翻炒 30 秒，搅拌均匀。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-meat-dish-md","name":"黔式腊肠娃娃菜","time":15,"level":"简单","tags":["肉菜","家常","开源"],"ings":["黔式腊肠","娃娃菜"],"steps":["锅内放入 750ml 水，开火加热至沸腾","放入腊肠，计时 13 分钟","放入娃娃菜，计时 2 分钟","关火，夹出腊肠及娃娃菜","娃娃菜切段、腊肠切片，装盘"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"},{"id":"htc-howtocook-master-dishes-dessert-md","name":"龟苓膏","time":20,"level":"简单","tags":["甜点","开源"],"ings":["龟苓膏粉","冷水","开水","白砂糖","搅拌工具"],"steps":["在锅中倒入龟苓膏粉 25 克与冷水 120 毫升，充分搅拌至无颗粒感。","在另一个容器中加入白砂糖 100 克，倒入沸水 500 毫升，搅拌至糖完全溶解。","将糖水缓慢倒入龟苓膏粉液中，立即搅拌均匀，避免结块。","将混合液体放入锅中，加热时保持中小火，并持续搅拌以防粘锅。","加热至液体变粘稠并开始冒小泡，即可关火。","快速将液体倒入模具中，自然冷却凝固。建议冷藏 1~2 小时后食用，口感更佳。"],"tip":"来自开源项目 HowToCook，已整理为本地菜谱。","source":"open"}];

function recipeAll(){return [...LOCAL_RECIPES,...MORE_RECIPES,...HOWTOCOOK_RECIPES,...AUTO_RECIPES,...(S.recipeCustom||[])]}
function normFoodName(s){return String(s||'').toLowerCase().replace(/\s+/g,'').trim()}
function foodTokens(){
  const own=(S.pantry||[]).map(x=>x.name);
  const want=(S.wishlist||[]).map(x=>x.name);
  const wish=rWish.split(/[，,、;；\s]+/).filter(Boolean);
  return {own,want:[...want,...wish],all:[...own,...want,...wish].map(normFoodName).filter(Boolean)}
}
function recipeScore(r,tokens,q){
  const query=normFoodName(q);let score=0,matched=0;
  for(const ing of r.ings){const ni=normFoodName(ing);if(tokens.all.some(t=>t&&(ni.includes(t)||t.includes(ni)))){score+=3;matched++}}
  if(query){const hay=normFoodName([r.name,...r.tags,...r.ings].join(''));if(hay.includes(query))score+=8;else score-=4}
  if(r.tags.includes('快手'))score+=1;
  const missing=r.ings.filter(x=>!tokens.all.some(t=>normFoodName(x).includes(t)||t.includes(normFoodName(x))));
  return {...r,score,matched,missing}
}

function catEmoji(n){return (CATS.find(x=>x[0]===n)||['','✨'])[1]}

// 饼图（SVG donut）
function donutChart(byCat,total){
  const entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!entries.length||total<=0)return '';
  const palette=[C.p,C.g,C.w,'#9A8CC4','#D9A36B','#7FA8A0','#C98AA8','#A0A0B0'];
  const R=52,CC=64,SW=22;const circ=2*Math.PI*R;
  let off=0;const segs=entries.map(([n,v],i)=>{
    const frac=v/total;const len=frac*circ;const col=palette[i%palette.length];
    const seg=`<circle cx="${CC}" cy="${CC}" r="${R}" fill="none" stroke="${col}" stroke-width="${SW}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${CC} ${CC})"/>`;
    off+=len;return seg;
  }).join('');
  const legend=entries.map(([n,v],i)=>{const col=palette[i%palette.length];const pct=Math.round(v/total*100);return`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin:3px 0">
    <span style="width:10px;height:10px;border-radius:3px;background:${col};flex-shrink:0"></span>
    <span style="flex:1">${catEmoji(n)} ${e(n)}</span>
    <span style="color:${C.muted}">${pct}%</span>
  </div>`}).join('');
  return`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <svg width="128" height="128" viewBox="0 0 128 128" style="flex-shrink:0">
      ${segs}
      <text x="64" y="60" text-anchor="middle" font-size="11" fill="${C.muted}">合计</text>
      <text x="64" y="78" text-anchor="middle" font-size="15" font-weight="600" fill="${C.ink}">${(S.cur||'$')}${total.toFixed(0)}</text>
    </svg>
    <div style="flex:1;min-width:140px">${legend}</div>
  </div>`
}

  const calcBtns=['7','8','9','÷','4','5','6','×','1','2','3','−','.','0','⌫','+','C','='];
  const calcHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0 10px">
    ${calcBtns.map(k=>`<button data-a="calcKey" data-v="${k}" style="height:36px;border-radius:10px;border:1px solid ${C.line};background:${k==='='?C.p:k==='C'?C.wS:C.card};color:${k==='='?'#fff':k==='C'?C.w:C.ink};font-size:15px;cursor:pointer">${k}</button>`).join('')}
  </div>`;
  const eImgPrev=eImg?`<div style="position:relative;display:inline-block;margin-top:8px"><img src="${eImg}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;display:block"><button data-a="clearEImg" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:12px;cursor:pointer">×</button></div>`:'';
  const addCard=card('记一笔',`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="${IS('flex:1;display:flex;align-items:center;gap:4px')}">
        <span style="color:${C.muted};flex-shrink:0">${cur}</span>
        <input id="eAmt" value="${e(eAmt)}" inputmode="decimal" placeholder="金额，可输入 12+8÷2" style="border:none;outline:none;background:none;flex:1;font-size:15px;color:${C.ink};width:100%">
      </div>
      <input id="eDate" type="date" value="${e(eDate)}" style="${IS('flex:0 0 130px')}">
    </div>
    ${calcHTML}
    <div style="font-size:11px;color:${C.faint};margin:-2px 0 10px">支持表达式：18+6、120÷2，点 = 自动算出。</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:6px">分类</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${cPills}</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:6px">标签（可选）</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${tagPills}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
      <input id="eNote" value="${e(eNote)}" placeholder="备注（可选）" style="${IS()}">
      <label style="${BS(C.g,'cursor:pointer;flex-shrink:0')}">📎<input type="file" accept="image/*" id="eImgBtn" style="display:none"></label>
    </div>
    ${eImgPrev}
    <button data-a="addE" style="${BS(C.p,'width:100%;margin-top:10px')}">记账</button>
  `);

  const monExp=S.expenses.filter(x=>x.date.slice(0,7)===eMon);
  const total=monExp.reduce((s,x)=>s+x.amount,0);
  const byCat={};monExp.forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount});
  const budget=Number((S.monthlyBudgets||{})[eMon])||0;
  const left=budget-total;
  const pct=budget>0?Math.min(100,Math.round(total/budget*100)):0;
  const budgetTone=budget<=0?C.faint:left<0?C.w:left<budget*.2?C.w:C.g;
  const budgetBg=budget<=0?C.pS:left<0?C.wS:left<budget*.2?C.wS:C.gS;
  const bVal=budgetIn!==''?budgetIn:(budget?String(budget):'');
  const budgetCard=card('本月预算',`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <div style="${IS('flex:1;display:flex;align-items:center;gap:4px')}">
        <span style="color:${C.muted};flex-shrink:0">${cur}</span>
        <input id="budgetIn" value="${e(bVal)}" inputmode="decimal" placeholder="设置 ${e(eMon.replace('-','年'))}月预算" style="border:none;outline:none;background:none;flex:1;font-size:15px;color:${C.ink};width:100%">
      </div>
      <button data-a="saveBudget" style="${BS(C.p)}">保存</button>
      ${budget?`<button data-a="clearBudget" style="${BS(C.line,'color:'+C.muted)}">清除</button>`:''}
    </div>
    ${budget?`<div style="background:${budgetBg};border-radius:18px;padding:14px">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-end">
        <div><div style="font-size:12px;color:${C.muted}">还剩</div><div style="font-family:${SR};font-size:28px;font-weight:700;color:${budgetTone}">${left>=0?cur+left.toFixed(2):'超 '+cur+Math.abs(left).toFixed(2)}</div></div>
        <div style="text-align:right;font-size:12px;color:${C.muted}">已用 ${cur}${total.toFixed(2)} / ${cur}${budget.toFixed(2)}<br>${Math.round(total/budget*100)}%</div>
      </div>
      <div style="height:10px;border-radius:999px;background:rgba(255,255,255,.75);overflow:hidden;margin-top:12px">
        <div style="height:100%;width:${pct}%;background:${budgetTone};border-radius:999px"></div>
      </div>
      <div style="font-size:12px;color:${C.muted};line-height:1.65;margin-top:8px">${left<0?'已经超过预算，接下来可以收紧非必要开销。':left<budget*.2?'预算快到底了，后面几天稍微看紧一点。':'目前还在预算内。'}</div>
    </div>`:`<div style="background:${C.pS};border-radius:16px;padding:12px;color:${C.muted};font-size:13px;line-height:1.7">给这个月设一个预算，之后每记一笔都会自动显示剩余金额。</div>`}
  `);
  const summCard=card('',`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button data-a="prevMon" style="width:34px;height:34px;border-radius:10px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:20px;cursor:pointer;line-height:1">‹</button>
      <div style="text-align:center">
        <div style="font-size:12px;color:${C.muted}">${e(eMon.replace('-','年')+'月')} 合计</div>
        <div style="font-family:${SR};font-size:28px;font-weight:600;color:${C.p}">${cur}${total.toFixed(2)}</div>
      </div>
      <button data-a="nextMon" ${eMon>=today().slice(0,7)?'disabled':''} style="width:34px;height:34px;border-radius:10px;border:1px solid ${C.line};background:${C.card};color:${eMon>=today().slice(0,7)?C.faint:C.ink};font-size:20px;cursor:pointer;line-height:1">›</button>
    </div>
    ${Object.keys(byCat).length?donutChart(byCat,total):empty('这个月还没有账单。')}
  `);

  // 搜索 + 按日折叠明细
  let list=monExp;
  const kw=(eSearch||'').trim();
  if(kw)list=list.filter(x=>(x.note||'').includes(kw)||x.cat.includes(kw)||(x.tag||'').includes(kw));
  // 按日期分组
  const byDay={};list.forEach(x=>{(byDay[x.date]=byDay[x.date]||[]).push(x)});
  const days=Object.keys(byDay).sort().reverse();
  const dayBlocks=days.map(day=>{
    const items=byDay[day];const dayTotal=items.reduce((s,x)=>s+x.amount,0);
    const collapsed=billCollapse[day];
    const rows=collapsed?'':items.map(x=>`<div data-a="editE" data-id="${x.id}" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid ${C.line};cursor:pointer">
      ${x.img?`<img data-lid="${e(x.img)}" src="${IC[x.img]||''}" style="width:34px;height:34px;border-radius:8px;object-fit:cover;flex-shrink:0">`:`<span style="font-size:18px;width:34px;text-align:center">${catEmoji(x.cat)}</span>`}
      <div style="flex:1;min-width:0"><div style="font-size:14px">${e(x.cat)}${x.note?' · '+e(x.note):''}${x.tag?` <span style="font-size:11px;color:${C.g};background:${C.gS};padding:1px 6px;border-radius:5px">#${e(x.tag)}</span>`:''}</div></div>
      <span style="font-size:15px;font-weight:600;flex-shrink:0">${cur}${x.amount.toFixed(2)}</span>
    </div>`).join('');
    return`<div style="margin-bottom:6px">
      <div data-a="toggleDay" data-id="${day}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer">
        <span style="font-size:13px;color:${C.muted};font-weight:600">${collapsed?'▸':'▾'} ${day.slice(5)} · ${items.length}笔</span>
        <span style="font-size:13px;color:${C.p};font-weight:600">${cur}${dayTotal.toFixed(2)}</span>
      </div>
      ${rows}
    </div>`
  }).join('');
  const detailCard=monExp.length?card('明细 · 点一笔可编辑',`
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="eSearch" value="${e(eSearch)}" placeholder="🔍 搜索备注、分类、标签…" style="${IS()}">
      <button data-a="refreshBills" style="${BS(C.p)}">筛选</button>
    </div>
    ${dayBlocks||empty('没有匹配的记录。')}
  `):'';

  return addCard+budgetCard+summCard+detailCard
}

// ═══════════════════════ TAB: LIST ═══════════════════════
function renderList(){
  function dueMinutes(t){const m=String(t||'').match(/^(\d{2}):(\d{2})$/);return m?Number(m[1])*60+Number(m[2]):null}
  function dueInfo(due,dueTime){
    if(!due)return {txt:'未设截止',tone:C.faint,bg:C.pS,rank:99999};
    const left=diffD(today(),due);
    const mins=dueMinutes(dueTime), now=new Date(), nowM=now.getHours()*60+now.getMinutes();
    const timeTxt=mins!=null?' '+dueTime:'';
    const rank=left+(mins!=null?mins/1440:0);
    if(left<0)return {txt:'逾期 '+Math.abs(left)+' 天'+timeTxt,tone:C.w,bg:C.wS,rank};
    if(left===0&&mins!=null&&mins<nowM)return {txt:'已过 '+dueTime,tone:C.w,bg:C.wS,rank:-0.5};
    if(left===0)return {txt:dueTime?'今天 '+dueTime+' 截止':'今天截止',tone:C.w,bg:C.wS,rank};
    if(left===1)return {txt:'明天'+timeTxt,tone:C.g,bg:C.gS,rank};
    return {txt:'还剩 '+left+' 天'+timeTxt,tone:left<=3?C.w:C.g,bg:left<=3?C.wS:C.gS,rank}
  }
  function visibleItems(items){
    let arr=[...(items||[])];
    const filter=S.taskFilter||'all';
    if(filter==='important')arr=arr.filter(x=>x.important&&!x.done);
    else if(filter==='due')arr=arr.filter(x=>x.due&&!x.done);
    else if(filter==='open')arr=arr.filter(x=>!x.done);
    if(!dragOn){
      const sort=S.taskSort||'due';
      arr.sort((a,b)=>{
        if(sort==='important')return Number(b.important)-Number(a.important)||dueInfo(a.due,a.dueTime).rank-dueInfo(b.due,b.dueTime).rank||a.id-b.id;
        if(sort==='created')return a.id-b.id;
        return dueInfo(a.due,a.dueTime).rank-dueInfo(b.due,b.dueTime).rank||Number(b.important)-Number(a.important)||a.id-b.id
      })
    }
    return arr
  }
  const allTasks=S.lists.flatMap(l=>(l.items||[]).map(it=>({...it,listId:l.id,listTitle:l.title,listIcon:l.icon||'📝'})));
  const urgent=allTasks.filter(x=>!x.done&&(x.important||x.due)).sort((a,b)=>Number(b.important)-Number(a.important)||dueInfo(a.due,a.dueTime).rank-dueInfo(b.due,b.dueTime).rank).slice(0,6);
  const reminder=urgent.length?card('提醒小纸条',`
    ${urgent.map(x=>{const d=dueInfo(x.due,x.dueTime);return`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid ${C.line}">
      <span style="font-size:18px">${x.important?'⭐':x.listIcon}</span>
      <div style="flex:1;min-width:0"><div style="font-size:14px;color:${C.ink};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(x.text)}</div>
      <div style="font-size:11px;color:${C.faint};margin-top:2px">${e(x.listTitle)}</div></div>
      <span style="font-size:11px;background:${d.bg};color:${d.tone};padding:4px 8px;border-radius:999px;white-space:nowrap">${e(d.txt)}</span>
    </div>`}).join('')}
  `):'';
  const iconPick=LIST_ICONS.map(ic=>`<button data-a="pickListIcon" data-v="${ic}" style="width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;font-size:18px;background:${nListIcon===ic?C.pS:'transparent'}">${ic}</button>`).join('');
  const addCard=card('新建清单',`
    <div style="font-size:12px;color:${C.muted};margin-bottom:6px">选个图标</div>
    <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:10px">${iconPick}</div>
    <div style="display:flex;gap:8px">
      <input id="nList" value="${e(nList)}" placeholder="购物、行李、要读的书…" style="${IS()}">
      <button data-a="addList" style="${BS(C.p)}">新建</button>
    </div>
  `);
  const dragOn=(S.listMode||'fold')==='drag';
  const filterBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
    ${pill((S.taskFilter||'all')==='all',C.p,C.pS,'全部','setTaskFilter','all')}
    ${pill((S.taskFilter||'all')==='important',C.w,C.wS,'重要','setTaskFilter','important')}
    ${pill((S.taskFilter||'all')==='due',C.g,C.gS,'有截止','setTaskFilter','due')}
    ${pill((S.taskFilter||'all')==='open',C.p,C.pS,'未完成','setTaskFilter','open')}
  </div>`;
  const sortBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${pill((S.taskSort||'due')==='due',C.p,C.pS,'按到期','setTaskSort','due')}
    ${pill((S.taskSort||'due')==='important',C.w,C.wS,'按重要','setTaskSort','important')}
    ${pill((S.taskSort||'due')==='created',C.g,C.gS,'原顺序','setTaskSort','created')}
  </div>`;
  const modeBar=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:${C.muted}">收纳方式</span>
    <button data-a="setListMode" data-v="fold" style="${(S.listMode||'fold')==='fold'?BS(C.p,'padding:5px 12px;font-size:13px'):BS(C.pS,'padding:5px 12px;font-size:13px;color:'+C.p)}">点击折叠</button>
    <button data-a="setListMode" data-v="drag" style="${dragOn?BS(C.p,'padding:5px 12px;font-size:13px'):BS(C.pS,'padding:5px 12px;font-size:13px;color:'+C.p)}">拖拽排序</button>
  </div>`;
  const lists=S.lists.map((l,idx)=>{
    const done=l.items.filter(i=>i.done).length;
    const collapsed=listCollapse[l.id];
    const icon=l.icon||'📝';
    const items=collapsed?'':visibleItems(l.items).map(it=>{const d=dueInfo(it.due,it.dueTime);const editing=editItem&&String(editItem.listId)===String(l.id)&&String(editItem.id)===String(it.id);return editing?`<div style="padding:10px 0;border-top:1px solid ${C.line}">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <input id="editItemText" value="${e(editItem.text||'')}" placeholder="修改事项" style="${IS('flex:1;min-width:0')}">
        <button data-a="editItemImportant" style="${BS(editItem.important?C.w:C.wS,'color:'+(editItem.important?'#fff':C.w)+';padding:10px 12px')}">${editItem.important?'★':'☆'}</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="editItemDue" type="date" value="${e(editItem.due||'')}" style="${IS('flex:1 1 132px;padding:10px 8px')}">
        <input id="editItemTime" type="time" value="${e(editItem.dueTime||'')}" style="${IS('flex:1 1 110px;padding:10px 8px')}">
        <button data-a="cancelEditItem" style="${BS(C.line,'color:'+C.muted)}">取消</button>
        <button data-a="saveEditItem" style="${BS(C.p)}">保存</button>
      </div>
    </div>`:`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid ${C.line}">
      <button data-a="toggleItem" data-lid="${l.id}" data-id="${it.id}" style="width:22px;height:22px;border-radius:7px;border:2px solid ${it.done?C.g:C.line};background:${it.done?C.g:'transparent'};color:#fff;font-size:13px;cursor:pointer;flex-shrink:0">${it.done?'✓':''}</button>
      <button data-a="toggleImportant" data-lid="${l.id}" data-id="${it.id}" style="background:none;border:none;color:${it.important?C.w:C.faint};font-size:17px;cursor:pointer;line-height:1">${it.important?'★':'☆'}</button>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:${it.done?C.faint:C.ink};text-decoration:${it.done?'line-through':'none'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(it.text)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
          <span style="font-size:11px;background:${d.bg};color:${d.tone};padding:2px 7px;border-radius:999px">${e(d.txt)}</span>
          ${it.due?`<span style="font-size:11px;color:${C.faint}">${e(it.due)}${it.dueTime?' '+e(it.dueTime):''}</span>`:''}
        </div>
      </div>
      <button data-a="editItem" data-lid="${l.id}" data-id="${it.id}" style="background:none;border:none;color:${C.p};font-size:12px;cursor:pointer;white-space:nowrap">编辑</button>
      ${xbtn('delItem',it.id+'/'+l.id)}
    </div>`}).join('');

// 词典 URL：托管在用户的 GitHub 仓库根目录
const DICT_URL='./ecdict.json';
const DICT_VERSION='v1';
const DICT_MIN_WORDS=10000;

function dictSize(obj){
  if(!obj||typeof obj!=='object')return 0;
  try{return Object.keys(obj).length}catch(e){return 0}
}

async function resetDict(){
  await dictDB.clear();
  _dictMem=null;
  S.dictReady=false;
  save({...S});
}

// 查词：从内存词典查询，找不到尝试去复数/时态后缀
async function lookupWord(w){
  if(!w)return null;
  const word=w.trim().toLowerCase();
  if(!word)return null;
  const dict=await ensureDictMem();
  if(!dict)return null;
  if(dict[word])return dict[word];
  // 简单回退：去掉常见后缀
  for(const suf of ['s','es','ed','ing','ly','er','est']){
    if(word.endsWith(suf)){
      const base=word.slice(0,-suf.length);
      if(dict[base])return {...dict[base],_baseForm:base,_inflected:word};
    }
  }
  return null;
}

// 浏览器原生发音（免费）
function speakWord(w,lang){
  try{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang=lang||'en-US';
    u.rate=0.9;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

// 下载词典
async function downloadDict(){
  if(vDictLoading)return;
  vDictLoading=true;vDictProgress=0;render();
  try{
    // 先清掉可能残留的旧数据
    await dictDB.clear();_dictMem=null;
    // 1. 下载（0-50%）
    const res=await fetch(DICT_URL);
    if(!res.ok)throw new Error('词典文件未找到（HTTP '+res.status+'）。请确认 ecdict.json 已上传到 GitHub 仓库根目录。');
    const total=Number(res.headers.get('content-length'))||0;
    const reader=res.body.getReader();
    let received=0,chunks=[];
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      chunks.push(value);received+=value.length;
      if(total){setDictProgress(Math.round(received/total*50))}
    }
    // 2. 合并 + 解析（50-70%）
    setDictProgress(55);
    const blob=new Blob(chunks);chunks=null;
    const text=await blob.text();
    await tick();
    setDictProgress(65);
    await tick();
    const data=JSON.parse(text);
    const words=dictSize(data);
    if(words<DICT_MIN_WORDS)throw new Error('词典文件不完整：当前只有 '+words+' 个词条。请上传完整的 ecdict.json 到 GitHub 仓库根目录后再下载。');
    setDictProgress(75);
    await tick();
    // 3. 一次性存入数据库（75-95%）—— 整个对象作为一个值，瞬间完成
    await dictDB.saveAll(data);
    setDictProgress(95);
    // 4. 加载到内存
    _dictMem=data;
    setDictProgress(100);
    S.dictReady=true;
    vDictLoading=false;
    save({...S});
  }catch(err){
    vDictLoading=false;vDictProgress=0;
    alert('词典下载失败：\n'+(err&&err.message||err)+'\n\n如果是无痕/隐私模式，请用普通窗口打开。');
    render();
  }
}
// 进度条更新（不触发完整 render，避免干扰）
function setDictProgress(pct){
  vDictProgress=pct;
  const bar=document.querySelector('[data-dictbar]');
  const txt=document.querySelector('[data-dicttxt]');
  if(bar)bar.style.width=pct+'%';
  if(txt)txt.textContent='处理中… '+pct+'%';
}
function tick(){return new Promise(r=>setTimeout(r,16))}

// AI 母语者讲解
async function aiVocabExplain(word,force){
  if(!S.apiKey){alert('请先在设置里填入 API Key');return}
  if(S.vocabAi[word]&&!force)return;
  if(force){
    if(!confirm('重新生成会再调用一次 API，耗费 token。确定吗？'))return;
  }
  // 月度计数
  const mon=today().slice(0,7);
  if(S.aiUsage.month!==mon){S.aiUsage={count:0,month:mon}}
  S.aiUsage.count++;
  S.vocabAi[word]='__loading__';save({...S});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:700,
        messages:[{role:'user',content:`请用「母语者思维」帮我理解英文单词 "${word}"。不要简单给中文翻译，而是按以下结构输出（用中文）：

【核心意象】
这个词在母语者脑中的核心画面/感觉是什么？用一两句话描述。

【典型场景】
列出3-4个该词最常出现的场景，每个场景配一个英文例句+中文意思。

【为什么不是XX】
和某个常被混淆的中文意思做对比，说明为什么这个词≠那个中文翻译的全部。

【一句话记忆】
用一句话概括，让我下次见到这个词立刻浮现正确的画面。

要求：直接输出讲解内容，不要客套话。`}]
      })
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    const text=json.content&&json.content[0]&&json.content[0].text||'';
    S.vocabAi[word]=text;save({...S});
  }catch(err){
    delete S.vocabAi[word];save({...S});
    alert('AI 讲解失败：'+err.message);
  }
}

// 连续打卡天数
function calcStreak(){
  if(!S.reviewHistory)return 0;
  let streak=0,d=today();
  while(S.reviewHistory[d]&&S.reviewHistory[d].reviewed>0){streak++;d=shiftD(d,-1)}
  return streak
}

// AI 同义词辨析
async function aiSynonyms(word,force){
  if(!S.apiKey){alert('请先在设置里填入 API Key');return}
  if(!S.vocabSynonyms)S.vocabSynonyms={};
  if(S.vocabSynonyms[word]&&S.vocabSynonyms[word]!=='__loading__'&&!force){
    if(!confirm('已有辨析结果，重新生成会消耗 token，确定？'))return
  }
  S.vocabSynonyms[word]='__loading__';save({...S});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:`请用中文帮我理解英文单词 "${word}" 和它的近义词之间的区别，要具体实用。

格式：
【核心区别速览】
一句话说清 ${word} 最独特的地方。

【近义词对比】
（3-5个最常见的近义词，每个：英文词 → 最关键区别 + 一个地道例句）

【什么时候该用 ${word}，而不是其他词？】
给1-2个判断技巧。

要求：简洁有力，直接给干货。`}]})
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    if(!S.vocabSynonyms)S.vocabSynonyms={};
    S.vocabSynonyms[word]=json.content?.[0]?.text||'';
    save({...S})
  }catch(err){
    if(S.vocabSynonyms)delete S.vocabSynonyms[word];
    save({...S});alert('生成失败：'+err.message)
  }
}

// ═══════════════════════ 复习系统（SM-2）═══════════════════════
function sm2Grade(item,quality){
  let ef=item.easeFactor||2.5,intv=item.interval||1,box=item.box||1;
  if(quality===0){box=1;intv=1;}
  else{
    if(box<=1)intv=1;else if(box===2)intv=3;else intv=Math.max(1,Math.round(intv*ef));
    box=Math.min(box+1,8);
    ef=Math.max(1.3,ef+0.1-(3-quality)*(0.08+(3-quality)*0.02));
  }
  return{...item,box,interval:intv,easeFactor:Math.round(ef*100)/100,nextReview:Date.now()+intv*864e5,lastReview:Date.now(),reviewCount:(item.reviewCount||0)+1};
}

function startReview(mode){
  let queue=[...S.vocab.filter(v=>v.nextReview<=Date.now())];
  if(!queue.length){alert('今天没有待复习的词，继续加新词吧！');return}
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]]}
  reviewMode=mode;reviewQueue=queue.slice(0,30);reviewIdx=0;
  reviewFlipped=false;reviewInput='';reviewStats={correct:0,hard:0,wrong:0};reviewDone=false;
  _detailCache={};render();
}

function gradeWord(quality){
  const item=reviewQueue[reviewIdx];if(!item)return;
  if(quality===0)reviewStats.wrong++;else if(quality===1)reviewStats.hard++;else reviewStats.correct++;
  const updated=sm2Grade(item,quality);
  S.vocab=S.vocab.map(v=>v.word===item.word?updated:v);
  // 追踪复习历史（用于统计和连胜）
  const rd=today();
  if(!S.reviewHistory)S.reviewHistory={};
  if(!S.reviewHistory[rd])S.reviewHistory[rd]={reviewed:0,correct:0};
  S.reviewHistory[rd].reviewed++;
  if(quality>=2)S.reviewHistory[rd].correct++;
  save({...S});
  if(quality===0&&reviewQueue.filter(x=>x.word===item.word).length<2)reviewQueue.push({...updated});
  reviewIdx++;
  if(reviewIdx>=reviewQueue.length)reviewDone=true;
  reviewFlipped=false;reviewInput='';render();
}

        <button data-a="reviewGrade" data-v="3" style="${BS(C.p,'flex:1;padding:14px 6px;font-size:14px')}">★ 轻松</button>
      </div>
    </div>`;
    return`<div style="position:fixed;inset:0;z-index:50;background:${C.bg};display:flex;flex-direction:column">${bar}${closeBtn}${cnt}
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px 24px">${reviewFlipped?back:front}</div>
    </div>`
  }

  // ── 划卡模式 ──
  if(reviewMode==='swipe'){
    return`<div style="position:fixed;inset:0;z-index:50;background:${C.bg};display:flex;flex-direction:column" id="swipeArea">${bar}${closeBtn}${cnt}
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 16px">
        <div style="width:100%;max-width:360px;background:${C.card};border-radius:24px;padding:36px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center" id="swipeCard">
          <div style="font-family:${SR};font-size:40px;font-weight:700;color:${C.ink};margin-bottom:10px">${e(item.word)}</div>
          ${entry?.phonetic?`<div style="font-size:14px;color:${C.muted};margin-bottom:12px">/ ${e(entry.phonetic)} /</div>`:''}
          <button data-a="speak" data-v="${e(item.word)}" style="width:40px;height:40px;border-radius:50%;border:none;background:${C.pS};color:${C.p};font-size:18px;cursor:pointer;margin-bottom:12px">🔊</button>
          ${reviewFlipped?`<div style="font-size:14px;line-height:1.85;color:${C.ink};text-align:left;margin-top:14px;white-space:pre-wrap;border-top:1px solid ${C.line};padding-top:14px">${e(trans.split('\n').slice(0,4).join('\n'))}</div>`
          :`<div style="font-size:12px;color:${C.faint};margin-top:8px">点击看释义 / 左滑不会 / 右滑记住</div>`}
        </div>
        ${!reviewFlipped?`<button data-a="reviewFlip" style="margin-top:16px;background:none;border:1px solid ${C.line};border-radius:10px;padding:10px 28px;color:${C.muted};font-size:13px;cursor:pointer">看释义</button>`:''}
      </div>
      ${reviewFlipped?`<div style="padding:16px 20px 36px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:${C.faint};margin-bottom:8px;padding:0 4px">
          <span>← 左滑：不会</span><span>右滑：记住 →</span>
        </div>
        <div style="display:flex;gap:10px">
          <button data-a="reviewGrade" data-v="0" style="${BS('#C75B70','flex:1;padding:16px;font-size:15px')}">✗ 不会</button>
          <button data-a="reviewGrade" data-v="1" style="${BS(C.w,'padding:16px 14px;font-size:15px')}">△</button>
          <button data-a="reviewGrade" data-v="2" style="${BS(C.g,'flex:1;padding:16px;font-size:15px')}">✓ 记住</button>
        </div>
      </div>`:''}
    </div>`
  }

  // ── 拼写模式 ──
  if(reviewMode==='spell'){
    return`<div style="position:fixed;inset:0;z-index:50;background:${C.bg};display:flex;flex-direction:column">${bar}${closeBtn}${cnt}
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 24px">
        <div style="font-size:12px;color:${C.muted};margin-bottom:16px">根据提示拼写单词</div>
        <div style="background:${C.card};border-radius:18px;padding:22px 24px;width:100%;max-width:420px;text-align:center;margin-bottom:24px">
          <div style="font-size:16px;line-height:1.9;color:${C.ink}">${e(shortTrans||'（查询中…）')}</div>
          ${entry?.phonetic?`<div style="font-size:12px;color:${C.faint};margin-top:6px">/ ${e(entry.phonetic)} /</div>`:''}
          <button data-a="speak" data-v="${e(item.word)}" style="width:36px;height:36px;border-radius:50%;border:none;background:${C.pS};color:${C.p};font-size:16px;cursor:pointer;margin-top:8px">🔊</button>
        </div>
        ${reviewFlipped?`
          <div style="font-size:12px;color:${C.faint};margin-bottom:8px">正确答案</div>
          <div style="font-family:${SR};font-size:34px;font-weight:700;color:${C.p};margin-bottom:8px">${e(item.word)}</div>
          ${reviewInput&&reviewInput.toLowerCase()!==item.word?`<div style="font-size:13px;color:#C75B70;margin-bottom:20px">你的答案：${e(reviewInput)}</div>`:`<div style="font-size:13px;color:${C.g};margin-bottom:20px">✓ 拼写正确！</div>`}
          <div style="display:flex;gap:10px;width:100%;max-width:420px">
            <button data-a="reviewGrade" data-v="0" style="${BS('#C75B70','flex:1;padding:14px')}">✗ 不对</button>
            <button data-a="reviewGrade" data-v="2" style="${BS(C.g,'flex:1;padding:14px')}">✓ 对了</button>
          </div>
        `:`
          <input id="spellInput" value="${e(reviewInput)}" placeholder="输入英文单词…" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" style="${IS('text-align:center;font-size:20px;letter-spacing:2px;max-width:420px')}">
          <div style="display:flex;gap:10px;margin-top:14px;width:100%;max-width:420px">
            <button data-a="reviewFlip" style="${BS(C.line,'flex:1;color:'+C.muted)}">不会，跳过</button>
            <button data-a="reviewCheck" style="${BS(C.p,'flex:2')}">确认答案</button>
          </div>
        `}
      </div>
    </div>`
  }
  return''
}

// ═══════════════════════ TAB: JOURNAL ═══════════════════════
function renderJournal(){
  const mPills=MOODS.map(m=>`<button data-a="setJMood" data-v="${m}" style="width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;font-size:18px;background:${jMood===m?C.pS:'transparent'}">${m}</button>`).join('');
  const fPills=Object.keys(FONTS).map(k=>`<button data-a="setJFont" data-v="${k}" style="padding:5px 12px;border-radius:999px;border:none;cursor:pointer;font-size:13px;background:${jFont===k?C.p:C.pS};color:${jFont===k?'#fff':C.p};font-family:${FONTS[k].css}">${FONTS[k].name}</button>`).join('');
  const hiPills=`<button data-a="setJHi" data-v="null" style="width:26px;height:26px;border-radius:50%;border:2px solid ${jHi===null?C.ink:C.line};background:#fff;cursor:pointer;font-size:11px;color:${C.faint}">○</button>`+HILITES.map(h=>`<button data-a="setJHi" data-v="${h}" style="width:26px;height:26px;border-radius:50%;border:2px solid ${jHi===h?C.ink:'transparent'};background:${h};cursor:pointer"></button>`).join('');
  const tapePills=TAPES.map(t=>`<button data-a="setJTape" data-v="${t}" style="width:34px;height:20px;border-radius:3px;border:2px solid ${jTape===t?C.ink:'transparent'};background:repeating-linear-gradient(45deg,${t},${t} 5px,${t}cc 5px,${t}cc 10px);cursor:pointer"></button>`).join('');
  const stPills=`<button data-a="setJSt" data-v="null" style="width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:12px;color:${C.faint};background:${jSt===null?C.pS:'transparent'}">无</button>`+STICKERS.map(s=>`<button data-a="setJSt" data-v="${s}" style="width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:18px;background:${jSt===s?C.pS:'transparent'}">${s}</button>`).join('');
  const jpImgs=jImgs.map((u,i)=>`<div style="position:relative"><img src="${u}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;display:block"><button data-a="delJImg" data-id="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:12px;cursor:pointer">×</button></div>`).join('');
  function row(label,content){return`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px"><span style="font-size:12px;color:${C.muted};width:42px;flex-shrink:0">${label}</span>${content}</div>`}
  const composeCard=card('手帐 · 写点什么',`
    ${row('心情',mPills)}${row('字体',fPills)}${row('荧光',hiPills)}${row('胶带',tapePills)}${row('贴纸',stPills)}
    <textarea id="jTxt" rows="4" placeholder="今天的天气、心情、一件小事…" style="${IS('resize:vertical;line-height:1.8;font-family:'+FONTS[jFont].css)}">${e(jTxt)}</textarea>
    ${jpImgs?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">${jpImgs}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:10px">
      <label style="${BS(C.g,'cursor:pointer')}">📎 加图<input type="file" accept="image/*" multiple id="jImgBtn" style="display:none"></label>
      <button data-a="addJ" style="${BS(C.p,'flex:1')}">贴上这一页</button>
    </div>
  `);
  const entries=S.journal.map((j,i)=>{
    const imgs=j.imgs||[];const rot=(i%2?-0.6:0.7);
    return`<div style="background:${C.card};border-radius:14px;padding:18px 18px 14px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);transform:rotate(${rot}deg);position:relative">
      <div style="position:absolute;top:-9px;left:24px;width:60px;height:18px;border-radius:3px;transform:rotate(-4deg);background:repeating-linear-gradient(45deg,${j.tape||C.pS},${j.tape||C.pS} 5px,${j.tape+'cc'||C.pS} 5px,${j.tape+'cc'||C.pS} 10px)"></div>
      ${j.sticker?`<span style="position:absolute;top:-10px;right:10px;font-size:26px;transform:rotate(12deg)">${j.sticker}</span>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:17px">${j.mood}<span style="font-size:12px;color:${C.muted};margin-left:8px">${e(j.date)}</span></span>
        ${xbtn('delJ',j.id)}
      </div>
      ${j.text?`<div style="font-size:15.5px;line-height:${j.hi?2.1:1.85};font-family:${FONTS[j.font||'sans'].css}">
        <span style="white-space:pre-wrap${j.hi?';background:'+j.hi+';-webkit-box-decoration-break:clone;box-decoration-break:clone;padding:2px 4px;border-radius:4px':''}">${e(j.text)}</span>
      </div>`:''}
      ${imgs.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${imgs.map(id=>`<img data-lid="${e(id)}" src="${IC[id]||''}" style="width:calc(50% - 4px);max-height:180px;object-fit:cover;border-radius:10px">`).join('')}</div>`:''}
    </div>`}).join('');
  return composeCard+(entries||empty('还没有手帐，写下第一页吧。'))
}

// ═══════════════════════ TAB: ME ═══════════════════════
function renderMe(){
  const starsHTML=Array.from({length:50},()=>{const l=Math.random()*100,t=Math.random()*100,s=Math.random()*1.8+0.5,del=Math.random()*5,dur=3+Math.random()*3;return`<span style="position:absolute;left:${l}%;top:${t}%;width:${s}px;height:${s}px;border-radius:50%;background:#fff;animation:tk ${dur}s ease-in-out ${del}s infinite"></span>`}).join('');
  const fragsHTML=S.frags.map(f=>{const hasImg=f.imgs&&f.imgs.length;return`<button data-a="readFrag" data-id="${f.id}" style="position:absolute;left:${f.x}%;top:${f.y}%;width:${hasImg?16:12}px;height:${hasImg?16:12}px;border-radius:${hasImg?'4px':'50%'};border:none;cursor:pointer;background:hsl(${f.hue},80%,78%);animation:ps ${3+(f.id%3)}s ease-in-out infinite,fl ${5+(f.id%4)}s ease-in-out infinite;transform:translate(-50%,-50%)"></button>`}).join('');
  const noFrag=!S.frags.length?`<div style="position:absolute;top:46%;left:0;right:0;text-align:center;color:#8782B0;font-size:13px;line-height:2">这里还是一片空的夜空。<br>写下一句，让它变成第一颗星。</div>`:'';
  let overlay='';
  if(composing){
    const meImgPrev=meImgs.map((u,i)=>`<div style="position:relative"><img src="${u}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;display:block"><button data-a="delMeImg" data-id="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:12px;cursor:pointer">×</button></div>`).join('');
    overlay=`<div id="overlay" style="position:fixed;inset:0;z-index:20;background:rgba(8,7,20,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box">
      <div style="width:100%;max-width:420px;background:rgba(30,26,58,.92);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:22px 20px;box-sizing:border-box;animation:fp .25s ease">
        <div style="font-family:${SR};color:#EDEAFB;font-size:16px;margin-bottom:14px;text-align:center">把它藏进夜空</div>
        <textarea id="meTxt" rows="4" placeholder="写下此刻……" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;color:#F3F0FF;font-size:15px;line-height:1.8;outline:none;resize:none;font-family:${SR};box-sizing:border-box">${e(meTxt)}</textarea>
        ${meImgs.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">${meImgPrev}</div>`:''}
        <label style="display:block;text-align:center;margin-top:10px;color:#B9B4DE;font-size:13px;cursor:pointer">📎 配图（可多张）<input type="file" accept="image/*" multiple id="meImgBtn" style="display:none"></label>
        <div style="display:flex;gap:10px;margin-top:14px">
          <button data-a="cancelMe" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:transparent;color:#B9B4DE;font-size:14px;cursor:pointer">算了</button>
          <button data-a="saveFrag" style="flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(120deg,#9B7BE0,#6E8BE0);color:#fff;font-size:14px;cursor:pointer">✧ 封存为一颗星</button>
        </div>
      </div>
    </div>`
  }
  if(readFrag){
    const f=readFrag,imgs=f.imgs||[];
    overlay=`<div id="overlay" style="position:fixed;inset:0;z-index:20;background:rgba(8,7,20,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box">
      <div style="width:100%;max-width:420px;background:rgba(30,26,58,.92);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:22px 20px;box-sizing:border-box;animation:fp .25s ease">
        <div style="text-align:center;margin-bottom:14px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:hsl(${f.hue},80%,78%);box-shadow:0 0 14px hsl(${f.hue},80%,70%)"></span></div>
        ${imgs.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center">${imgs.map(id=>`<img data-lid="${e(id)}" src="${IC[id]||''}" style="width:${imgs.length>1?'calc(50% - 4px)':'100%'};max-height:220px;object-fit:cover;border-radius:12px">`).join('')}</div>`:''}
        ${f.text?`<div style="color:#F3F0FF;font-size:16px;line-height:2;white-space:pre-wrap;font-family:${SR};text-align:center">${e(f.text)}</div>`:''}
        <div style="text-align:center;color:#7E79A8;font-size:12px;margin-top:16px;letter-spacing:1px">${e(f.date)}</div>
        <div style="display:flex;justify-content:center;gap:18px;margin-top:22px">
          <button data-a="closeRead" style="background:none;border:none;color:#B9B4DE;font-size:14px;cursor:pointer">收好</button>
          <button data-a="delFrag" data-id="${f.id}" style="background:none;border:none;color:#6E6896;font-size:13px;cursor:pointer">松手让它飘走</button>
        </div>
      </div>
    </div>`
  }
  return`<div style="position:relative;min-height:100vh;width:100%;background:radial-gradient(130% 100% at 50% -10%,#342A63 0%,#1B1740 42%,#0B0A1E 100%);overflow:hidden">

    <div style="position:relative;z-index:2;text-align:center;padding-top:40px">
      <div style="font-family:${SR};font-size:42px;color:#F3F0FF;letter-spacing:8px">我</div>
      <div style="font-size:12px;color:#9B96C4;letter-spacing:2px;margin-top:6px">只有你知道这里藏着什么</div>
    </div>
    <div style="position:absolute;inset:0;z-index:2">${fragsHTML}${noFrag}</div>
    <button data-a="openCompose" style="position:fixed;right:22px;bottom:92px;z-index:5;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#fff;font-size:24px;box-shadow:0 0 18px rgba(180,160,255,.4)">✦</button>
    ${overlay}
  </div>`
}

// ═══════════════════════ SETTINGS ═══════════════════════
function renderSettings(){
  const acc=S.accent||C.p;
  const themePills=Object.keys(TH).map(id=>{const t=TH[id],on=S.theme===id&&!S.accent&&!S.bgc;return`<button data-a="setTheme" data-v="${id}" style="display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer">

    <span style="font-size:11px;color:${C.muted}">${t.name}</span></button>`}).join('');
  const aS=S.accentA??0.13;
  const hsl=S.accent?h2hsl(S.accent):sHsl;
  function slider(label,val,min,max,action,track){return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

  const curPills=CURS.map(s=>pill((S.cur||'$')===s,C.p,C.pS,s,'setCur')).join('');

    <span style="font-size:12px;color:${C.muted};width:42px">${TAB_LABELS[k]}</span>

  const textCard=card('文字自定义',`
    <div style="font-size:12px;color:${C.muted};line-height:1.7;margin-bottom:10px">这里改的是页面上最常出现的名字和底部标签。想好新名字后随时回来换。</div>
    <input id="appNameIn" value="${e(S.appName||'')}" placeholder="页面主标题" style="${IS('margin-bottom:8px')}">

    <input id="appTitleIn" value="${e(titleValue)}" placeholder="浏览器/添加到桌面的名字；留空则跟随主标题" style="${IS('margin-bottom:12px')}">
    <div style="font-size:12px;color:${C.muted};margin-bottom:8px">页面小 icon</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${iconPicks}</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:8px">符号小抽屉 · 点一下会加到主标题后面</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${symbolPicks}</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:8px">底部标签</div>
    ${labelInputs}
    <div style="display:flex;gap:8px;margin-top:10px">
      <button data-a="saveTextPrefs" style="${BS(C.p,'flex:1')}">保存文字</button>
      <button data-a="resetTextPrefs" style="${BS(C.line,'color:'+C.muted)}">恢复默认</button>
    </div>
  `);

// ═══════════════════════ MAIN RENDER ═══════════════════════
function render(){
  C=resolveC();
  document.body.style.background=TAB==='me'?'#0B0A1E':`radial-gradient(circle at 12% 8%, ${C.wS} 0, transparent 28%), radial-gradient(circle at 92% 12%, ${C.gS} 0, transparent 30%), ${C.bg}`;
  document.body.style.color=C.ink;
  document.title=appShortTitle();
  const appleTitle=document.querySelector('meta[name="apple-mobile-web-app-title"]');
  if(appleTitle)appleTitle.setAttribute('content',appShortTitle());
  let main='';
  if(TAB==='me'){main=renderMe()}
  else{
    let body='';
    if(TAB==='today')body=renderToday();
    else if(TAB==='food')body=renderFood();
    else if(TAB==='recipe')body=renderRecipes();
    else if(TAB==='bills')body=renderBills();
    else if(TAB==='list')body=renderList();
    else if(TAB==='vocab')body=renderVocab();
    else if(TAB==='journal')body=renderJournal();
    main=`
      ${renderBgOrnaments()}
      <div class="xb-shell" style="max-width:760px;margin:0 auto;padding:22px 16px 100px;position:relative;z-index:1">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:11px;letter-spacing:3px;color:${C.faint};text-transform:uppercase">${e(S.appKicker||'daily log')}</div>
            <h1 style="font-family:${SR};font-size:26px;font-weight:600;margin-top:2px">${e(S.appName||'饮食 & 体重小本')}</h1>
          </div>
          <button data-a="openSett" style="width:40px;height:40px;border-radius:12px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:18px;cursor:pointer">⚙️</button>
        </div>
        <div class="xb-hand-note" style="background:${C.card};border-radius:18px;padding:10px 13px;margin-bottom:16px;color:${C.muted};font-size:13px;display:flex;align-items:center;gap:8px">
          <span class="xb-sticker" style="font-size:19px">${e(S.appIcon||'✍️')}</span><span>${e(tabMood())}</span>
        </div>
        ${body}
      </div>`
  }
  const isMe=TAB==='me';
  const tabs=[['today',lab('today'),'🍃'],['food',lab('food'),'🧺'],['recipe',lab('recipe'),'🍳'],['bills',lab('bills'),'💰'],['list',lab('list'),'✓'],['vocab',lab('vocab'),'📖'],['journal',lab('journal'),'✍️'],['me',lab('me'),'✦']];
  const nav=`<div class="xb-dock" style="position:fixed;left:0;right:0;bottom:0;z-index:10;height:78px;display:flex;justify-content:center;background:${isMe?'rgba(11,10,30,.75)':C.card+'F2'};backdrop-filter:blur(14px);border-top:1px solid ${isMe?'rgba(255,255,255,.08)':C.line};padding:7px 4px 12px">
    ${tabs.map(([id,label,icon])=>{const on=TAB===id;const col=isMe?(on?'#fff':'#7E79A8'):(on?C.p:C.faint);return`<button data-a="setTab" data-v="${id}" style="flex:1;background:${on?(isMe?'rgba(255,255,255,.12)':C.pS):'none'};border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:${col};min-width:0"><span class="${on?'xb-sticker':''}" style="font-size:17px;opacity:${on?1:.62}">${icon}</span><span style="font-size:10px;font-weight:${on?700:400};white-space:nowrap">${label}</span></button>`}).join('')}
  </div>`;
  const sett=showSett?renderSettings():'';
  const draft=aiDraft?renderAiDraft():'';
  const editE=editExp?renderEditExp():'';
  const vdetail=vDetail?renderVocabDetail():'';
  const vreview=(reviewMode||reviewDone)?renderReview():'';
  const vstats=renderVocabStats();
  const vbulk=renderBulkImport();
  document.getElementById('app').innerHTML=main+nav+sett+draft+editE+vdetail+vreview+vstats+vbulk;
  bindEvents();
  loadVisibleImages();
}

// ═══════════════════════ IMAGE LOADER ═══════════════════════
async function loadVisibleImages(){
  const imgs=document.querySelectorAll('img[data-lid]');
  for(const img of imgs){
    const id=img.dataset.lid;
    if(!id||img.src)continue;
    const src=await loadImg(id);
    if(src)img.src=src
  }
}

// ═══════════════════════ EVENTS ═══════════════════════
function handleRange(ev){
  const a=ev.target.dataset.a,v=Number(ev.target.value);
  const hsl=S.accent?h2hsl(S.accent):sHsl;
  if(a==='hueSlide'){const nh={...hsl,h:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='satSlide'){const nh={...hsl,s:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='litSlide'){const nh={...hsl,l:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='alphaSlide'){save({...S,accentA:v/100})}
}
window.handleRange=handleRange;

function bindEvents(){
  const app=document.getElementById('app');if(!app)return;

    const el=ev.target.closest('[data-a]');if(!el)return;

      const note=(document.getElementById('dNote')?.value||'').trim();
      const sticker=dSticker||drinkSticker(dType,name);

      mutE(e=>{e.drinks=[...(e.drinks||[]),{id:Date.now(),type:dType,name,size:isNaN(size)?null:size,sugar:dSugar,caf:isNaN(caf)?null:caf,cafAuto,note,sticker}]});
      return
    }
    if(a==='delDrink'){mutE(e=>{e.drinks=(e.drinks||[]).filter(x=>String(x.id)!==id)});return}
    if(a==='setMType'){mType=v;render();return}
    if(a==='addMeal'){const t=(document.getElementById('mIn')?.value||'').trim();if(!t)return;mTxt='';mutE(e=>{e.meals=[...e.meals,{id:Date.now(),type:mType,text:t}]});return}
    if(a==='delMeal'){mutE(e=>{e.meals=e.meals.filter(m=>String(m.id)!==id)});return}
    if(a==='savePhoto'){if(!photoPrev)return;const pid=await storeImg(photoPrev);photoPrev='';mutE(e=>{e.photos=[...e.photos,pid]});return}
    if(a==='delPhoto'){mutE(e=>{e.photos=e.photos.filter(x=>x!==id)});await delImg(id);return}
    if(a==='aiRec'){await doAiRec();return}
    if(a==='draftType'){if(aiDraft){aiDraft.type=v;render()}return}
    if(a==='draftDel'){if(aiDraft){aiDraft.items.splice(+id,1);render()}return}
    if(a==='draftAddItem'){if(aiDraft){aiDraft.items.push({name:'',qty:'',cal:''});render()}return}
    if(a==='draftCancel'){aiDraft=null;render();return}
    if(a==='draftConfirm'){await confirmDraft();return}
    if(a==='setPSticker'){pSticker=v;render();return}
    if(a==='setNutriGoal'){nutriGoal=v;render();return}
    if(a==='addP'){const n=(document.getElementById('pN')?.value||'').trim();if(!n)return;const q=parseFloat(document.getElementById('pQ')?.value||'');let unit=pU;if(pU==='自定义'){unit=(pUcustom||'').trim()||'个'}const sticker=pSticker||foodIcon(n);pN='';pQ='';pE='';pUcustom='';pSticker='';save({...S,pantry:[...S.pantry,{id:Date.now(),name:n,qty:isNaN(q)?null:q,unit,exp:document.getElementById('pE')?.value||null,sticker}]});return}

    if(a==='addItem'){const iid=el.dataset.lid;const inEl=document.getElementById('li_'+iid);const t=(inEl?.value||'').trim();if(!t)return;let due=document.getElementById('liD_'+iid)?.value||'';const dueTime=document.getElementById('liT_'+iid)?.value||'';if(!due&&dueTime)due=today();const important=!!liImp[iid];liIn[iid]='';liDue[iid]='';liTime[iid]='';liImp[iid]=false;save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:[...l.items,{id:Date.now(),text:t,done:false,due:due||null,dueTime:dueTime||null,important}]}:l)});return}
    if(a==='editItem'){const iid=el.dataset.lid;const list=S.lists.find(l=>String(l.id)===iid);const it=list&&(list.items||[]).find(x=>String(x.id)===id);if(it){editItem={listId:iid,id:it.id,text:it.text||'',due:it.due||'',dueTime:it.dueTime||'',important:!!it.important};render()}return}
    if(a==='cancelEditItem'){editItem=null;render();return}
    if(a==='editItemImportant'){if(editItem){editItem.important=!editItem.important;render()}return}
    if(a==='saveEditItem'){if(!editItem)return;const text=(document.getElementById('editItemText')?.value||'').trim();if(!text){alert('事项内容不能为空。');return}let due=document.getElementById('editItemDue')?.value||'';const dueTime=document.getElementById('editItemTime')?.value||'';if(!due&&dueTime)due=today();const upd={...editItem,text,due:due||null,dueTime:dueTime||null};const lid=String(editItem.listId),iid=String(editItem.id);editItem=null;save({...S,lists:S.lists.map(l=>String(l.id)===lid?{...l,items:l.items.map(it=>String(it.id)===iid?{...it,text:upd.text,due:upd.due,dueTime:upd.dueTime,important:upd.important}:it)}:l)});return}
    if(a==='toggleItem'){const iid=el.dataset.lid;save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:l.items.map(it=>String(it.id)===id?{...it,done:!it.done}:it)}:l)});return}
    if(a==='toggleImportant'){const iid=el.dataset.lid;save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:l.items.map(it=>String(it.id)===id?{...it,important:!it.important}:it)}:l)});return}
    if(a==='delItem'){const[iid,llid]=id.split('/');save({...S,lists:S.lists.map(l=>String(l.id)===llid?{...l,items:l.items.filter(it=>String(it.id)!==iid)}:l)});return}
    if(a==='setJMood'){jMood=v;render();return}
    if(a==='setJFont'){jFont=v;render();return}
    if(a==='setJHi'){jHi=v==='null'?null:v;render();return}
    if(a==='setJTape'){jTape=v;render();return}
    if(a==='setJSt'){jSt=v==='null'?null:v;render();return}
    if(a==='delJImg'){jImgs=jImgs.filter((_,i)=>String(i)!==id);render();return}
    if(a==='delMeImg'){meImgs=meImgs.filter((_,i)=>String(i)!==id);render();return}
    if(a==='addJ'){
      const t=(document.getElementById('jTxt')?.value||'').trim();
      const ids=[];for(const u of jImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const savedHi=jHi,savedSt=jSt;
      jTxt='';jImgs=[];jSt=null;jHi=null;
      save({...S,journal:[{id:Date.now(),date:today(),mood:jMood,text:t,font:jFont,hi:savedHi,tape:jTape,sticker:savedSt,imgs:ids},...S.journal]});return
    }
    if(a==='delJ'){const j=S.journal.find(x=>String(x.id)===id);if(j)(j.imgs||[]).forEach(delImg);save({...S,journal:S.journal.filter(x=>String(x.id)!==id)});return}
    if(a==='openCompose'){composing=true;meTxt='';meImgs=[];render();return}
    if(a==='cancelMe'){composing=false;render();return}
    if(a==='saveFrag'){
      const t=(document.getElementById('meTxt')?.value||'').trim();
      const ids=[];for(const u of meImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const frag={id:Date.now(),text:t,date:today(),x:8+Math.random()*84,y:18+Math.random()*60,hue:Math.floor(Math.random()*360),imgs:ids};
      composing=false;meTxt='';meImgs=[];
      save({...S,frags:[...S.frags,frag]});return
    }
    if(a==='readFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f){readFrag=f;for(const i of(f.imgs||[]))await loadImg(i);render()};return}
    if(a==='closeRead'){readFrag=null;render();return}
    if(a==='delFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f)(f.imgs||[]).forEach(delImg);readFrag=null;save({...S,frags:S.frags.filter(x=>String(x.id)!==id)});return}
    if(a==='openSett'){showSett=true;if(S.accent)sHsl=h2hsl(S.accent);render();return}
    if(a==='closeSett'){showSett=false;render();return}
    if(a==='setTheme'){save({...S,theme:v,accent:null,bgc:null});return}
    if(a==='clearAccent'){save({...S,accent:null});return}
    if(a==='clearBg'){save({...S,bgc:null});return}
    if(a==='setCur'){save({...S,cur:v});return}
    if(a==='setWunit'){S.wunit=v;wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';save({...S});return}
    if(a==='saveKey'){   // ← 新增：保存 API Key
      const k=(document.getElementById('apiKeyIn')?.value||'').trim();
      save({...S,apiKey:k});
      return
    }
    if(a==='setAppIcon'){save({...S,appIcon:v});return}
    if(a==='appendSymbol'){
      const input=document.getElementById('appNameIn');
      if(input){
        const start=input.selectionStart??input.value.length,end=input.selectionEnd??input.value.length;
        input.value=input.value.slice(0,start)+v+input.value.slice(end);
        input.focus();
        input.setSelectionRange(start+v.length,start+v.length);
      }
      return
    }
    if(a==='saveTextPrefs'){
      const labels={...TAB_LABELS};
      document.querySelectorAll('[data-label]').forEach(inp=>{labels[inp.dataset.label]=(inp.value||TAB_LABELS[inp.dataset.label]||'').trim()});
      save({...S,appName:(document.getElementById('appNameIn')?.value||'').trim()||'饮食 & 体重小本',appKicker:(document.getElementById('appKickerIn')?.value||'').trim()||'daily log',appTitle:(document.getElementById('appTitleIn')?.value||'').trim(),labels});
      return
    }
    if(a==='resetTextPrefs'){save({...S,appName:'饮食 & 体重小本',appKicker:'daily log',appTitle:'',appIcon:'✍️',labels:{...TAB_LABELS}});return}
    if(a==='dictDl'){await downloadDict();return}
    if(a==='dictReset'){if(confirm('清除本机已缓存的词典并重新下载？'))await resetDict();return}
    if(a==='startReview'){startReview(v);return}
    if(a==='reviewFlip'){reviewFlipped=true;render();return}
    if(a==='reviewGrade'){gradeWord(+v);return}
    if(a==='reviewCheck'){
      const ans=(document.getElementById('spellInput')?.value||'').trim().toLowerCase();
      reviewInput=document.getElementById('spellInput')?.value||'';
      const correct=reviewQueue[reviewIdx]?.word?.toLowerCase();
      if(ans===correct)gradeWord(3);
      else{reviewFlipped=true;render()}
      return
    }
    if(a==='closeReview'){reviewMode=null;reviewDone=false;reviewQueue=[];render();return}
    if(a==='addVocab'){const w=(document.getElementById('vAddInput')?.value||'').trim();if(w)await addVocab(w);return}
    if(a==='setVView'){vView=v;render();return}
    if(a==='setVSort'){vSort=v;render();return}
    if(a==='refreshVocab'){render();return}
    if(a==='openVocabDetail'){vDetail={word:v};_detailCache={};render();return}
    if(a==='closeVocabDetail'){vDetail=null;_detailCache={};render();return}
    if(a==='delVocab'){if(confirm('从词库移除 "'+id+'"？')){S.vocab=S.vocab.filter(x=>x.word!==id);delete S.vocabNotes[id];delete S.vocabAi[id];vDetail=null;save({...S})};return}
    if(a==='speak'){speakWord(v);ev.stopPropagation&&ev.stopPropagation();return}
    if(a==='saveVocabNote'){const txt=document.getElementById('vNote')?.value||'';S.vocabNotes[id]=txt;save({...S});return}
    if(a==='aiVocabExplain'){await aiVocabExplain(id,el.dataset.force);return}
    if(a==='aiSynonyms'){await aiSynonyms(id,el.dataset.force);return}
    if(a==='openStats'){showStats=true;render();return}
    if(a==='closeStats'){showStats=false;render();return}
    if(a==='openBulk'){showBulk=true;bulkText='';render();return}
    if(a==='closeBulk'){showBulk=false;render();return}
    if(a==='confirmBulk'){
      const lines=(document.getElementById('bulkInput')?.value||bulkText).split(/[\n,，；;\s]+/).map(w=>w.trim().toLowerCase()).filter(w=>w&&/^[a-z]/.test(w)&&w.length>1);
      const unique=[...new Set(lines)].filter(w=>!S.vocab.find(v=>v.word===w));
      if(!unique.length){alert('没有新词可添加。');return}
      const newItems=unique.map(word=>({word,added:Date.now()+Math.random(),box:1,nextReview:Date.now(),lastReview:null,reviewCount:0,tags:[],interval:1,easeFactor:2.5}));
      showBulk=false;bulkText='';
      save({...S,vocab:[...newItems,...S.vocab]});
      return
    }
    if(a==='addVocabTag'){
      const t=(document.getElementById('tagInput')?.value||'').trim();
      if(!t||!id)return;
      S.vocab=S.vocab.map(v=>v.word===id&&!(v.tags||[]).includes(t)?{...v,tags:[...(v.tags||[]),t]}:v);
      save({...S});return
    }
    if(a==='removeVocabTag'){
      S.vocab=S.vocab.map(v=>v.word===id?{...v,tags:(v.tags||[]).filter(t=>t!==v)}:v);
      // 用 data-v 作为 tag 值
      const tag=el.dataset.v;
      S.vocab=S.vocab.map(v=>v.word===id?{...v,tags:(v.tags||[]).filter(t=>t!==tag)}:v);
      save({...S});return
    }
    if(a==='exportData'){await exportData();return}
  };
  app.oninput=ev=>{
    const el=ev.target;
    if(el.dataset&&el.dataset.a==='draftEdit'&&aiDraft){const i=+el.dataset.id,fld=el.dataset.f;if(aiDraft.items[i]){aiDraft.items[i][fld]=el.value}return}
    if(el.id==='wIn'){wIn=el.value}
    if(el.id==='mIn'){mTxt=el.value}
    if(el.id==='dName'){dName=el.value}
    if(el.id==='dSize'){dSize=el.value}
    if(el.id==='dCaf'){dCaf=el.value}
    if(el.id==='dNote'){dNote=el.value}
    if(el.id==='pN'){pN=el.value}
    if(el.id==='pQ'){pQ=el.value}
    if(el.id==='pE'){pE=el.value}
    if(el.id==='pUcustom'){pUcustom=el.value}
    if(el.id==='wiIn'){wiTxt=el.value}
    if(el.id==='rSearch'){rSearch=el.value;return}
    if(el.id==='rWish'){rWish=el.value;return}
    if(el.id==='recipeLinkTitle'){rLinkTitle=el.value}
    if(el.id==='recipeLinkUrl'){rLinkUrl=el.value}
    if(el.id==='recipeLinkNote'){rLinkNote=el.value}
    if(el.id==='nList'){nList=el.value}
    if(el.id==='eAmt'){eAmt=el.value}
    if(el.id==='eNote'){eNote=el.value}
    if(el.id==='budgetIn'){budgetIn=el.value}
    if(el.id==='eSearch'){eSearch=el.value}
    if(el.id==='vAddInput'){vAddInput=el.value}
    if(el.id==='vSearch'){vSearch=el.value}
    if(el.id==='spellInput'){reviewInput=el.value}
    if(el.id==='bulkInput'){bulkText=el.value}
    if(el.id==='eDate'){eDate=el.value}
    if(el.id==='jTxt'){jTxt=el.value}
    if(el.id==='meTxt'){meTxt=el.value}
    if(el.id&&el.id.startsWith('li_')){const lid=el.id.slice(3);liIn[lid]=el.value}
    if(el.id&&el.id.startsWith('liD_')){const lid=el.id.slice(4);liDue[lid]=el.value}
    if(el.id&&el.id.startsWith('liT_')){const lid=el.id.slice(4);liTime[lid]=el.value}
    if(el.id==='accentPicker'){sHsl=h2hsl(el.value);save({...S,accent:el.value});return}
    if(el.id==='bgPicker'){save({...S,bgc:el.value});return}
  };
  app.onchange=async ev=>{
    const el=ev.target;
    if(el.id==='pU'){pU=el.value;render();return}
    if(el.id==='capBtn'||el.id==='albBtn'){
      if(!el.files||!el.files.length)return;
      // 拍照和相册都走预览流程，这样 AI 识别按钮才会出现
      try{const u=await compressFile(el.files[0]);photoPrev=u;el.value='';render()}catch(err){console.error(err)}
      return
    }
    if(el.id==='jImgBtn'){if(!el.files||!el.files.length)return;const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}el.value='';jImgs=[...jImgs,...urls];render();return}
    if(el.id==='meImgBtn'){if(!el.files||!el.files.length)return;const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}el.value='';meImgs=[...meImgs,...urls];render();return}
    if(el.id==='eImgBtn'){if(!el.files||!el.files.length)return;try{const u=await compressFile(el.files[0]);eImg=u;el.value='';render()}catch(err){}return}
    if(el.id==='ee_imgBtn'){if(!el.files||!el.files.length||!editExp)return;try{const u=await compressFile(el.files[0]);const id=await storeImg(u);editExp.img=id;el.value='';render()}catch(err){}return}
    if(el.id==='importBtn'){if(!el.files||!el.files.length)return;await importData(el.files[0]);return}
  };
  // 清单拖拽排序
  app.ondragstart=ev=>{const t=ev.target.closest('[data-drag]');if(t){dragListId=t.dataset.drag;ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain',dragListId)}catch(e){}}};
  app.ondragover=ev=>{const t=ev.target.closest('[data-drag]');if(t&&dragListId){ev.preventDefault();ev.dataTransfer.dropEffect='move'}};
  app.ondrop=ev=>{
    const t=ev.target.closest('[data-drag]');
    if(!t||!dragListId)return;
    ev.preventDefault();
    const targetId=t.dataset.drag;
    if(String(targetId)===String(dragListId)){dragListId=null;return}
    const arr=[...S.lists];
    const from=arr.findIndex(l=>String(l.id)===String(dragListId));
    const to=arr.findIndex(l=>String(l.id)===String(targetId));
    if(from<0||to<0){dragListId=null;return}
    const[moved]=arr.splice(from,1);
    arr.splice(to,0,moved);
    dragListId=null;
    save({...S,lists:arr})
  };
  app.ondragend=()=>{dragListId=null};
  // 触摸滑动：划卡复习模式
  app.ontouchstart=ev=>{const t=ev.touches[0];_txStart={x:t.clientX,y:t.clientY}};
  app.ontouchend=ev=>{
    if(!_txStart||reviewMode!=='swipe'||!reviewFlipped)return;
    const t=ev.changedTouches[0];const dx=t.clientX-_txStart.x,dy=t.clientY-_txStart.y;
    _txStart=null;
    if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx>0)gradeWord(2);else gradeWord(0);
    }
  };
}

// ═══════════════════════ EXPORT / IMPORT ═══════════════════════
async function exportData(){
  const main=await idb.get(SKEY);
  const imgs={};const ks=await idb.keys('img:');
  for(const k of ks){const v=await idb.get(k);if(v)imgs[k]=v}
  const blob=new Blob([JSON.stringify({v:1,main,imgs})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小本备份_'+today()+'.json';a.click()
}
async function importData(file){
  try{const obj=JSON.parse(await file.text());if(obj.main)await idb.set(SKEY,obj.main);if(obj.imgs)for(const k in obj.imgs)await idb.set(k,obj.imgs[k]);location.reload()}catch(e){alert('导入失败，文件可能不对。')}
}

// ═══════════════════════ INIT ═══════════════════════
loadState();
</script>
