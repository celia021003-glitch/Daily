let _db=null;

const ls={
  get:k=>{try{return Promise.resolve(JSON.parse(localStorage.getItem('xbn:'+k)))}catch(e){return Promise.resolve(null)}},
  set:(k,v)=>{try{localStorage.setItem('xbn:'+k,JSON.stringify(v));return Promise.resolve(true)}catch(e){return Promise.resolve(false)}},
  del:k=>{try{localStorage.removeItem('xbn:'+k)}catch(e){}return Promise.resolve(true)},
  keys:pre=>{try{const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';if(k.startsWith('xbn:')){const real=k.slice(4);if(!pre||real.startsWith(pre))out.push(real)}}return Promise.resolve(out)}catch(e){return Promise.resolve([])}}
};
function openDB(){
  if(!canIDB)return Promise.reject(new Error('no idb'));
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('xbn1',2);
    r.onupgradeneeded=ev=>{
      const db=r.result;
      if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
      if(!db.objectStoreNames.contains('dict'))db.createObjectStore('dict');
    };
    r.onsuccess=()=>{_db=r.result;res(_db)};
    r.onerror=()=>rej(r.error)
  });
}
const dictDB={
  get:w=>openDB().then(db=>new Promise(res=>{const r=db.transaction('dict').objectStore('dict').get(w);r.onsuccess=()=>res(r.result??null);r.onerror=()=>res(null)})).catch(()=>null),
  set:(w,v)=>openDB().then(db=>new Promise(res=>{const r=db.transaction('dict','readwrite').objectStore('dict').put(v,w);r.onsuccess=()=>res(true);r.onerror=()=>res(false)})).catch(()=>false),
  count:()=>openDB().then(db=>new Promise(res=>{const r=db.transaction('dict').objectStore('dict').count();r.onsuccess=()=>res(r.result||0);r.onerror=()=>res(0)})).catch(()=>0),
  clear:()=>openDB().then(db=>new Promise(res=>{const r=db.transaction('dict','readwrite').objectStore('dict').clear();r.onsuccess=()=>res(true);r.onerror=()=>res(false)})).catch(()=>false),
  putBatch:(entries)=>openDB().then(db=>new Promise((res,rej)=>{
    let tx;
    try{tx=db.transaction('dict','readwrite')}catch(err){rej(err);return}
    const os=tx.objectStore('dict');
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;rej(new Error('写入超时（10秒）。可能是浏览器存储被限制。'))}},10000);
    tx.oncomplete=()=>{if(!done){done=true;clearTimeout(timer);res(true)}};
    tx.onerror=()=>{if(!done){done=true;clearTimeout(timer);rej(tx.error||new Error('事务失败'))}};
    tx.onabort=()=>{if(!done){done=true;clearTimeout(timer);rej(tx.error||new Error('事务中止'))}};
    try{
      for(const[w,v]of entries)os.put(v,w);
    }catch(err){if(!done){done=true;clearTimeout(timer);rej(err)}}
  }))
};
const idb={

// ═══════════════════════ UTILS ═══════════════════════
function dstr(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function today(){return dstr(new Date())}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function shiftD(s,n){const[y,m,d]=s.split('-').map(Number);return dstr(new Date(y,m-1,d+n))}
function diffD(a,b){return Math.round((parseD(b)-parseD(a))/864e5)}
function prettyD(s){const[y,m,d]=s.split('-').map(Number);const w=['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];return m+'月'+d+'日 · 周'+w}
function daysUntil(s){if(!s)return null;const n=new Date();n.setHours(0,0,0,0);return Math.round((parseD(s)-n)/864e5)}
function shiftM(ym,n){const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+'-'+p2(d.getMonth()+1)}
function fmtMoney(n){if(!Number.isFinite(n))return '';const v=Math.round(n*100)/100;return String(v).replace(/\.0+$/,'').replace(/(\.\d)0$/,'$1')}
function calcAmount(raw){
  let s=String(raw||'').trim();if(!s)return NaN;
  s=s.replace(/[，,]/g,'').replace(/[×xX]/g,'*').replace(/[÷]/g,'/').replace(/[＋]/g,'+').replace(/[−－—–]/g,'-').replace(/\s+/g,'').replace(/[￥¥$€£]/g,'');
  if(!s||!/\d/.test(s)||!/^[0-9+\-*/().]+$/.test(s))return NaN;
  try{const v=Function('"use strict";return ('+s+')')();return Number.isFinite(v)?Math.round(v*100)/100:NaN}catch(e){return NaN}
}
function setEAmt(v){eAmt=String(v||'');const el=document.getElementById('eAmt');if(el){el.value=eAmt;el.focus()}}
function pressCalcKey(k){

  if(k==='='){const v=calcAmount(cur);if(Number.isFinite(v))setEAmt(fmtMoney(v));return}
  setEAmt(cur+k)
}
function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function aHex(a){return Math.round(clamp(a,0,1)*255).toString(16).padStart(2,'0')}
function h2hsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4}h/=6}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}
}
function hsl2hex(h,s,l){
  s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(255*c).toString(16).padStart(2,'0')};
  return'#'+f(0)+f(8)+f(4)
}

function disp2kg(v){if(v==null||v==='')return null;const n=parseFloat(v);if(isNaN(n))return null;return wUnit()==='斤'?Math.round(n/2*10)/10:Math.round(n*10)/10}

function cycInfo(){
  const pd=S.period,days=Object.keys(pd.days||{}).sort(),gs=[];let cur=null;
  for(const d of days){if(cur&&diffD(cur.e,d)<=1)cur.e=d;else{cur={s:d,e:d};gs.push(cur)}}
  const sts=gs.map(g=>g.s);let cL=28,pL=5;
  if(sts.length>=2){const gaps=[];for(let i=1;i<sts.length;i++)gaps.push(diffD(sts[i-1],sts[i]));cL=clamp(Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length),21,35)}
  if(gs.length){const lens=gs.map(g=>diffD(g.s,g.e)+1);pL=clamp(Math.round(lens.reduce((a,b)=>a+b,0)/lens.length),2,8)}
  return{gs,sts,cL,pL,last:sts.length?sts[sts.length-1]:null}
}

function compressFile(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,600/Math.max(img.width,img.height));
      const w=Math.round(img.width*s),h=Math.round(img.height*s);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',.6))
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('img'))};
    img.src=url
  })
}

// ═══════════════════════ AI 识别 ══════════════════════
async function doAiRec(){
  if(!photoPrev){return}
  if(!S.apiKey){alert('请先在 ⚙️ 设置里填入 Anthropic API Key。');return}
  aiLoading=true;render();
  try{
    const base64=photoPrev.split(',')[1];
    const mt=photoPrev.startsWith('data:image/png')?'image/png':'image/jpeg';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mt,data:base64}},
            {type:'text',text:'请识别图中所有食物。每样食物输出一行，格式：\n食物名称 | 估算分量 | 热量kcal\n\n最后一行输出：\n合计 | | 总热量kcal\n\n要求：只输出上述格式内容，用中文，不加任何其他说明或解释。'}
          ]
        }]
      })
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    const text=json.content&&json.content[0]&&json.content[0].text||'';
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.includes('|'));
    // 改为生成可编辑草稿，而不是直接写入
    const items=[];
    for(const line of lines){
      const parts=line.split('|').map(x=>x.trim());
      const name=parts[0]||'';
      if(!name||name.includes('合计'))continue;
      items.push({name,qty:parts[1]||'',cal:(parts[2]||'').replace(/[^\d]/g,'')})
    }
    if(!items.length){
      alert('未能识别到食物，请重试，或确认图片中有清晰的食物。');
      aiLoading=false;render();return
    }
    aiDraft={type:mType,items,photo:photoPrev};
    photoPrev='';aiLoading=false;render()
  }catch(err){
    console.error(err);
    alert('AI 识别出错：'+(err.message||'网络错误，请检查 API Key 是否正确。'));
    aiLoading=false;render()
  }
}

async function confirmDraft(){

// ═══════════════════════ CHART ═══════════════════════
function renderChart(ser){
  if(ser.length<2)return empty('记录两天以上体重，这里会出现趋势曲线。');
  const W=500,H=155,pad=28;
  const ws=ser.map(s=>s.w),mn=Math.min(...ws),mx=Math.max(...ws);
  const lo=mn-.5,hi=mx+.5,range=(hi-lo)||1,n=ser.length;
  const xx=i=>pad+(n===1?(W-pad*2)/2:(i/(n-1))*(W-pad*2));
  const yy=v=>pad+(1-(v-lo)/range)*(H-pad*2);
  const pts=ser.map((s,i)=>xx(i)+','+yy(s.w)).join(' ');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:155px" preserveAspectRatio="none">
    ${[0,.5,1].map(t=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+t*(H-pad*2)}" y2="${pad+t*(H-pad*2)}" stroke="${C.line}" stroke-width="1"/>`).join('')}
    <polyline points="${pts}" fill="none" stroke="${C.p}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${ser.map((s,i)=>`<circle cx="${xx(i)}" cy="${yy(s.w)}" r="3.5" fill="${C.p}"/>`).join('')}
    <text x="2" y="${yy(mx)+4}" font-size="11" fill="${C.muted}">${kg2disp(mx)}</text>
    <text x="2" y="${yy(mn)+4}" font-size="11" fill="${C.muted}">${kg2disp(mn)}</text>
    <text x="${xx(0)}" y="${H-3}" font-size="11" fill="${C.muted}">${ser[0].l}</text>
    <text x="${xx(n-1)}" y="${H-3}" font-size="11" fill="${C.muted}" text-anchor="end">${ser[n-1].l}</text>
  </svg>`
}

function catEmoji(n){return (CATS.find(x=>x[0]===n)||['','✨'])[1]}

// 饼图（SVG donut）
function donutChart(byCat,total){
  const entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!entries.length||total<=0)return '';
  const palette=[C.p,C.g,C.w,'#9A8CC4','#D9A36B','#7FA8A0','#C98AA8','#A0A0B0'];
  const R=52,CC=64,SW=22;const circ=2*Math.PI*R;
  let off=0;const segs=entries.map(([n,v],i)=>{
    const frac=v/total;const len=frac*circ;const col=palette[i%palette.length];
    const seg=`<circle cx="${CC}" cy="${CC}" r="${R}" fill="none" stroke="${col}" stroke-width="${SW}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${CC} ${CC})"/>`;
    off+=len;return seg;
  }).join('');
  const legend=entries.map(([n,v],i)=>{const col=palette[i%palette.length];const pct=Math.round(v/total*100);return`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin:3px 0">
    <span style="width:10px;height:10px;border-radius:3px;background:${col};flex-shrink:0"></span>
    <span style="flex:1">${catEmoji(n)} ${e(n)}</span>
    <span style="color:${C.muted}">${pct}%</span>
  </div>`}).join('');
  return`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <svg width="128" height="128" viewBox="0 0 128 128" style="flex-shrink:0">
      ${segs}
      <text x="64" y="60" text-anchor="middle" font-size="11" fill="${C.muted}">合计</text>
      <text x="64" y="78" text-anchor="middle" font-size="15" font-weight="600" fill="${C.ink}">${(S.cur||'$')}${total.toFixed(0)}</text>
    </svg>
    <div style="flex:1;min-width:140px">${legend}</div>
  </div>`
}

const DICT_URL='./ecdict.json';
const DICT_VERSION='v1';

// 查词：先查 IndexedDB 词典，找不到尝试简单转小写/去复数
async function lookupWord(w){
  if(!w)return null;
  const word=w.trim().toLowerCase();
  if(!word)return null;
  let r=await dictDB.get(word);
  if(r)return r;
  // 简单回退：去掉常见后缀
  for(const suf of ['s','es','ed','ing','ly','er','est']){
    if(word.endsWith(suf)){
      const base=word.slice(0,-suf.length);
      r=await dictDB.get(base);
      if(r)return {...r,_baseForm:base,_inflected:word};
    }
  }
  return null;
}

// 浏览器原生发音（免费）
function speakWord(w,lang){
  try{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang=lang||'en-US';
    u.rate=0.9;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

// 下载词典
async function downloadDict(){
  if(vDictLoading)return;
  vDictLoading=true;vDictProgress=0;render();
  try{
    const res=await fetch(DICT_URL);
    if(!res.ok)throw new Error('词典文件未找到，请确认 ecdict.json 已上传到 GitHub 仓库根目录');
    const total=Number(res.headers.get('content-length'))||0;
    const reader=res.body.getReader();
    let received=0,chunks=[];
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      chunks.push(value);received+=value.length;
      if(total){vDictProgress=Math.round(received/total*50);render()}
    }
    // 合并 chunks
    const blob=new Blob(chunks);
    const text=await blob.text();
    chunks=null;
    vDictProgress=55;render();
    // 解析 JSON（格式：{"word": {...}, "word2": {...}}）
    const data=JSON.parse(text);
    vDictProgress=60;render();
    // 批量写入 IndexedDB
    const entries=Object.entries(data);
    const batchSize=5000;
    function updateProgress(pct){
      vDictProgress=pct;
      // 只更新进度条，不触发完整 render（避免干扰 IndexedDB 事务）
      const bar=document.querySelector('[data-dictbar]');
      const txt=document.querySelector('[data-dicttxt]');
      if(bar)bar.style.width=pct+'%';
      if(txt)txt.textContent='下载中… '+pct+'%';
    }
    for(let i=0;i<entries.length;i+=batchSize){
      const slice=entries.slice(i,i+batchSize);
      try{
        await dictDB.putBatch(slice);
      }catch(err){
        vDictLoading=false;vDictProgress=0;
        alert('词典写入失败（第'+(Math.floor(i/batchSize)+1)+'批）：\n'+(err&&err.message||err)+'\n\n可能是浏览器隐私/无痕模式，或存储空间不足。请用普通窗口打开，清理站点数据后重试。');
        render();return;
      }
      updateProgress(60+Math.round((i/entries.length)*40));
      await new Promise(r=>setTimeout(r,0));
    }
    S.dictReady=true;
    vDictLoading=false;vDictProgress=100;
    save({...S});
  }catch(err){
    vDictLoading=false;vDictProgress=0;
    alert('词典下载失败：'+err.message+'\n\n请确认 ecdict.json 已上传到 GitHub 仓库。');
    render();
  }
}

// AI 母语者讲解
async function aiVocabExplain(word,force){
  if(!S.apiKey){alert('请先在设置里填入 API Key');return}
  if(S.vocabAi[word]&&!force)return;
  if(force){
    if(!confirm('重新生成会再调用一次 API，耗费 token。确定吗？'))return;
  }
  // 月度计数
  const mon=today().slice(0,7);
  if(S.aiUsage.month!==mon){S.aiUsage={count:0,month:mon}}
  S.aiUsage.count++;
  S.vocabAi[word]='__loading__';save({...S});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:700,
        messages:[{role:'user',content:`请用「母语者思维」帮我理解英文单词 "${word}"。不要简单给中文翻译，而是按以下结构输出（用中文）：

【核心意象】
这个词在母语者脑中的核心画面/感觉是什么？用一两句话描述。

【典型场景】
列出3-4个该词最常出现的场景，每个场景配一个英文例句+中文意思。

【为什么不是XX】
和某个常被混淆的中文意思做对比，说明为什么这个词≠那个中文翻译的全部。

【一句话记忆】
用一句话概括，让我下次见到这个词立刻浮现正确的画面。

要求：直接输出讲解内容，不要客套话。`}]
      })
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    const text=json.content&&json.content[0]&&json.content[0].text||'';
    S.vocabAi[word]=text;save({...S});
  }catch(err){
    delete S.vocabAi[word];save({...S});
    alert('AI 讲解失败：'+err.message);
  }
}

// 连续打卡天数
function calcStreak(){
  if(!S.reviewHistory)return 0;
  let streak=0,d=today();
  while(S.reviewHistory[d]&&S.reviewHistory[d].reviewed>0){streak++;d=shiftD(d,-1)}
  return streak
}

// AI 同义词辨析
async function aiSynonyms(word,force){
  if(!S.apiKey){alert('请先在设置里填入 API Key');return}
  if(!S.vocabSynonyms)S.vocabSynonyms={};
  if(S.vocabSynonyms[word]&&S.vocabSynonyms[word]!=='__loading__'&&!force){
    if(!confirm('已有辨析结果，重新生成会消耗 token，确定？'))return
  }
  S.vocabSynonyms[word]='__loading__';save({...S});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:`请用中文帮我理解英文单词 "${word}" 和它的近义词之间的区别，要具体实用。

格式：
【核心区别速览】
一句话说清 ${word} 最独特的地方。

【近义词对比】
（3-5个最常见的近义词，每个：英文词 → 最关键区别 + 一个地道例句）

【什么时候该用 ${word}，而不是其他词？】
给1-2个判断技巧。

要求：简洁有力，直接给干货。`}]})
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message);
    if(!S.vocabSynonyms)S.vocabSynonyms={};
    S.vocabSynonyms[word]=json.content?.[0]?.text||'';
    save({...S})
  }catch(err){
    if(S.vocabSynonyms)delete S.vocabSynonyms[word];
    save({...S});alert('生成失败：'+err.message)
  }
}

// ═══════════════════════ 复习系统（SM-2）═══════════════════════
function sm2Grade(item,quality){
  let ef=item.easeFactor||2.5,intv=item.interval||1,box=item.box||1;
  if(quality===0){box=1;intv=1;}
  else{
    if(box<=1)intv=1;else if(box===2)intv=3;else intv=Math.max(1,Math.round(intv*ef));
    box=Math.min(box+1,8);
    ef=Math.max(1.3,ef+0.1-(3-quality)*(0.08+(3-quality)*0.02));
  }
  return{...item,box,interval:intv,easeFactor:Math.round(ef*100)/100,nextReview:Date.now()+intv*864e5,lastReview:Date.now(),reviewCount:(item.reviewCount||0)+1};
}

function startReview(mode){
  let queue=[...S.vocab.filter(v=>v.nextReview<=Date.now())];
  if(!queue.length){alert('今天没有待复习的词，继续加新词吧！');return}
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]]}
  reviewMode=mode;reviewQueue=queue.slice(0,30);reviewIdx=0;
  reviewFlipped=false;reviewInput='';reviewStats={correct:0,hard:0,wrong:0};reviewDone=false;
  _detailCache={};render();
}

function gradeWord(quality){
  const item=reviewQueue[reviewIdx];if(!item)return;
  if(quality===0)reviewStats.wrong++;else if(quality===1)reviewStats.hard++;else reviewStats.correct++;
  const updated=sm2Grade(item,quality);
  S.vocab=S.vocab.map(v=>v.word===item.word?updated:v);
  // 追踪复习历史（用于统计和连胜）
  const rd=today();
  if(!S.reviewHistory)S.reviewHistory={};
  if(!S.reviewHistory[rd])S.reviewHistory[rd]={reviewed:0,correct:0};
  S.reviewHistory[rd].reviewed++;
  if(quality>=2)S.reviewHistory[rd].correct++;
  save({...S});
  if(quality===0&&reviewQueue.filter(x=>x.word===item.word).length<2)reviewQueue.push({...updated});
  reviewIdx++;
  if(reviewIdx>=reviewQueue.length)reviewDone=true;
  reviewFlipped=false;reviewInput='';render();
}

  if(reviewDone){
    const total=reviewStats.correct+reviewStats.hard+reviewStats.wrong;
    const pct=Math.round(reviewStats.correct/Math.max(1,total)*100);
    return`<div style="position:fixed;inset:0;z-index:50;background:${C.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;animation:fp .3s ease">

  let main='';
  if(TAB==='me'){main=renderMe()}
  else{
    let body='';
    if(TAB==='today')body=renderToday();
    else if(TAB==='food')body=renderFood();
    else if(TAB==='bills')body=renderBills();
    else if(TAB==='list')body=renderList();
    else if(TAB==='vocab')body=renderVocab();
    else if(TAB==='journal')body=renderJournal();
    main=`
      <div style="position:fixed;top:0;right:0;width:200px;height:200px;border-radius:50%;background:${C.pS};filter:blur(10px);opacity:.6;pointer-events:none;z-index:0"></div>
      <div style="position:fixed;top:35%;left:-50px;width:160px;height:160px;border-radius:50%;background:${C.gS};filter:blur(10px);opacity:.5;pointer-events:none;z-index:0"></div>
      <div style="max-width:560px;margin:0 auto;padding:22px 16px 100px;position:relative;z-index:1">

            <div style="font-size:11px;letter-spacing:3px;color:${C.faint};text-transform:uppercase">daily log</div>
            <h1 style="font-family:${SR};font-size:26px;font-weight:600;margin-top:2px">饮食 & 体重小本</h1>
          </div>
          <button data-a="openSett" style="width:40px;height:40px;border-radius:12px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:18px;cursor:pointer">⚙️</button>
        </div>
        ${body}

  }
  const isMe=TAB==='me';
  const tabs=[['today','今日','🍃'],['food','食材','🧺'],['bills','账单','💰'],['list','清单','✓'],['vocab','单词','📖'],['journal','手帐','✍️'],['me','我','✦']];
  const nav=`<div style="position:fixed;left:0;right:0;bottom:0;z-index:10;height:74px;display:flex;justify-content:center;background:${isMe?'rgba(11,10,30,.75)':C.card+'EE'};backdrop-filter:blur(12px);border-top:1px solid ${isMe?'rgba(255,255,255,.08)':C.line};padding-bottom:12px">
    ${tabs.map(([id,label,icon])=>{const on=TAB===id;const col=isMe?(on?'#fff':'#7E79A8'):(on?C.p:C.faint);return`<button data-a="setTab" data-v="${id}" style="flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:${col};padding-top:10px"><span style="font-size:17px;opacity:${on?1:.55}">${icon}</span><span style="font-size:10px;font-weight:${on?600:400}">${label}</span></button>`}).join('')}
  </div>`;
  const sett=showSett?renderSettings():'';

  const editE=editExp?renderEditExp():'';
  const vdetail=vDetail?renderVocabDetail():'';
  const vreview=(reviewMode||reviewDone)?renderReview():'';
  const vstats=renderVocabStats();

  document.getElementById('app').innerHTML=main+nav+sett+draft+editE+vdetail+vreview+vstats+vbulk;

}

// ═══════════════════════ IMAGE LOADER ═══════════════════════
async function loadVisibleImages(){
  const imgs=document.querySelectorAll('img[data-lid]');
  for(const img of imgs){
    const id=img.dataset.lid;
    if(!id||img.src)continue;
    const src=await loadImg(id);
    if(src)img.src=src
  }
}

// ═══════════════════════ EVENTS ═══════════════════════
function handleRange(ev){
  const a=ev.target.dataset.a,v=Number(ev.target.value);
  const hsl=S.accent?h2hsl(S.accent):sHsl;
  if(a==='hueSlide'){const nh={...hsl,h:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='satSlide'){const nh={...hsl,s:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='litSlide'){const nh={...hsl,l:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='alphaSlide'){save({...S,accentA:v/100})}
}
window.handleRange=handleRange;

function bindEvents(){
  const app=document.getElementById('app');if(!app)return;
  app.onclick=async ev=>{
    const el=ev.target.closest('[data-a]');if(!el)return;
    const a=el.dataset.a,v=el.dataset.v,id=el.dataset.id;
    if(a==='setTab'){TAB=v;wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';render();return}
    if(a==='prevDay'){DATE=shiftD(DATE,-1);wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';render();return}
    if(a==='nextDay'){if(DATE<today()){DATE=shiftD(DATE,1);wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';render()};return}
    if(a==='goToday'){DATE=today();wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';render();return}
    if(a==='saveW'){const raw=document.getElementById('wIn')?.value||'';const kg=disp2kg(raw);mutE(e=>{e.weight=kg});return}
    if(a==='addWater'){mutE(e=>{e.water=(e.water||0)+1});return}
    if(a==='subWater'){mutE(e=>{e.water=Math.max(0,(e.water||0)-1)});return}
    if(a==='setMType'){mType=v;render();return}
    if(a==='addMeal'){const t=(document.getElementById('mIn')?.value||'').trim();if(!t)return;mTxt='';mutE(e=>{e.meals=[...e.meals,{id:Date.now(),type:mType,text:t}]});return}
    if(a==='delMeal'){mutE(e=>{e.meals=e.meals.filter(m=>String(m.id)!==id)});return}
    if(a==='savePhoto'){if(!photoPrev)return;const pid=await storeImg(photoPrev);photoPrev='';mutE(e=>{e.photos=[...e.photos,pid]});return}
    if(a==='delPhoto'){mutE(e=>{e.photos=e.photos.filter(x=>x!==id)});await delImg(id);return}
    if(a==='aiRec'){await doAiRec();return}
    if(a==='draftType'){if(aiDraft){aiDraft.type=v;render()}return}
    if(a==='draftDel'){if(aiDraft){aiDraft.items.splice(+id,1);render()}return}
    if(a==='draftAddItem'){if(aiDraft){aiDraft.items.push({name:'',qty:'',cal:''});render()}return}
    if(a==='draftCancel'){aiDraft=null;render();return}
    if(a==='draftConfirm'){await confirmDraft();return}
    if(a==='addP'){const n=(document.getElementById('pN')?.value||'').trim();if(!n)return;const q=parseFloat(document.getElementById('pQ')?.value||'');let unit=pU;if(pU==='自定义'){unit=(pUcustom||'').trim()||'个'}pN='';pQ='';pE='';pUcustom='';save({...S,pantry:[...S.pantry,{id:Date.now(),name:n,qty:isNaN(q)?null:q,unit,exp:document.getElementById('pE')?.value||null}]});return}
    if(a==='stepP'){const d=parseFloat(v);save({...S,pantry:S.pantry.map(x=>x.id==id?{...x,qty:x.qty==null?null:Math.max(0,Math.round((x.qty+d)*10)/10)}:x)});return}
    if(a==='delP'){save({...S,pantry:S.pantry.filter(x=>String(x.id)!==id)});return}
    if(a==='addW'){const t=(document.getElementById('wiIn')?.value||'').trim();if(!t)return;wiTxt='';save({...S,wishlist:[...S.wishlist,{id:Date.now(),name:t}]});return}
    if(a==='delW'){save({...S,wishlist:S.wishlist.filter(x=>String(x.id)!==id)});return}
    if(a==='calcKey'){pressCalcKey(v);return}
    if(a==='addE'){const amt=calcAmount(document.getElementById('eAmt')?.value||'');if(isNaN(amt)||amt<=0)return;const note=(document.getElementById('eNote')?.value||'').trim();const dt=document.getElementById('eDate')?.value||today();let imgId=null;if(eImg){imgId=await storeImg(eImg)}const rec={id:Date.now(),amount:Math.round(amt*100)/100,cat:eCat,note,date:dt,tag:eTag||'',img:imgId};eAmt='';eNote='';eTag='';eImg='';save({...S,expenses:[rec,...S.expenses]});return}
    if(a==='setECat'){eCat=v;render();return}
    if(a==='setETag'){eTag=(eTag===v?'':v);render();return}
    if(a==='addBillTag'){const t=prompt('新标签名：');if(t&&t.trim()){const tg=t.trim();if(!(S.billTags||[]).includes(tg)){save({...S,billTags:[...(S.billTags||[]),tg]})}}return}
    if(a==='clearEImg'){eImg='';render();return}
    if(a==='delE'){save({...S,expenses:S.expenses.filter(x=>String(x.id)!==id)});return}
    if(a==='toggleDay'){billCollapse[id]=!billCollapse[id];render();return}
    if(a==='editE'){const x=S.expenses.find(z=>String(z.id)===id);if(x){editExp={...x};for(const k of(x.img?[x.img]:[]))await loadImg(k);render()}return}
    if(a==='ee_cancel'){editExp=null;render();return}
    if(a==='ee_cat'){if(editExp){editExp.cat=v;render()}return}
    if(a==='ee_tag'){if(editExp){editExp.tag=(editExp.tag===v?'':v);render()}return}
    if(a==='ee_clearTag'){if(editExp){editExp.tag='';render()}return}
    if(a==='ee_clearImg'){if(editExp){editExp.img=null;render()}return}
    if(a==='ee_delete'){if(editExp){const eid=editExp.id;editExp=null;save({...S,expenses:S.expenses.filter(z=>z.id!==eid)})}return}
    if(a==='ee_save'){if(editExp){const amt=calcAmount(document.getElementById('ee_amt')?.value||'');const note=(document.getElementById('ee_note')?.value||'').trim();const dt=document.getElementById('ee_date')?.value||editExp.date;const upd={...editExp,amount:isNaN(amt)?editExp.amount:Math.round(amt*100)/100,note,date:dt};editExp=null;save({...S,expenses:S.expenses.map(z=>z.id===upd.id?upd:z)})}return}
    if(a==='prevMon'){eMon=shiftM(eMon,-1);render();return}
    if(a==='nextMon'){if(eMon<today().slice(0,7)){eMon=shiftM(eMon,1);render()};return}
    if(a==='addList'){const t=(document.getElementById('nList')?.value||'').trim();if(!t)return;const ic=nListIcon;nList='';nListIcon='📝';save({...S,lists:[{id:Date.now(),title:t,icon:ic,items:[]},...S.lists]});return}
    if(a==='pickListIcon'){nListIcon=v;render();return}
    if(a==='setListMode'){save({...S,listMode:v});return}
    if(a==='toggleCollapse'){listCollapse[id]=!listCollapse[id];render();return}
    if(a==='delList'){save({...S,lists:S.lists.filter(l=>String(l.id)!==id)});return}
    if(a==='addItem'){const iid=el.dataset.lid;const inEl=document.getElementById('li_'+iid);const t=(inEl?.value||'').trim();if(!t)return;liIn[iid]='';save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:[...l.items,{id:Date.now(),text:t,done:false}]}:l)});return}
    if(a==='toggleItem'){const iid=el.dataset.lid;save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:l.items.map(it=>String(it.id)===id?{...it,done:!it.done}:it)}:l)});return}
    if(a==='delItem'){const[iid,llid]=id.split('/');save({...S,lists:S.lists.map(l=>String(l.id)===llid?{...l,items:l.items.filter(it=>String(it.id)!==iid)}:l)});return}
    if(a==='setJMood'){jMood=v;render();return}
    if(a==='setJFont'){jFont=v;render();return}
    if(a==='setJHi'){jHi=v==='null'?null:v;render();return}
    if(a==='setJTape'){jTape=v;render();return}
    if(a==='setJSt'){jSt=v==='null'?null:v;render();return}
    if(a==='delJImg'){jImgs=jImgs.filter((_,i)=>String(i)!==id);render();return}
    if(a==='delMeImg'){meImgs=meImgs.filter((_,i)=>String(i)!==id);render();return}
    if(a==='addJ'){
      const t=(document.getElementById('jTxt')?.value||'').trim();
      const ids=[];for(const u of jImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const savedHi=jHi,savedSt=jSt;
      jTxt='';jImgs=[];jSt=null;jHi=null;
      save({...S,journal:[{id:Date.now(),date:today(),mood:jMood,text:t,font:jFont,hi:savedHi,tape:jTape,sticker:savedSt,imgs:ids},...S.journal]});return
    }
    if(a==='delJ'){const j=S.journal.find(x=>String(x.id)===id);if(j)(j.imgs||[]).forEach(delImg);save({...S,journal:S.journal.filter(x=>String(x.id)!==id)});return}
    if(a==='openCompose'){composing=true;meTxt='';meImgs=[];render();return}
    if(a==='cancelMe'){composing=false;render();return}
    if(a==='saveFrag'){
      const t=(document.getElementById('meTxt')?.value||'').trim();
      const ids=[];for(const u of meImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const frag={id:Date.now(),text:t,date:today(),x:8+Math.random()*84,y:18+Math.random()*60,hue:Math.floor(Math.random()*360),imgs:ids};
      composing=false;meTxt='';meImgs=[];
      save({...S,frags:[...S.frags,frag]});return
    }
    if(a==='readFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f){readFrag=f;for(const i of(f.imgs||[]))await loadImg(i);render()};return}
    if(a==='closeRead'){readFrag=null;render();return}
    if(a==='delFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f)(f.imgs||[]).forEach(delImg);readFrag=null;save({...S,frags:S.frags.filter(x=>String(x.id)!==id)});return}
    if(a==='openSett'){showSett=true;if(S.accent)sHsl=h2hsl(S.accent);render();return}
    if(a==='closeSett'){showSett=false;render();return}
    if(a==='setTheme'){save({...S,theme:v,accent:null,bgc:null});return}
    if(a==='clearAccent'){save({...S,accent:null});return}
    if(a==='clearBg'){save({...S,bgc:null});return}
    if(a==='setCur'){save({...S,cur:v});return}
    if(a==='setWunit'){S.wunit=v;wIn=getE().weight!=null?String(kg2disp(getE().weight)):'';save({...S});return}
    if(a==='saveKey'){   // ← 新增：保存 API Key
      const k=(document.getElementById('apiKeyIn')?.value||'').trim();
      save({...S,apiKey:k});
      return
    }
    if(a==='dictDl'){await downloadDict();return}
    if(a==='startReview'){startReview(v);return}
    if(a==='reviewFlip'){reviewFlipped=true;render();return}
    if(a==='reviewGrade'){gradeWord(+v);return}
    if(a==='reviewCheck'){
      const ans=(document.getElementById('spellInput')?.value||'').trim().toLowerCase();
      reviewInput=document.getElementById('spellInput')?.value||'';
      const correct=reviewQueue[reviewIdx]?.word?.toLowerCase();
      if(ans===correct)gradeWord(3);
      else{reviewFlipped=true;render()}
      return
    }
    if(a==='closeReview'){reviewMode=null;reviewDone=false;reviewQueue=[];render();return}
    if(a==='addVocab'){const w=(document.getElementById('vAddInput')?.value||'').trim();if(w)await addVocab(w);return}
    if(a==='setVView'){vView=v;render();return}
    if(a==='setVSort'){vSort=v;render();return}
    if(a==='openVocabDetail'){vDetail={word:v};_detailCache={};render();return}
    if(a==='closeVocabDetail'){vDetail=null;_detailCache={};render();return}
    if(a==='delVocab'){if(confirm('从词库移除 "'+id+'"？')){S.vocab=S.vocab.filter(x=>x.word!==id);delete S.vocabNotes[id];delete S.vocabAi[id];vDetail=null;save({...S})};return}
    if(a==='speak'){speakWord(v);ev.stopPropagation&&ev.stopPropagation();return}
    if(a==='saveVocabNote'){const txt=document.getElementById('vNote')?.value||'';S.vocabNotes[id]=txt;save({...S});return}
    if(a==='aiVocabExplain'){await aiVocabExplain(id,el.dataset.force);return}
    if(a==='aiSynonyms'){await aiSynonyms(id,el.dataset.force);return}
    if(a==='openStats'){showStats=true;render();return}
    if(a==='closeStats'){showStats=false;render();return}
    if(a==='openBulk'){showBulk=true;bulkText='';render();return}
    if(a==='closeBulk'){showBulk=false;render();return}
    if(a==='confirmBulk'){
      const lines=(document.getElementById('bulkInput')?.value||bulkText).split(/[\n,，；;\s]+/).map(w=>w.trim().toLowerCase()).filter(w=>w&&/^[a-z]/.test(w)&&w.length>1);
      const unique=[...new Set(lines)].filter(w=>!S.vocab.find(v=>v.word===w));
      if(!unique.length){alert('没有新词可添加。');return}
      const newItems=unique.map(word=>({word,added:Date.now()+Math.random(),box:1,nextReview:Date.now(),lastReview:null,reviewCount:0,tags:[],interval:1,easeFactor:2.5}));
      showBulk=false;bulkText='';
      save({...S,vocab:[...newItems,...S.vocab]});
      return
    }
    if(a==='addVocabTag'){
      const t=(document.getElementById('tagInput')?.value||'').trim();
      if(!t||!id)return;
      S.vocab=S.vocab.map(v=>v.word===id&&!(v.tags||[]).includes(t)?{...v,tags:[...(v.tags||[]),t]}:v);
      save({...S});return
    }
    if(a==='removeVocabTag'){
      S.vocab=S.vocab.map(v=>v.word===id?{...v,tags:(v.tags||[]).filter(t=>t!==v)}:v);
      // 用 data-v 作为 tag 值
      const tag=el.dataset.v;
      S.vocab=S.vocab.map(v=>v.word===id?{...v,tags:(v.tags||[]).filter(t=>t!==tag)}:v);
      save({...S});return
    }
    if(a==='exportData'){await exportData();return}
  };
  app.oninput=ev=>{
    const el=ev.target;
    if(el.dataset&&el.dataset.a==='draftEdit'&&aiDraft){const i=+el.dataset.id,fld=el.dataset.f;if(aiDraft.items[i]){aiDraft.items[i][fld]=el.value}return}
    if(el.id==='wIn'){wIn=el.value}
    if(el.id==='mIn'){mTxt=el.value}
    if(el.id==='pN'){pN=el.value}
    if(el.id==='pQ'){pQ=el.value}
    if(el.id==='pE'){pE=el.value}
    if(el.id==='pU'){pU=el.value;render();return}
    if(el.id==='pUcustom'){pUcustom=el.value}
    if(el.id==='wiIn'){wiTxt=el.value}
    if(el.id==='nList'){nList=el.value}
    if(el.id==='eAmt'){eAmt=el.value}
    if(el.id==='eNote'){eNote=el.value}
    if(el.id==='eSearch'){eSearch=el.value;clearTimeout(window._st);window._st=setTimeout(render,250);return}
    if(el.id==='vAddInput'){vAddInput=el.value}
    if(el.id==='vSearch'){vSearch=el.value;clearTimeout(window._vs);window._vs=setTimeout(render,250);return}
    if(el.id==='spellInput'){reviewInput=el.value}
    if(el.id==='bulkInput'){bulkText=el.value;clearTimeout(window._bk);window._bk=setTimeout(render,400);return}
    if(el.id==='eDate'){eDate=el.value}
    if(el.id==='jTxt'){jTxt=el.value}
    if(el.id==='meTxt'){meTxt=el.value}
    if(el.id&&el.id.startsWith('li_')){const lid=el.id.slice(3);liIn[lid]=el.value}
    if(el.id==='accentPicker'){sHsl=h2hsl(el.value);save({...S,accent:el.value});return}
    if(el.id==='bgPicker'){save({...S,bgc:el.value});return}
  };
  app.onchange=async ev=>{
    const el=ev.target;
    if(el.id==='pU'){pU=el.value;render();return}
    if(el.id==='capBtn'||el.id==='albBtn'){
      if(!el.files||!el.files.length)return;
      // 拍照和相册都走预览流程，这样 AI 识别按钮才会出现
      try{const u=await compressFile(el.files[0]);photoPrev=u;el.value='';render()}catch(err){console.error(err)}
      return
    }
    if(el.id==='jImgBtn'){if(!el.files||!el.files.length)return;const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}el.value='';jImgs=[...jImgs,...urls];render();return}
    if(el.id==='meImgBtn'){if(!el.files||!el.files.length)return;const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}el.value='';meImgs=[...meImgs,...urls];render();return}
    if(el.id==='eImgBtn'){if(!el.files||!el.files.length)return;try{const u=await compressFile(el.files[0]);eImg=u;el.value='';render()}catch(err){}return}
    if(el.id==='ee_imgBtn'){if(!el.files||!el.files.length||!editExp)return;try{const u=await compressFile(el.files[0]);const id=await storeImg(u);editExp.img=id;el.value='';render()}catch(err){}return}
    if(el.id==='importBtn'){if(!el.files||!el.files.length)return;await importData(el.files[0]);return}
  };
  // 清单拖拽排序
  app.ondragstart=ev=>{const t=ev.target.closest('[data-drag]');if(t){dragListId=t.dataset.drag;ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain',dragListId)}catch(e){}}};
  app.ondragover=ev=>{const t=ev.target.closest('[data-drag]');if(t&&dragListId){ev.preventDefault();ev.dataTransfer.dropEffect='move'}};
  app.ondrop=ev=>{
    const t=ev.target.closest('[data-drag]');
    if(!t||!dragListId)return;
    ev.preventDefault();
    const targetId=t.dataset.drag;
    if(String(targetId)===String(dragListId)){dragListId=null;return}
    const arr=[...S.lists];
    const from=arr.findIndex(l=>String(l.id)===String(dragListId));
    const to=arr.findIndex(l=>String(l.id)===String(targetId));
    if(from<0||to<0){dragListId=null;return}
    const[moved]=arr.splice(from,1);
    arr.splice(to,0,moved);
    dragListId=null;
    save({...S,lists:arr})
  };
  app.ondragend=()=>{dragListId=null};
  // 触摸滑动：划卡复习模式
  app.ontouchstart=ev=>{const t=ev.touches[0];_txStart={x:t.clientX,y:t.clientY}};
  app.ontouchend=ev=>{
    if(!_txStart||reviewMode!=='swipe'||!reviewFlipped)return;
    const t=ev.changedTouches[0];const dx=t.clientX-_txStart.x,dy=t.clientY-_txStart.y;
    _txStart=null;
    if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx>0)gradeWord(2);else gradeWord(0);
    }
  };
}

// ═══════════════════════ EXPORT / IMPORT ═══════════════════════
async function exportData(){
  const main=await idb.get(SKEY);
  const imgs={};const ks=await idb.keys('img:');
  for(const k of ks){const v=await idb.get(k);if(v)imgs[k]=v}
  const blob=new Blob([JSON.stringify({v:1,main,imgs})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小本备份_'+today()+'.json';a.click()
}
async function importData(file){
  try{const obj=JSON.parse(await file.text());if(obj.main)await idb.set(SKEY,obj.main);if(obj.imgs)for(const k in obj.imgs)await idb.set(k,obj.imgs[k]);location.reload()}catch(e){alert('导入失败，文件可能不对。')}
}

// ═══════════════════════ INIT ═══════════════════════
loadState();
</script>
</body>
